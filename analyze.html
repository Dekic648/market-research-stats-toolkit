    }
    dataA.addEventListener('input', function() { updateCount(dataA, countA); checkReady(); });
    dataB.addEventListener('input', function() { updateCount(dataB, countB); checkReady(); });

    runBtn.addEventListener('click', function() {
      var control = parseValues(dataA.value).nums;
      var variant = parseValues(dataB.value).nums;
      var descC = section.querySelector('#abControlDesc').value || 'Control';
      var descV = section.querySelector('#abVariantDesc').value || 'Variant';
      var abType = section.querySelector('#abType').value;
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      runABTest(control, variant, descC, descV, abType);
    });
  }

  function runABTest(control, variant, descC, descV, type) {
    var chartId = 'abChart_' + Date.now();
    var html, plainText;

    if (type === 'binary') {
      // Binary: proportions z-test
      var nC = control.length, nV = variant.length;
      var xC = control.reduce(function(s, v) { return s + v; }, 0);
      var xV = variant.reduce(function(s, v) { return s + v; }, 0);
      var pC = xC / nC, pV = xV / nV;
      var pPool = (xC + xV) / (nC + nV);
      var se = Math.sqrt(pPool * (1 - pPool) * (1 / nC + 1 / nV));
      var z = se > 0 ? (pV - pC) / se : 0;
      var p = 2 * (1 - jStat.normal.cdf(Math.abs(z), 0, 1));
      var diff = pV - pC;
      var lift = pC > 0 ? ((pV - pC) / pC * 100) : 0;
      var ci95Low = diff - 1.96 * se;
      var ci95High = diff + 1.96 * se;
      var pc = pClass(p);

      plainText = 'A/B test (binary outcomes): ' + descC + ' conversion rate = ' + (pC * 100).toFixed(2) + '% (' + xC + '/' + nC + '), ' +
        descV + ' conversion rate = ' + (pV * 100).toFixed(2) + '% (' + xV + '/' + nV + '). ' +
        'Relative lift: ' + (lift >= 0 ? '+' : '') + lift.toFixed(1) + '%. ' +
        (p < 0.05 ? 'The difference is statistically significant (z = ' + round4(z) + ', p = ' + round6(p) + ').' :
          'The difference is not statistically significant (z = ' + round4(z) + ', p = ' + round6(p) + ').');

      html =
        '<div class="results-section">' +
        '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
          '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
        '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
          testStat(descC + ' Rate', (pC * 100).toFixed(2) + '%') + testStat(descV + ' Rate', (pV * 100).toFixed(2) + '%') +
          testStat('Lift', (lift >= 0 ? '+' : '') + lift.toFixed(1) + '%') +
          testStat('z-statistic', round4(z)) + testStat('p-value', round6(p), pc) +
          testStat('95% CI of diff', '[' + round4(ci95Low) + ', ' + round4(ci95High) + ']') +
        '</div></div>' +
        '<div class="result-card"><div class="result-card-title">Conversion Rate Comparison</div>' +
          '<canvas id="' + chartId + '" width="500" height="180" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
        '</div>';

      container.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
      drawBarChart(chartId, [
        { label: descC + ' (' + nC + ')', value: pC * 100, color: CHART_COLORS[1] },
        { label: descV + ' (' + nV + ')', value: pV * 100, color: CHART_COLORS[0] }
      ]);
    } else {
      // Numeric: t-test + lift
      var r = StatsEngine.ttest(control, variant);
      var meanC = round4(r.meanA), meanV = round4(r.meanB);
      var sdC = round4(r.sdA), sdV = round4(r.sdB);
      var lift = r.meanA !== 0 ? ((r.meanB - r.meanA) / Math.abs(r.meanA) * 100) : 0;
      var pc = pClass(r.p);
      var eff = effectLabel(r.cohensD);

      plainText = 'A/B test (numeric): ' + descC + ' mean = ' + meanC + ' (SD = ' + sdC + ', n = ' + control.length + '), ' +
        descV + ' mean = ' + meanV + ' (SD = ' + sdV + ', n = ' + variant.length + '). ' +
        'Relative lift: ' + (lift >= 0 ? '+' : '') + lift.toFixed(1) + '%. ' +
        (r.p < 0.05 ? 'The difference is statistically significant (t = ' + round4(r.t) + ', p = ' + round6(r.p) + ', d = ' + round4(r.cohensD) + ').' :
          'The difference is not statistically significant (t = ' + round4(r.t) + ', p = ' + round6(r.p) + ').');

      html =
        '<div class="results-section">' +
        '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
          '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
        '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
          testStat(descC + ' Mean', meanC) + testStat(descV + ' Mean', meanV) +
          testStat('Lift', (lift >= 0 ? '+' : '') + lift.toFixed(1) + '%') +
          testStat('t-statistic', round4(r.t)) + testStat('p-value', round6(r.p), pc) +
          testStat('Cohen\u2019s d', round4(r.cohensD)) +
          testStat('95% CI of diff', '[' + round4(r.ci95.lower) + ', ' + round4(r.ci95.upper) + ']') +
        '</div><div class="effect-interpretation">Effect size: <strong>' + eff + '</strong></div></div>' +
        '<div class="result-card"><div class="result-card-title">Group Means Comparison</div>' +
          '<canvas id="' + chartId + '" width="500" height="180" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
        '</div>';

      container.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
      drawBarChart(chartId, [
        { label: descC, value: parseFloat(meanC), sd: parseFloat(sdC), color: CHART_COLORS[1] },
        { label: descV, value: parseFloat(meanV), sd: parseFloat(sdV), color: CHART_COLORS[0] }
      ]);
    }
    showNextSteps('causal', {});
  }

  /* ==================================================================
     7. Word Frequency Analysis
     ================================================================== */
  function runWordFreq(responses) {
    // Common stop words to filter
    var stopWords = {'the':1,'a':1,'an':1,'and':1,'or':1,'but':1,'in':1,'on':1,'at':1,'to':1,'for':1,
      'of':1,'with':1,'by':1,'from':1,'as':1,'is':1,'was':1,'are':1,'were':1,'been':1,'be':1,
      'have':1,'has':1,'had':1,'do':1,'does':1,'did':1,'will':1,'would':1,'could':1,'should':1,
      'may':1,'might':1,'shall':1,'can':1,'it':1,'its':1,'this':1,'that':1,'these':1,'those':1,
      'i':1,'me':1,'my':1,'we':1,'our':1,'you':1,'your':1,'he':1,'she':1,'they':1,'them':1,'their':1,
      'not':1,'no':1,'so':1,'if':1,'then':1,'than':1,'too':1,'very':1,'just':1,'about':1,
      'also':1,'into':1,'more':1,'some':1,'such':1,'only':1,'other':1,'new':1,'like':1,
      'all':1,'each':1,'every':1,'both':1,'few':1,'most':1,'own':1,'same':1,'out':1,
      'up':1,'down':1,'over':1,'when':1,'where':1,'how':1,'what':1,'which':1,'who':1,
      'there':1,'here':1,'any':1,'many':1,'much':1,'well':1,'back':1,'even':1,'still':1,
      'after':1,'before':1,'between':1,'because':1,'through':1,'during':1,'while':1,'really':1,
      'dont':1,"don't":1,'didnt':1,"didn't":1,'im':1,"i'm":1,'ive':1,"i've":1,'s':1,'t':1};

    var totalResponses = responses.length;
    var allWords = [];
    var wordCounts = {};
    var bigramCounts = {};
    var totalWordCount = 0;

    responses.forEach(function(resp) {
      var words = resp.toLowerCase().replace(/[^a-z0-9\s'-]/g, '').split(/\s+/).filter(function(w) { return w.length > 1 && !stopWords[w]; });
      totalWordCount += words.length;
      words.forEach(function(w) {
        allWords.push(w);
        wordCounts[w] = (wordCounts[w] || 0) + 1;
      });

      // Bigrams
      for (var i = 0; i < words.length - 1; i++) {
        var bg = words[i] + ' ' + words[i + 1];
        bigramCounts[bg] = (bigramCounts[bg] || 0) + 1;
      }
    });

    var uniqueWords = Object.keys(wordCounts).length;
    var avgWords = totalResponses > 0 ? (totalWordCount / totalResponses) : 0;

    // Sort words by count
    var sortedWords = Object.keys(wordCounts).map(function(w) {
      return { word: w, count: wordCounts[w], pct: (wordCounts[w] / totalWordCount * 100) };
    }).sort(function(a, b) { return b.count - a.count; });

    // Sort bigrams
    var sortedBigrams = Object.keys(bigramCounts).map(function(bg) {
      return { bigram: bg, count: bigramCounts[bg] };
    }).sort(function(a, b) { return b.count - a.count; }).filter(function(bg) { return bg.count >= 2; });

    // Top 20 words table
    var top20 = sortedWords.slice(0, 20);
    var tableHtml = '<table class="freq-table"><tr><th>#</th><th>Word</th><th>Count</th><th>%</th></tr>';
    top20.forEach(function(row, i) {
      tableHtml += '<tr><td>' + (i + 1) + '</td><td>' + escHtml(row.word) + '</td><td>' + row.count + '</td>' +
        '<td class="pct-bar-cell"><span class="pct-bar" style="width:' + (row.count / top20[0].count * 100).toFixed(1) + '%"></span><span>' + row.pct.toFixed(1) + '%</span></td></tr>';
    });
    tableHtml += '</table>';

    // Bigrams table
    var topBigrams = sortedBigrams.slice(0, 10);
    var bigramHtml = '';
    if (topBigrams.length > 0) {
      bigramHtml = '<table class="freq-table"><tr><th>#</th><th>Phrase</th><th>Count</th></tr>';
      topBigrams.forEach(function(row, i) {
        bigramHtml += '<tr><td>' + (i + 1) + '</td><td>' + escHtml(row.bigram) + '</td><td>' + row.count + '</td></tr>';
      });
      bigramHtml += '</table>';
    }

    var plainText = 'Word frequency analysis of ' + totalResponses + ' responses. ' +
      'Total words (excluding stop words): ' + totalWordCount + ', unique words: ' + uniqueWords + ', average words per response: ' + round2(avgWords) + '. ' +
      'Most common word: "' + (sortedWords[0] ? sortedWords[0].word : 'N/A') + '" (' + (sortedWords[0] ? sortedWords[0].count : 0) + ' occurrences).';

    var chartId = 'wordFreqChart_' + Date.now();
    var chartData = sortedWords.slice(0, 15);

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Summary</div><div class="test-results-grid">' +
        testStat('Responses', totalResponses) + testStat('Total Words', totalWordCount) +
        testStat('Unique Words', uniqueWords) + testStat('Avg Words/Response', round2(avgWords)) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Top 20 Words</div>' + tableHtml + '</div>';

    if (bigramHtml) {
      html += '<div class="result-card"><div class="result-card-title">Top Bigrams (2-word phrases)</div>' + bigramHtml + '</div>';
    }

    html += '<div class="result-card"><div class="result-card-title">Top 15 Words</div>' +
      '<canvas id="' + chartId + '" width="500" height="' + Math.max(180, chartData.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = chartData.map(function(d, i) {
      return { label: d.word, value: d.count, color: CHART_COLORS[i % CHART_COLORS.length] };
    });
    drawBarChart(chartId, bars);
    showNextSteps('text', { n: responses.length });
  }

  /* ==================================================================
     8. Welch's ANOVA
     ================================================================== */
  function runWelchAnova(groups, labels) {
    var k = groups.length;
    var ns = [], means = [], vars = [];
    for (var i = 0; i < k; i++) {
      var g = groups[i];
      var n = g.length;
      var m = StatsEngine._helpers.mean(g);
      var v = StatsEngine._helpers.sd(g, 1);
      v = v * v; // variance
      ns.push(n);
      means.push(m);
      vars.push(v);
    }

    // Welch's weights: w_i = n_i / s_i^2
    var weights = [];
    var sumW = 0;
    for (var i = 0; i < k; i++) {
      var w = vars[i] > 0 ? ns[i] / vars[i] : 0;
      weights.push(w);
      sumW += w;
    }

    // Weighted grand mean
    var grandMean = 0;
    for (var i = 0; i < k; i++) {
      grandMean += weights[i] * means[i];
    }
    grandMean = sumW > 0 ? grandMean / sumW : 0;

    // Welch's F
    var numerator = 0;
    for (var i = 0; i < k; i++) {
      numerator += weights[i] * (means[i] - grandMean) * (means[i] - grandMean);
    }
    numerator /= (k - 1);

    var lambda = 0;
    for (var i = 0; i < k; i++) {
      var hi = vars[i] > 0 ? (1 - weights[i] / sumW) * (1 - weights[i] / sumW) / (ns[i] - 1) : 0;
      lambda += hi;
    }
    lambda *= 3 / (k * k - 1);

    var F = numerator / (1 + 2 * (k - 2) / (k * k - 1) * lambda);
    if (!isFinite(F)) F = 0;

    var df1 = k - 1;
    var df2Inv = lambda;
    var df2 = df2Inv > 0 ? 1 / df2Inv : Infinity;

    var p = isFinite(df2) && df2 > 0 ? (1 - jStat.centralF.cdf(F, df1, df2)) : 1;
    var pc = pClass(p);

    var chartId = 'welchChart_' + Date.now();

    var html = '<div class="results-section">';
    html += renderGroupCards(groups, labels, 'Group Comparison');
    html += renderSigBadge(p) + '</div>';

    html += renderChart(chartId, 'Mean Comparison', 500, Math.max(180, k * 55 + 30));

    html += groupDistTable(groups, labels);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'Welch\u2019s F', value: round4(F) },
        { label: 'p-value', value: round6(p), cls: pc },
        { label: 'df1', value: df1 },
        { label: 'df2', value: round2(df2) }
      ])
    );

    var best = { mean: -Infinity, label: '' }, worst = { mean: Infinity, label: '' };
    for (var i = 0; i < k; i++) {
      if (means[i] > best.mean) { best = { mean: means[i], label: labels[i] }; }
      if (means[i] < worst.mean) { worst = { mean: means[i], label: labels[i] }; }
    }
    var plainText = p < 0.05 ?
      'Significant difference across ' + k + ' groups. ' + best.label + ' scores highest (mean ' + round2(best.mean) + '), ' + worst.label + ' lowest (mean ' + round2(worst.mean) + ').' :
      'No significant difference across ' + k + ' groups (p = ' + round4(p) + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var i = 0; i < k; i++) bars.push({ label: labels[i], value: means[i], sd: Math.sqrt(vars[i]), color: CHART_COLORS[i % CHART_COLORS.length] });
    drawBarChart(chartId, bars);
    showNextSteps('group_comparison', { groupNs: ns, p: p });
  }

  /* ==================================================================
     Friedman Test
     ================================================================== */
  function runFriedman(groups, labels) {
    var r = StatsEngine.friedman(groups);
    var pc = pClass(r.p);
    var chartId = 'friedmanChart_' + Date.now();

    var html = '<div class="results-section">';
    html += renderGroupCards(groups, labels, 'Condition Comparison');
    html += renderSigBadge(r.p) + '</div>';

    html += renderChart(chartId, 'Median Comparison', 500, Math.max(180, r.k * 55 + 30));

    html += groupDistTable(groups, labels);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'Chi-Square', value: round4(r.chi2) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: 'df', value: r.df },
        { label: 'k', value: r.k },
        { label: 'n', value: r.n }
      ])
    );

    var best = r.groupStats.reduce(function(a, b, i) { return b.median > a.med ? { med: b.median, label: labels[i] } : a; }, { med: -Infinity, label: '' });
    var worst = r.groupStats.reduce(function(a, b, i) { return b.median < a.med ? { med: b.median, label: labels[i] } : a; }, { med: Infinity, label: '' });
    var plainText = r.p < 0.05 ?
      'Significant difference across ' + r.k + ' conditions. ' + best.label + ' scores highest (median ' + round2(best.med) + '), ' + worst.label + ' lowest (median ' + round2(worst.med) + ').' :
      'No significant difference across ' + r.k + ' conditions (p = ' + round4(r.p) + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var i = 0; i < r.k; i++) bars.push({ label: labels[i], value: r.groupStats[i].median, color: CHART_COLORS[i % CHART_COLORS.length] });
    drawBarChart(chartId, bars);
    showNextSteps('paired', r);
  }

  /* ==================================================================
     Repeated Measures ANOVA
     ================================================================== */
  function runRepeatedAnova(groups, labels) {
    var r = StatsEngine.repeatedMeasuresAnova(groups);
    var pc = pClass(r.correctedP);
    var chartId = 'rmAnovaChart_' + Date.now();

    var html = '<div class="results-section">';
    html += renderGroupCards(groups, labels, 'Condition Comparison');
    html += renderSigBadge(r.correctedP) + '</div>';

    html += renderChart(chartId, 'Mean Comparison', 500, Math.max(180, r.k * 55 + 30));

    html += groupDistTable(groups, labels);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'F', value: round4(r.F) },
        { label: 'p (corrected)', value: round6(r.correctedP), cls: pc },
        { label: 'df (corrected)', value: round2(r.correctedDf1) + ', ' + round2(r.correctedDf2) },
        { label: 'Eta\u00b2', value: round4(r.etaSquared) },
        { label: 'GG Epsilon', value: round4(r.epsilon) }
      ])
    );

    var best = { mean: -Infinity, label: '' }, worst = { mean: Infinity, label: '' };
    for (var i = 0; i < r.k; i++) {
      if (r.groupStats[i].mean > best.mean) { best = { mean: r.groupStats[i].mean, label: labels[i] }; }
      if (r.groupStats[i].mean < worst.mean) { worst = { mean: r.groupStats[i].mean, label: labels[i] }; }
    }
    var plainText = r.correctedP < 0.05 ?
      'Significant difference across ' + r.k + ' conditions. ' + best.label + ' scores highest (mean ' + round2(best.mean) + '), ' + worst.label + ' lowest (mean ' + round2(worst.mean) + ').' :
      'No significant difference across ' + r.k + ' conditions (p = ' + round4(r.correctedP) + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var i = 0; i < r.k; i++) bars.push({ label: labels[i], value: r.groupStats[i].mean, sd: r.groupStats[i].sd, color: CHART_COLORS[i % CHART_COLORS.length] });
    drawBarChart(chartId, bars);
    showNextSteps('paired', r);
  }

  /* ==================================================================
     Two-way ANOVA
     ================================================================== */
  function runTwoWayAnova(outcome, factorA, factorB) {
    var minLen = Math.min(outcome.length, factorA.length, factorB.length);
    outcome = outcome.slice(0, minLen);
    factorA = factorA.slice(0, minLen);
    factorB = factorB.slice(0, minLen);

    var r = StatsEngine.twoWayAnova(outcome, factorA, factorB);

    var pcA = pClass(r.mainA.p);
    var pcB = pClass(r.mainB.p);
    var pcAB = pClass(r.interaction.p);

    var sigA = r.mainA.p < 0.05;
    var sigB = r.mainB.p < 0.05;
    var sigAB = r.interaction.p < 0.05;

    var plainText = 'Two-way ANOVA results (N = ' + r.N + '): ' +
      'Factor A is ' + (sigA ? 'significant' : 'not significant') + ' (F(' + r.mainA.df + ', ' + r.error.df + ') = ' + round4(r.mainA.F) + ', p = ' + round6(r.mainA.p) + ', eta-sq = ' + round4(r.mainA.etaSquared) + '). ' +
      'Factor B is ' + (sigB ? 'significant' : 'not significant') + ' (F(' + r.mainB.df + ', ' + r.error.df + ') = ' + round4(r.mainB.F) + ', p = ' + round6(r.mainB.p) + ', eta-sq = ' + round4(r.mainB.etaSquared) + '). ' +
      'The interaction is ' + (sigAB ? 'significant' : 'not significant') + ' (F(' + r.interaction.df + ', ' + r.error.df + ') = ' + round4(r.interaction.F) + ', p = ' + round6(r.interaction.p) + ', eta-sq = ' + round4(r.interaction.etaSquared) + ').';

    // Cell means table
    var cellHtml = '<table class="posthoc-table"><tr><th>Factor A</th><th>Factor B</th><th>Mean</th></tr>';
    for (var ia = 0; ia < r.levelsA.length; ia++) {
      for (var ib = 0; ib < r.levelsB.length; ib++) {
        var key = r.levelsA[ia] + '|' + r.levelsB[ib];
        var cm = r.cellMeans[key];
        cellHtml += '<tr><td>' + escHtml(r.levelsA[ia]) + '</td><td>' + escHtml(r.levelsB[ib]) + '</td><td>' + (cm !== undefined ? round4(cm) : 'N/A') + '</td></tr>';
      }
    }
    cellHtml += '</table>';

    var chartId = 'twoWayChart_' + Date.now();
    var bars = [];
    for (var ia = 0; ia < r.levelsA.length; ia++) {
      for (var ib = 0; ib < r.levelsB.length; ib++) {
        var key = r.levelsA[ia] + '|' + r.levelsB[ib];
        bars.push({ label: r.levelsA[ia] + ' / ' + r.levelsB[ib], value: r.cellMeans[key] || 0, color: CHART_COLORS[(ia * r.levelsB.length + ib) % CHART_COLORS.length] });
      }
    }

    var html = '<div class="results-section">';

    // Three significance badges: Factor A, Factor B, Interaction
    var effectsHtml = '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">' +
        '<div style="flex:1;min-width:120px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
          '<div style="font-size:0.72rem;color:var(--text-2)">Factor A</div>' +
          '<div style="font-size:1.1rem;font-weight:700;color:' + (sigA ? 'var(--green)' : 'var(--text-2)') + '">' + (sigA ? 'Significant' : 'Not sig.') + '</div>' +
          '<div style="font-size:0.72rem;color:var(--text-2)">p = ' + round4(r.mainA.p) + '</div></div>' +
        '<div style="flex:1;min-width:120px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
          '<div style="font-size:0.72rem;color:var(--text-2)">Factor B</div>' +
          '<div style="font-size:1.1rem;font-weight:700;color:' + (sigB ? 'var(--green)' : 'var(--text-2)') + '">' + (sigB ? 'Significant' : 'Not sig.') + '</div>' +
          '<div style="font-size:0.72rem;color:var(--text-2)">p = ' + round4(r.mainB.p) + '</div></div>' +
        '<div style="flex:1;min-width:120px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
          '<div style="font-size:0.72rem;color:var(--text-2)">Interaction (A\u00d7B)</div>' +
          '<div style="font-size:1.1rem;font-weight:700;color:' + (sigAB ? 'var(--amber)' : 'var(--text-2)') + '">' + (sigAB ? 'Significant' : 'Not sig.') + '</div>' +
          '<div style="font-size:0.72rem;color:var(--text-2)">p = ' + round4(r.interaction.p) + '</div></div>' +
      '</div>';
    html += RC('Effects Summary', effectsHtml);

    // Cell means chart
    html += renderChart(chartId, 'Mean Scores by Combination', 500, Math.max(180, bars.length * 55 + 30));

    // Cell means table
    html += RC('Cell Means Table', cellHtml);

    // Statistical details (collapsed)
    html += renderCollapsed('ANOVA Table Details',
      renderMetrics([
        { label: 'F (A)', value: round4(r.mainA.F) },
        { label: 'p (A)', value: round6(r.mainA.p), cls: pcA },
        { label: '\u03b7\u00b2 (A)', value: round4(r.mainA.etaSquared) },
        { label: 'F (B)', value: round4(r.mainB.F) },
        { label: 'p (B)', value: round6(r.mainB.p), cls: pcB },
        { label: '\u03b7\u00b2 (B)', value: round4(r.mainB.etaSquared) },
        { label: 'F (A\u00d7B)', value: round4(r.interaction.F) },
        { label: 'p (A\u00d7B)', value: round6(r.interaction.p), cls: pcAB },
        { label: '\u03b7\u00b2 (A\u00d7B)', value: round4(r.interaction.etaSquared) }
      ])
    );

    // Plain English
    var plainText2 = 'Two-way ANOVA (n=' + r.N + '): ';
    plainText2 += 'Factor A ' + (sigA ? 'has a significant effect' : 'no significant effect') + '. ';
    plainText2 += 'Factor B ' + (sigB ? 'has a significant effect' : 'no significant effect') + '. ';
    plainText2 += sigAB ? 'The combination of A and B matters \u2014 the effect of one factor depends on the level of the other.' : 'No significant interaction \u2014 the effects of A and B are independent.';
    html += renderPlainEnglish(plainText2);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, bars);
    showNextSteps('group_comparison', { n: minLen });
  }

  /* ==================================================================
     ANCOVA
     ================================================================== */
  function runAncova(outcome, groupVar, covariateArr) {
    var minLen = Math.min(outcome.length, groupVar.length, covariateArr.length);
    outcome = outcome.slice(0, minLen);
    groupVar = groupVar.slice(0, minLen);
    covariateArr = covariateArr.slice(0, minLen);

    var r = StatsEngine.ancova(outcome, groupVar, covariateArr);
    var pc = pClass(r.p);

    var sig = r.p < 0.05;
    var adjMeansStr = r.adjustedMeans.map(function(am) { return am.group + ': ' + round4(am.adjustedMean); }).join(', ');
    var rawMeansStr = r.groupStats.map(function(gs) { return gs.group + ': ' + round4(gs.rawMean) + ' (n=' + gs.n + ')'; }).join(', ');

    var plainText = 'ANCOVA ' + (sig ? 'found a significant group effect' : 'did not find a significant group effect') +
      ', F(' + r.df1 + ', ' + r.df2 + ') = ' + round4(r.F) + ', p = ' + round6(r.p) + ', R-squared = ' + round4(r.rSquared) +
      '. Adjusted means (controlling for the covariate): ' + adjMeansStr +
      '. Covariate effect: B = ' + round4(r.covariateEffect.B) + ', p = ' + round6(r.covariateEffect.p) + '.';

    // Adjusted means table
    var adjHtml = '<table class="posthoc-table"><tr><th>Group</th><th>Raw Mean</th><th>Adjusted Mean</th><th>n</th></tr>';
    for (var i = 0; i < r.groupStats.length; i++) {
      adjHtml += '<tr><td>' + escHtml(r.groupStats[i].group) + '</td><td>' + round4(r.groupStats[i].rawMean) + '</td>' +
        '<td><strong>' + round4(r.adjustedMeans[i].adjustedMean) + '</strong></td><td>' + r.groupStats[i].n + '</td></tr>';
    }
    adjHtml += '</table>';

    var chartId = 'ancovaChart_' + Date.now();
    var bars = r.adjustedMeans.map(function(am, i) {
      return { label: am.group + ' (adj)', value: am.adjustedMean, color: CHART_COLORS[i % CHART_COLORS.length] };
    });

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('F (group)', round4(r.F)) + testStat('p-value', round6(r.p), pc) +
        testStat('df', r.df1 + ', ' + r.df2) + testStat('R-squared', round4(r.rSquared)) +
        testStat('Covariate B', round4(r.covariateEffect.B)) + testStat('Covariate p', round6(r.covariateEffect.p), pClass(r.covariateEffect.p)) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Adjusted Means</div>' + adjHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Adjusted Means Chart</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(180, bars.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, bars);
    showNextSteps('group_comparison', { n: minLen, p: r.p });
  }

  /* ==================================================================
     Partial Correlation
     ================================================================== */
  function runPartialCorr(cols, labels) {
    // First two columns = variables of interest, rest = controls
    if (cols.length < 3) {
      showError('Partial correlation requires at least 3 columns: 2 variables of interest + 1 or more control variables.');
      return;
    }
    var v1 = cols[0];
    var v2 = cols[1];
    var controls = cols.slice(2);

    // Equalize lengths
    var minLen = v1.length;
    minLen = Math.min(minLen, v2.length);
    for (var i = 0; i < controls.length; i++) minLen = Math.min(minLen, controls[i].length);
    v1 = v1.slice(0, minLen);
    v2 = v2.slice(0, minLen);
    controls = controls.map(function(c) { return c.slice(0, minLen); });

    var r = StatsEngine.partialCorrelation(v1, v2, controls);

    // Also get zero-order correlation
    var zeroOrder = StatsEngine.pearson(v1, v2);
    var pc = pClass(r.p);

    var sig = r.p < 0.05;
    var dir = r.r > 0 ? 'positive' : 'negative';
    var strength = Math.abs(r.r) < 0.1 ? 'negligible' : Math.abs(r.r) < 0.3 ? 'weak' : Math.abs(r.r) < 0.5 ? 'moderate' : Math.abs(r.r) < 0.7 ? 'strong' : 'very strong';

    var plainText = 'The partial correlation between ' + labels[0] + ' and ' + labels[1] +
      ' (controlling for ' + labels.slice(2).join(', ') + ') is ' + strength + ' ' + dir +
      ' (r = ' + round4(r.r) + ', p = ' + round6(r.p) + ', df = ' + r.df + '). ' +
      (sig ? 'This is statistically significant.' : 'This is not statistically significant.') +
      ' The zero-order (uncontrolled) correlation was r = ' + round4(zeroOrder.r) + ' (p = ' + round6(zeroOrder.p) + ').';

    var chartId = 'partialCorrChart_' + Date.now();
    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('Partial r', round4(r.r)) + testStat('p-value', round6(r.p), pc) +
        testStat('df', r.df) + testStat('t', round4(r.t)) +
        testStat('95% CI', '[' + round4(r.ci95.lower) + ', ' + round4(r.ci95.upper) + ']') +
        testStat('n', r.n) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Comparison: Zero-Order vs Partial</div><div class="test-results-grid">' +
        testStat('Zero-Order r', round4(zeroOrder.r)) + testStat('Partial r', round4(r.r)) +
        testStat('Change', round4(r.r - zeroOrder.r)) +
      '</div><div class="effect-interpretation">After controlling for ' + controls.length + ' variable' + (controls.length > 1 ? 's' : '') +
        ', the correlation ' + (Math.abs(r.r) < Math.abs(zeroOrder.r) ? 'decreased' : 'increased') + ' from ' + round4(zeroOrder.r) + ' to ' + round4(r.r) + '.</div></div>' +
      '<div class="result-card"><div class="result-card-title">Zero-Order vs Partial Correlation</div>' +
        '<canvas id="' + chartId + '" width="500" height="180" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: 'Zero-Order r', value: zeroOrder.r, color: CHART_COLORS[0] },
      { label: 'Partial r', value: r.r, color: CHART_COLORS[1] }
    ]);
    showNextSteps('correlation', r);
  }

  /* ==================================================================
     Moderation Analysis
     ================================================================== */
  function runModeration(x, m, y) {
    var minLen = Math.min(x.length, m.length, y.length);
    x = x.slice(0, minLen);
    m = m.slice(0, minLen);
    y = y.slice(0, minLen);

    var r = StatsEngine.moderation(x, m, y);
    var pc = pClass(r.interactionEffect.p);

    var sig = r.interactionEffect.significant;
    var plainText = 'Moderation Analysis (N = ' + r.N + '): The interaction effect is ' +
      (sig ? 'statistically significant' : 'not statistically significant') +
      ' (B = ' + round4(r.interactionEffect.B) + ', t = ' + round4(r.interactionEffect.t) + ', p = ' + round6(r.interactionEffect.p) +
      '). The overall model explains ' + round4(r.rSquared * 100) + '% of the variance (R-squared = ' + round4(r.rSquared) +
      ', R-squared change due to interaction = ' + round4(r.rSquaredChange) + '). ' +
      'Simple slopes: at low moderator (-1 SD), slope = ' + round4(r.simpleSlopes.lowMod.slope) + ' (p = ' + round6(r.simpleSlopes.lowMod.p) +
      '); at high moderator (+1 SD), slope = ' + round4(r.simpleSlopes.highMod.slope) + ' (p = ' + round6(r.simpleSlopes.highMod.p) + ').';

    r.coefficients.forEach(function(c) {

    });

        testStat('R-squared', round4(r.rSquared)) + testStat('R-sq Change', round4(r.rSquaredChange)) +
        testStat('F (model)', round4(r.F)) + testStat('p (model)', round6(r.p), pClass(r.p)) +
        testStat('Interaction B', round4(r.interactionEffect.B)) + testStat('Interaction p', round6(r.interactionEffect.p), pc) +
      '</div></div>' +

        '<canvas id="' + chartId + '" width="500" height="180" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: 'Low Mod (-1 SD)', value: r.simpleSlopes.lowMod.slope, color: CHART_COLORS[0] },
      { label: 'High Mod (+1 SD)', value: r.simpleSlopes.highMod.slope, color: CHART_COLORS[1] }
    ]);
    showNextSteps('regression', r);

  /* ==================================================================
     Poisson Regression — Results
     ================================================================== */
  function runPoissonRegression(y, xs, labels) {
    // Poisson regression via IRLS (Iteratively Reweighted Least Squares)
    var n = y.length;
    var p = xs.length;
    var cols = p + 1;

    // Initialize betas to 0
    var betas = new Array(cols).fill(0);
    // Set intercept to log of mean
    var yMean = StatsEngine._helpers.mean(y);
    betas[0] = Math.log(Math.max(yMean, 0.01));

    var maxIter = 50;
    var converged = false;
    var iterations = 0;

    for (var iter = 0; iter < maxIter; iter++) {
      iterations++;
      // Compute mu = exp(X * beta)
      var mu = [];
      for (var i = 0; i < n; i++) {
        var eta = betas[0];
        for (var j = 0; j < p; j++) eta += betas[j + 1] * xs[j][i];
        mu.push(Math.exp(Math.min(eta, 20))); // cap to prevent overflow
      }

      // Working weights W = mu, working response z = eta + (y - mu)/mu
      // Solve weighted least squares: (X'WX) beta = X'Wz
      var XtWX = [];
      for (var i = 0; i < cols; i++) {
        XtWX.push(new Array(cols).fill(0));
      }
      var XtWz = new Array(cols).fill(0);

      for (var i = 0; i < n; i++) {
        var xi = [1];
        for (var j = 0; j < p; j++) xi.push(xs[j][i]);
        var w = mu[i];
        var eta = Math.log(Math.max(mu[i], 1e-10));
        var z = eta + (y[i] - mu[i]) / Math.max(mu[i], 1e-10);

        for (var a = 0; a < cols; a++) {
          for (var b = 0; b < cols; b++) {
            XtWX[a][b] += w * xi[a] * xi[b];
          }
          XtWz[a] += w * xi[a] * z;
        }
      }

      var newBetas = solveLinearSystemCopy(XtWX, XtWz);
      if (!newBetas) break;

      // Check convergence
      var maxDiff = 0;
      for (var j = 0; j < cols; j++) {
        maxDiff = Math.max(maxDiff, Math.abs(newBetas[j] - betas[j]));
      }
      betas = newBetas;
      if (maxDiff < 1e-8) { converged = true; break; }
    }

    // Compute final mu
    var mu = [];
    var logLik = 0;
    for (var i = 0; i < n; i++) {
      var eta = betas[0];
      for (var j = 0; j < p; j++) eta += betas[j + 1] * xs[j][i];
      var m = Math.exp(Math.min(eta, 20));
      mu.push(m);
      // log-likelihood: y*log(mu) - mu - log(y!)
      logLik += y[i] * Math.log(Math.max(m, 1e-10)) - m - logFactorial(y[i]);
    }

    // Null model log-likelihood (intercept only)
    var nullMu = yMean;
    var nullLogLik = 0;
    for (var i = 0; i < n; i++) {
      nullLogLik += y[i] * Math.log(Math.max(nullMu, 1e-10)) - nullMu - logFactorial(y[i]);
    }

    // Deviance
    var deviance = -2 * logLik;
    var nullDeviance = -2 * nullLogLik;
    var pseudoR2 = nullDeviance !== 0 ? 1 - deviance / nullDeviance : 0;
    var AIC = -2 * logLik + 2 * cols;

    // Standard errors from Fisher information (X'WX)^-1
    var XtWX = [];
    for (var i = 0; i < cols; i++) XtWX.push(new Array(cols).fill(0));
    for (var i = 0; i < n; i++) {
      var xi = [1];
      for (var j = 0; j < p; j++) xi.push(xs[j][i]);
      for (var a = 0; a < cols; a++) {
        for (var b = 0; b < cols; b++) {
          XtWX[a][b] += mu[i] * xi[a] * xi[b];
        }
      }
    }
    var cov = invertMatrixCopy(XtWX);
    var seBetas = [], zStats = [], pValues = [], rateRatios = [];
    for (var j = 0; j < cols; j++) {
      var se = cov ? Math.sqrt(Math.max(cov[j][j], 0)) : 0;
      seBetas.push(se);
      var z = se > 0 ? betas[j] / se : 0;
      zStats.push(z);
      pValues.push(2 * (1 - jStat.normal.cdf(Math.abs(z), 0, 1)));
      rateRatios.push(Math.exp(betas[j]));
    }

    // Display
    var pc = pseudoR2 > 0.1 ? 'p-sig' : 'p-nonsig';
    var plainText = 'Poisson Regression (N = ' + n + '): The model ' +
      (converged ? 'converged in ' + iterations + ' iterations' : 'did not converge — results may be unreliable') + '. ' +
      'Residual deviance = ' + round2(deviance) + ', null deviance = ' + round2(nullDeviance) + '. ' +
      'Pseudo R-squared = ' + round4(pseudoR2) + ', AIC = ' + round2(AIC) + '. ';
    var sigPreds = [];
    for (var j = 1; j < cols; j++) {
      if (pValues[j] < 0.05) sigPreds.push(labels[j] || ('Predictor ' + j));
    }
    plainText += sigPreds.length > 0 ? 'Significant predictors: ' + sigPreds.join(', ') + '.' : 'No predictors are statistically significant at the .05 level.';

    var coeffHtml = '<table class="coeff-table"><tr><th>Predictor</th><th>B</th><th>SE</th><th>z</th><th>p</th><th>Rate Ratio (exp B)</th></tr>';
    for (var i = 0; i < cols; i++) {
      var predName = i === 0 ? 'Intercept' : escHtml(labels[i] || ('Predictor ' + i));
      var sigCls = pValues[i] < 0.05 ? ' class="sig"' : '';
      coeffHtml += '<tr><td>' + predName + '</td><td>' + round4(betas[i]) + '</td>' +
        '<td>' + round4(seBetas[i]) + '</td><td>' + round4(zStats[i]) + '</td>' +
        '<td' + sigCls + '>' + round6(pValues[i]) + '</td>' +
        '<td>' + round4(rateRatios[i]) + '</td></tr>';
    }
    coeffHtml += '</table>';

    // Rate ratios bar chart (skip intercept)
    var bars = [];
    for (var i = 1; i < cols; i++) {
      bars.push({
        label: labels[i] || ('Predictor ' + i),
        value: rateRatios[i],
        color: rateRatios[i] >= 1 ? CHART_COLORS[2] : CHART_COLORS[6]
      });
    }
    bars.sort(function(a, b) { return Math.abs(b.value - 1) - Math.abs(a.value - 1); });

    var chartId = 'poissonChart_' + Date.now();
    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Model Summary</div><div class="test-results-grid">' +
        testStat('Pseudo R-squared', round4(pseudoR2)) + testStat('AIC', round2(AIC)) +
        testStat('Residual Deviance', round2(deviance)) + testStat('Null Deviance', round2(nullDeviance)) +
        testStat('Log-Likelihood', round2(logLik)) + testStat('N', n) +

        '<canvas id="' + chartId + '" width="500" height="' + Math.max(180, bars.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>';
    }

  // Helpers for Poisson regression
  function logFactorial(n) {
    if (n <= 1) return 0;
    var s = 0;
    for (var i = 2; i <= n; i++) s += Math.log(i);
    return s;
  }

  function solveLinearSystemCopy(A, b) {
    // Make copies to avoid mutation
    var n = A.length;
    var M = [];
    for (var i = 0; i < n; i++) {
      M.push(A[i].slice());
      M[i].push(b[i]);
    }
    // Gauss-Jordan
    for (var col = 0; col < n; col++) {
      var maxRow = col;
      for (var row = col + 1; row < n; row++) {
        if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
      }
      var tmp = M[col]; M[col] = M[maxRow]; M[maxRow] = tmp;
      if (Math.abs(M[col][col]) < 1e-12) return null;
      var pivot = M[col][col];
      for (var j = col; j <= n; j++) M[col][j] /= pivot;
      for (var row = 0; row < n; row++) {
        if (row === col) continue;
        var factor = M[row][col];
        for (var j = col; j <= n; j++) M[row][j] -= factor * M[col][j];
      }
    }
    var result = [];
    for (var i = 0; i < n; i++) result.push(M[i][n]);
    return result;
  }

  function invertMatrixCopy(A) {
    var n = A.length;
    var M = [];
    for (var i = 0; i < n; i++) {
      M.push(A[i].slice());
      for (var j = 0; j < n; j++) M[i].push(i === j ? 1 : 0);
    }
    for (var col = 0; col < n; col++) {
      var maxRow = col;
      for (var row = col + 1; row < n; row++) {
        if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
      }
      var tmp = M[col]; M[col] = M[maxRow]; M[maxRow] = tmp;
      if (Math.abs(M[col][col]) < 1e-12) return null;
      var pivot = M[col][col];
      for (var j = 0; j < 2 * n; j++) M[col][j] /= pivot;
      for (var row = 0; row < n; row++) {
        if (row === col) continue;
        var factor = M[row][col];
        for (var j = 0; j < 2 * n; j++) M[row][j] -= factor * M[col][j];
      }
    }
    var inv = [];
    for (var i = 0; i < n; i++) inv.push(M[i].slice(n));
    return inv;
  }

  /* ==================================================================
     Mediation Analysis — Results
     ================================================================== */
  function runMediation(x, m, y) {
    var minLen = Math.min(x.length, m.length, y.length);
    x = x.slice(0, minLen);
    m = m.slice(0, minLen);
    y = y.slice(0, minLen);
    var n = minLen;

    if (n < 5) {
      showError('Mediation analysis requires at least 5 observations. You have ' + n + '.');
      return;
    }

    // Path a: X -> M (simple regression)
    var regA = StatsEngine.linearRegression(m, [x]);
    // Path b + c': X,M -> Y (multiple regression)
    var regFull = StatsEngine.linearRegression(y, [x, m]);
    // Path c: X -> Y (total effect)
    var regC = StatsEngine.linearRegression(y, [x]);

    var a = regA.coefficients[1]; // X predicting M
    var seA = regA.se[1];
    var pA = regA.pValues[1];
    var b = regFull.coefficients[2]; // M predicting Y controlling X
    var seB = regFull.se[2];
    var pB = regFull.pValues[2];
    var cPrime = regFull.coefficients[1]; // X predicting Y controlling M (direct)
    var seCPrime = regFull.se[1];
    var pCPrime = regFull.pValues[1];
    var c = regC.coefficients[1]; // X predicting Y (total)
    var seC = regC.se[1];
    var pC = regC.pValues[1];

    // Indirect effect = a * b
    var indirect = a * b;
    // Sobel test
    var seIndirect = Math.sqrt(a * a * seB * seB + b * b * seA * seA);
    var sobelZ = seIndirect > 0 ? indirect / seIndirect : 0;
    var sobelP = 2 * (1 - jStat.normal.cdf(Math.abs(sobelZ), 0, 1));

    // Proportion mediated
    var propMediated = c !== 0 ? Math.abs(indirect / c) : 0;

    var plainText = 'Mediation Analysis (N = ' + n + '): ' +
      'The indirect effect (a * b) = ' + round4(indirect) + '. ' +
      'Sobel test: z = ' + round4(sobelZ) + ', p = ' + round6(sobelP) + '. ' +
      (sobelP < 0.05 ? 'The indirect effect is statistically significant, suggesting mediation.' : 'The indirect effect is not statistically significant.') + ' ' +
      'Total effect (c) = ' + round4(c) + ', direct effect (c\') = ' + round4(cPrime) + ', indirect effect = ' + round4(indirect) + '. ' +
      'Proportion mediated = ' + round4(propMediated * 100) + '%.';

    // Path table
    var pathHtml = '<table class="coeff-table"><tr><th>Path</th><th>B</th><th>SE</th><th>t/z</th><th>p</th></tr>';
    pathHtml += '<tr><td>a (X &rarr; M)</td><td>' + round4(a) + '</td><td>' + round4(seA) + '</td><td>' + round4(regA.tStats[1]) + '</td><td' + (pA < 0.05 ? ' class="sig"' : '') + '>' + round6(pA) + '</td></tr>';
    pathHtml += '<tr><td>b (M &rarr; Y | X)</td><td>' + round4(b) + '</td><td>' + round4(seB) + '</td><td>' + round4(regFull.tStats[2]) + '</td><td' + (pB < 0.05 ? ' class="sig"' : '') + '>' + round6(pB) + '</td></tr>';
    pathHtml += '<tr><td>c (total: X &rarr; Y)</td><td>' + round4(c) + '</td><td>' + round4(seC) + '</td><td>' + round4(regC.tStats[1]) + '</td><td' + (pC < 0.05 ? ' class="sig"' : '') + '>' + round6(pC) + '</td></tr>';
    pathHtml += '<tr><td>c\' (direct: X &rarr; Y | M)</td><td>' + round4(cPrime) + '</td><td>' + round4(seCPrime) + '</td><td>' + round4(regFull.tStats[1]) + '</td><td' + (pCPrime < 0.05 ? ' class="sig"' : '') + '>' + round6(pCPrime) + '</td></tr>';
    pathHtml += '<tr><td>Indirect (a * b)</td><td>' + round4(indirect) + '</td><td>' + round4(seIndirect) + '</td><td>' + round4(sobelZ) + '</td><td' + (sobelP < 0.05 ? ' class="sig"' : '') + '>' + round6(sobelP) + '</td></tr>';
    pathHtml += '</table>';

    var chartId = 'mediationChart_' + Date.now();
    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Effect Decomposition</div><div class="test-results-grid">' +
        testStat('Total Effect (c)', round4(c)) + testStat('Direct Effect (c\')', round4(cPrime)) +
        testStat('Indirect Effect (a*b)', round4(indirect)) + testStat('Sobel z', round4(sobelZ)) +
        testStat('Sobel p', round6(sobelP), pClass(sobelP)) + testStat('% Mediated', round2(propMediated * 100) + '%') +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Path Coefficients</div>' + pathHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Total vs Direct vs Indirect Effect</div>' +
        '<canvas id="' + chartId + '" width="500" height="210" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: 'Total (c)', value: c, color: CHART_COLORS[0] },
      { label: 'Direct (c\')', value: cPrime, color: CHART_COLORS[1] },
      { label: 'Indirect (a*b)', value: indirect, color: CHART_COLORS[2] }
    ]);
    showNextSteps('regression', { n: n });
  }

  function showHierarchicalInput() {

          '<label>Number of clusters (K): <input type="number" id="kInput" min="2" max="8" value="3"></label>' +

    function bindEvents() {
      var textareas = section.querySelectorAll('.multi-data');
      var runBtn = section.querySelector('#runBtn');

        ta.addEventListener('input', function() {

      function checkReady() {

          if (parseValues(ta.value).nums.length < 3) allGood = false;
        });

      }

      runBtn.addEventListener('click', function() {

        var labels = [];
        section.querySelectorAll('.multi-data').forEach(function(ta, i) {
          columns.push(parseValues(ta.value).nums);
          var descEl = section.querySelector('.multi-desc[data-idx="' + i + '"]');
          labels.push(descEl ? (descEl.value || 'Variable ' + (i + 1)) : 'Variable ' + (i + 1));
        });

        var k = Math.max(2, Math.min(8, parseInt(section.querySelector('#kInput').value) || 3));
        var linkage = section.querySelector('#linkageSelect').value;

        var minLen = Infinity;
        columns.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
        columns = columns.map(function(c) { return c.slice(0, minLen); });

        if (minLen < k) {
          showError('You need at least as many data points as clusters. You have ' + minLen + ' data points and K = ' + k + '.');
          return;

        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        runHierarchicalClustering(columns, k, linkage, labels);

    bindEvents();

  function runHierarchicalClustering(data, k, linkage, labels) {
    var nObs = data[0].length;
    var nVars = data.length;

    // Build observation vectors
    var obs = [];
    for (var i = 0; i < nObs; i++) {
      var row = [];
      for (var j = 0; j < nVars; j++) row.push(data[j][i]);
      obs.push(row);
    }

    // Distance matrix
    function eucDist(a, b) {
      var s = 0;
      for (var i = 0; i < a.length; i++) s += (a[i] - b[i]) * (a[i] - b[i]);
      return Math.sqrt(s);
    }

    // Agglomerative clustering
    var clusters = [];
    for (var i = 0; i < nObs; i++) clusters.push([i]);
    var mergeHeights = [];

    while (clusters.length > 1) {
      var bestDist = Infinity, bestI = 0, bestJ = 1;
      for (var i = 0; i < clusters.length; i++) {
        for (var j = i + 1; j < clusters.length; j++) {
          var d = clusterDist(clusters[i], clusters[j], obs, linkage);
          if (d < bestDist) { bestDist = d; bestI = i; bestJ = j; }
        }
      }
      mergeHeights.push(bestDist);
      var merged = clusters[bestI].concat(clusters[bestJ]);
      clusters.splice(bestJ, 1);
      clusters.splice(bestI, 1, merged);
      if (clusters.length === k) break;
    }

    // If we have more than k clusters (shouldn't happen), keep merging
    while (clusters.length > k) {
      var bestDist = Infinity, bestI = 0, bestJ = 1;
      for (var i = 0; i < clusters.length; i++) {
        for (var j = i + 1; j < clusters.length; j++) {
          var d = clusterDist(clusters[i], clusters[j], obs, linkage);
          if (d < bestDist) { bestDist = d; bestI = i; bestJ = j; }
        }
      }
      mergeHeights.push(bestDist);
      var merged = clusters[bestI].concat(clusters[bestJ]);
      clusters.splice(bestJ, 1);
      clusters.splice(bestI, 1, merged);
    }

    // Build assignments
    var assignments = new Array(nObs);
    var clusterSizes = [];
    for (var c = 0; c < clusters.length; c++) {
      clusterSizes.push(clusters[c].length);
      for (var j = 0; j < clusters[c].length; j++) {
        assignments[clusters[c][j]] = c;
      }
    }

    // Compute cluster means
    var centroids = [];
    for (var c = 0; c < k; c++) {
      var centroid = new Array(nVars).fill(0);
      for (var j = 0; j < clusters[c].length; j++) {
        for (var v = 0; v < nVars; v++) centroid[v] += obs[clusters[c][j]][v];
      }
      for (var v = 0; v < nVars; v++) centroid[v] /= clusters[c].length;
      centroids.push(centroid);
    }

    // Centroid table
    var centroidHtml = '<table class="coeff-table"><tr><th>Segment</th><th>Size</th>';
    labels.forEach(function(l) { centroidHtml += '<th>' + escHtml(l) + '</th>'; });
    centroidHtml += '</tr>';
    for (var c = 0; c < k; c++) {
      centroidHtml += '<tr><td>Segment ' + (c + 1) + '</td><td>' + clusterSizes[c] + '</td>';
      for (var j = 0; j < centroids[c].length; j++) centroidHtml += '<td>' + round4(centroids[c][j]) + '</td>';
      centroidHtml += '</tr>';
    }
    centroidHtml += '</table>';

    var chartId = 'hierChart_' + Date.now();
    var html = '<div class="results-section">';

    // Segment overview
    var segHtml = '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">';
    for (var c = 0; c < k; c++) {
      segHtml += '<div style="flex:1;min-width:90px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
        '<div style="font-size:0.72rem;color:var(--text-2)">Segment ' + (c + 1) + '</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:' + CHART_COLORS[c % CHART_COLORS.length] + '">' + clusterSizes[c] + '</div>' +
        '<div style="font-size:0.72rem;color:var(--text-2)">' + round2(clusterSizes[c] / nObs * 100) + '%</div></div>';
    }
    segHtml += '</div>';
    html += RC('Segments Found: ' + k, segHtml);

    html += RC('Segment Profiles', centroidHtml);

    html += renderChart(chartId, 'Segment Sizes', 500, Math.max(180, k * 55 + 30));

    // Plain English
    var plainText = k + ' segments found from ' + nObs + ' respondents using ' + linkage + ' linkage. ';
    for (var c = 0; c < k; c++) {
      var high = { val: -Infinity, label: '' };
      for (var j = 0; j < centroids[c].length; j++) {
        if (centroids[c][j] > high.val) { high = { val: centroids[c][j], label: labels[j] }; }
      }
      plainText += 'Segment ' + (c + 1) + ' (' + clusterSizes[c] + '): highest on ' + high.label + '. ';
    }
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var c = 0; c < k; c++) bars.push({ label: 'Segment ' + (c + 1), value: clusterSizes[c], color: CHART_COLORS[c % CHART_COLORS.length] });
    drawBarChart(chartId, bars);
    showNextSteps('clustering', { n: nObs });
  }

  function clusterDist(c1, c2, obs, linkage) {
    var dists = [];
    for (var i = 0; i < c1.length; i++) {
      for (var j = 0; j < c2.length; j++) {
        var s = 0;
        for (var v = 0; v < obs[c1[i]].length; v++) s += Math.pow(obs[c1[i]][v] - obs[c2[j]][v], 2);
        dists.push(Math.sqrt(s));
      }
    }
    if (linkage === 'single') return Math.min.apply(null, dists);
    if (linkage === 'complete') return Math.max.apply(null, dists);
    // average
    var sum = 0;
    for (var i = 0; i < dists.length; i++) sum += dists[i];
    return sum / dists.length;
  }

  /* ==================================================================
     Sentiment Analysis — Results
     ================================================================== */
  function runSentiment(responses) {
    // Simple lexicon-based sentiment analysis
    var positiveWords = {
      'good':1,'great':1,'excellent':1,'amazing':1,'wonderful':1,'fantastic':1,'awesome':1,
      'love':1,'loved':1,'loving':1,'like':1,'liked':1,'best':1,'better':1,'happy':1,
      'pleased':1,'satisfied':1,'enjoy':1,'enjoyed':1,'enjoyable':1,'perfect':1,
      'outstanding':1,'superb':1,'impressive':1,'brilliant':1,'remarkable':1,
      'helpful':1,'friendly':1,'positive':1,'recommend':1,'recommended':1,
      'easy':1,'fast':1,'quick':1,'efficient':1,'effective':1,'convenient':1,
      'beautiful':1,'clean':1,'comfortable':1,'nice':1,'pleasant':1,
      'professional':1,'reliable':1,'quality':1,'value':1,'worth':1,
      'thank':1,'thanks':1,'grateful':1,'appreciate':1,'appreciated':1,
      'exceptional':1,'delighted':1,'thrilled':1,'excited':1,'glad':1,
      'improved':1,'improvement':1,'upgrade':1,'smooth':1,'seamless':1
    };

    var negativeWords = {
      'bad':1,'terrible':1,'horrible':1,'awful':1,'worst':1,'worse':1,'poor':1,
      'hate':1,'hated':1,'dislike':1,'disappointed':1,'disappointing':1,'disappointment':1,
      'frustrating':1,'frustrated':1,'frustration':1,'annoying':1,'annoyed':1,
      'slow':1,'difficult':1,'hard':1,'complicated':1,'confusing':1,'confused':1,
      'problem':1,'problems':1,'issue':1,'issues':1,'bug':1,'bugs':1,'error':1,'errors':1,
      'broken':1,'fail':1,'failed':1,'failure':1,'wrong':1,'mistake':1,
      'expensive':1,'overpriced':1,'rude':1,'unhelpful':1,'unprofessional':1,
      'waste':1,'useless':1,'pointless':1,'boring':1,'ugly':1,'dirty':1,
      'never':1,'nothing':1,'complaint':1,'complain':1,'refund':1,'cancel':1,
      'unacceptable':1,'inadequate':1,'inferior':1,'mediocre':1,'lacking':1,
      'painful':1,'ridiculous':1,'pathetic':1,'dreadful':1,'miserable':1
    };

    var totalResponses = responses.length;
    var scores = [];
    var posCount = 0, negCount = 0, neutralCount = 0;
    var posWordCounts = {};
    var negWordCounts = {};

    responses.forEach(function(resp) {
      var words = resp.toLowerCase().replace(/[^a-z0-9\s'-]/g, '').split(/\s+/).filter(function(w) { return w.length > 1; });
      var posHits = 0, negHits = 0;
      words.forEach(function(w) {
        if (positiveWords[w]) {
          posHits++;
          posWordCounts[w] = (posWordCounts[w] || 0) + 1;
        }
        if (negativeWords[w]) {
          negHits++;
          negWordCounts[w] = (negWordCounts[w] || 0) + 1;
        }
      });
      var score = words.length > 0 ? (posHits - negHits) / words.length : 0;
      scores.push(score);
      if (posHits > negHits) posCount++;
      else if (negHits > posHits) negCount++;
      else neutralCount++;
    });

    var meanScore = StatsEngine._helpers.mean(scores);

    // Top positive/negative words
    var topPos = Object.keys(posWordCounts).map(function(w) { return { word: w, count: posWordCounts[w] }; })
      .sort(function(a, b) { return b.count - a.count; }).slice(0, 10);
    var topNeg = Object.keys(negWordCounts).map(function(w) { return { word: w, count: negWordCounts[w] }; })
      .sort(function(a, b) { return b.count - a.count; }).slice(0, 10);

    var posPct = (posCount / totalResponses * 100).toFixed(1);
    var negPct = (negCount / totalResponses * 100).toFixed(1);
    var neutralPct = (neutralCount / totalResponses * 100).toFixed(1);

    var plainText = 'Sentiment analysis of ' + totalResponses + ' responses: ' +
      posCount + ' positive (' + posPct + '%), ' + negCount + ' negative (' + negPct + '%), ' +
      neutralCount + ' neutral (' + neutralPct + '%). ' +
      'Mean sentiment score = ' + round4(meanScore) + ' (positive scores indicate positive sentiment). ' +
      (topPos.length > 0 ? 'Top positive words: ' + topPos.slice(0, 3).map(function(w) { return '"' + w.word + '"'; }).join(', ') + '. ' : '') +
      (topNeg.length > 0 ? 'Top negative words: ' + topNeg.slice(0, 3).map(function(w) { return '"' + w.word + '"'; }).join(', ') + '.' : '');

    // Top words tables
    var posTableHtml = '';

    strataEl.addEventListener('input', function() {

  function runPostStrat(strata, targets) {
    var n = strata.length;
    var freq = {};
    strata.forEach(function(v) { freq[v] = (freq[v] || 0) + 1; });
    var strataNames = Object.keys(targets).sort();

    // Compute weights
    var weightTable = [];
    var weights = new Array(n);
    var sumWeightsSq = 0;
    var sumWeights = 0;

    strataNames.forEach(function(s) {
      var sampleProp = freq[s] / n;
      var targetProp = targets[s];
      var weight = sampleProp > 0 ? targetProp / sampleProp : 0;
      weightTable.push({ stratum: s, count: freq[s] || 0, samplePct: sampleProp * 100, targetPct: targetProp * 100, weight: weight });
    });

    // Assign weights to each observation
    strata.forEach(function(v, i) {
      var sampleProp = freq[v] / n;
      var targetProp = targets[v] || 0;
      var w = sampleProp > 0 ? targetProp / sampleProp : 0;
      weights[i] = w;
      sumWeights += w;
      sumWeightsSq += w * w;
    });

    // Design effect (Kish)
    var deff = sumWeights > 0 ? (n * sumWeightsSq) / (sumWeights * sumWeights) : 1;
    var effN = deff > 0 ? n / deff : n;

    var plainText = 'Post-stratification weighting for ' + n + ' observations across ' + strataNames.length + ' strata. ' +
      'Design effect (DEFF) = ' + round4(deff) + ', effective sample size = ' + round2(effN) + ' (out of ' + n + '). ' +
      (deff > 2 ? 'The design effect is high, meaning substantial weighting was needed — this reduces effective sample size.' :
       'The design effect is modest, meaning only moderate weighting adjustments were needed.');

    // Weight table
    var tableHtml = '<table class="coeff-table"><tr><th>Stratum</th><th>n</th><th>Sample %</th><th>Target %</th><th>Weight</th></tr>';
    weightTable.forEach(function(row) {
      tableHtml += '<tr><td>' + escHtml(row.stratum) + '</td><td>' + row.count + '</td>' +
        '<td>' + round2(row.samplePct) + '%</td><td>' + round2(row.targetPct) + '%</td>' +
        '<td>' + round4(row.weight) + '</td></tr>';
    });
    tableHtml += '</table>';

    var chartId = 'postStratChart_' + Date.now();
    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Weighting Summary</div><div class="test-results-grid">' +
        testStat('Observations', n) + testStat('Strata', strataNames.length) +
        testStat('Design Effect', round4(deff)) + testStat('Effective N', round2(effN)) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Weight Table</div>' + tableHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Sample % vs Target %</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(200, strataNames.length * 70 + 40) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    // Draw grouped bar chart (sample vs target)
    drawGroupedBarChart(chartId, weightTable.map(function(row) {
      return { label: row.stratum, values: [row.samplePct, row.targetPct] };
    }), ['Sample %', 'Target %'], [CHART_COLORS[0], CHART_COLORS[2]]);
    showNextSteps('descriptive', { n: n });
  }

  // Grouped bar chart for post-strat
  function drawGroupedBarChart(canvasId, items, legendLabels, legendColors) {
    var groupCount = items.length;
    var barsPerGroup = legendLabels.length;
    var barHeight = 16;
    var groupGap = 20;
    var barGap = 4;
    var groupHeight = barsPerGroup * barHeight + (barsPerGroup - 1) * barGap;
    var totalHeight = groupCount * (groupHeight + groupGap) + 40;

    var c = initCanvas(canvasId, 500, Math.max(150, totalHeight));
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();
    var leftPad = 130, rightPad = 60, topPad = 30;
    var chartW = w - leftPad - rightPad;

    // Find max value
    var maxVal = 0;
    items.forEach(function(item) { item.values.forEach(function(v) { if (v > maxVal) maxVal = v; }); });
    maxVal = maxVal * 1.15 || 1;

    function xPos(val) { return leftPad + (val / maxVal) * chartW; }

    // Legend
    ctx.font = '500 11px -apple-system, BlinkMacSystemFont, sans-serif';
    for (var i = 0; i < legendLabels.length; i++) {
      ctx.fillStyle = legendColors[i];
      ctx.fillRect(leftPad + i * 100, 5, 12, 12);
      ctx.fillStyle = colors.text;
      ctx.textAlign = 'left';
      ctx.fillText(legendLabels[i], leftPad + i * 100 + 16, 15);
    }

    items.forEach(function(item, gi) {
      var groupY = topPad + gi * (groupHeight + groupGap);

      // Label
      ctx.fillStyle = colors.text;
      ctx.font = '500 12px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.label.length > 16 ? item.label.substring(0, 14) + '...' : item.label, leftPad - 10, groupY + groupHeight / 2);

      // Bars
      item.values.forEach(function(val, bi) {
        var by = groupY + bi * (barHeight + barGap);
        var bw = xPos(val) - leftPad;
        ctx.fillStyle = legendColors[bi];
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(leftPad, by, bw, barHeight, 3);
        else ctx.rect(leftPad, by, bw, barHeight);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Value label
        ctx.fillStyle = colors.text;
        ctx.font = '600 11px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(round2(val) + '%', leftPad + bw + 6, by + barHeight / 2);
      });
    });
  }

  function showPropensityInput() {

    buildGrid();

    function bindEvents() {
      var runBtn = section.querySelector('#runBtn');

      section.querySelectorAll('.prop-data').forEach(function(ta) {

        });
      });

      function checkReady() {
        // Treatment must have 5+ values
        var treatData = section.querySelector('.prop-data[data-idx="treatment"]');
        if (parseValues(treatData.value).nums.length < 5) { runBtn.disabled = true; return; }
        // All covariates must have 5+ values
        for (var i = 0; i < covCount; i++) {
          var covData = section.querySelector('.prop-data[data-idx="cov_' + i + '"]');
          if (parseValues(covData.value).nums.length < 5) { runBtn.disabled = true; return; }

        runBtn.disabled = false;
      }

      var addBtn = section.querySelector('#addCovBtn');
      if (addBtn) addBtn.addEventListener('click', function() { covCount++; buildGrid(); bindEvents(); scrollToBottom(); });
      var removeBtn = section.querySelector('#removeCovBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() { if (covCount > 1) { covCount--; buildGrid(); bindEvents(); scrollToBottom(); } });

      runBtn.addEventListener('click', function() {

        for (var i = 0; i < covCount; i++) {
          covariates.push(parseValues(section.querySelector('.prop-data[data-idx="cov_' + i + '"]').value).nums);

          covLabels.push(descEl ? (descEl.value || 'Covariate ' + (i + 1)) : 'Covariate ' + (i + 1));
        }
        var outcomeEl = section.querySelector('.prop-data[data-idx="outcome"]');
        var outcome = outcomeEl ? parseValues(outcomeEl.value).nums : [];

        // Validate treatment is 0/1
        for (var i = 0; i < treatment.length; i++) {
          if (treatment[i] !== 0 && treatment[i] !== 1) {
