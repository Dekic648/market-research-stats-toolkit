    correlation: [
      { label: 'Predict one from the other', desc: 'Simple regression', method: 'simple_regression' },
      { label: 'Check multiple correlations at once', desc: 'Correlation matrix', method: 'corr_matrix' },
      { label: 'Control for a third variable', desc: 'Partial correlation', method: 'partial_corr' },
      { label: 'Compare groups instead', desc: 'Are groups different?', method: 'ttest' }
    ],
    regression: [
      { label: 'Check residuals', desc: 'Is the model well-specified?', method: 'distribution' },
      { label: 'Try multiple predictors', desc: 'Multiple regression', method: 'linear_regression' },
      { label: 'Predict a category instead', desc: 'Logistic regression', method: 'logistic_regression' },
      { label: 'Check correlations first', desc: 'Correlation matrix', method: 'corr_matrix' }
    ],
    scale: [
      { label: 'Explore the factor structure', desc: 'Factor Analysis', method: 'factor_analysis' },
      { label: 'Reduce to fewer dimensions', desc: 'PCA', method: 'pca' },
      { label: 'Test a specific structure', desc: 'Confirmatory Factor Analysis', method: 'cfa' },
      { label: 'Summarize each item', desc: 'Frequencies for each question', method: 'frequencies' }
    ],
    clustering: [
      { label: 'Try a different number of segments', desc: 'Re-run with more/fewer K', method: 'kmeans' },
      { label: 'Try hierarchical clustering', desc: 'Tree-based segmentation', method: 'hierarchical_clustering' },
      { label: 'Find latent classes', desc: 'LCA for binary data', method: 'lca' },
      { label: 'Profile the segments', desc: 'Compare segments on a variable', method: 'anova' }
    ]
  };

  function showNextSteps(methodType, result) {
    if (methodType) {
      showValidationChecklist(methodType, result || {});
    }

    // Get contextual suggestions, fall back to generic
    var contextual = CONTEXTUAL_NEXT[methodType] || [];
    var generic = [
      { label: 'Summarize my data', desc: 'Frequencies, means, distributions', branch: 'summarize' },
      { label: 'Compare groups', desc: 'T-test, ANOVA, Mann-Whitney', branch: 'groups_diff' },
      { label: 'Check correlations', desc: 'Pearson, Spearman, Kendall', branch: 'related' },
      { label: 'Find what drives an outcome', desc: 'Regression, prediction', branch: 'drivers' }
    ];

    var html = '<div class="next-steps-card">';

    // Contextual suggestions (if any)
    if (contextual.length > 0) {
      html += '<div class="next-steps-title">Suggested Next Steps</div><div class="next-steps-grid">';
      contextual.forEach(function(step) {
        html += '<button class="next-step-btn contextual-btn" data-method="' + step.method + '" title="' + escHtml(step.desc) + '">' +
          '<span class="ns-label">' + step.label + '</span>' +
          '<span class="ns-desc">' + step.desc + '</span>' +
        '</button>';
      });
      html += '</div>';
    }

    // Generic options
    html += '<div class="next-steps-title" style="margin-top:' + (contextual.length > 0 ? '1.25rem' : '0') + '">Or explore another area</div><div class="next-steps-grid">';
    generic.forEach(function(step) {
      html += '<button class="next-step-btn" data-branch="' + step.branch + '">' +
        '<span class="ns-label">' + step.label + '</span>' +
        '<span class="ns-desc">' + step.desc + '</span>' +
      '</button>';
    });
    html += '<button class="next-step-btn start-over-next" data-action="reset">' +
      '<span class="ns-label">Start over</span><span class="ns-desc">New question from scratch</span></button>';
    html += '</div></div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    // Bind click handlers
    var cards = container.querySelectorAll('.next-steps-card');
    var card = cards[cards.length - 1];
    card.querySelectorAll('.next-step-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var action = btn.getAttribute('data-action');
        if (action === 'reset') { resetChat(); return; }

        // Direct method launch
        var methodId = btn.getAttribute('data-method');
        if (methodId) {
          container.innerHTML = '';
          launchMethod(methodId);
          return;
        }

        // Tree branch navigation
        var branch = btn.getAttribute('data-branch');
        var targetNode = findNodeById(TREE, branch);
        if (targetNode) {
          resetChat();
          setTimeout(function() { container.innerHTML = ''; runNode(targetNode); }, 50);
        }
      });
    });
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ==================================================================
     Reset
     ================================================================== */
  function resetChat() {
    container.innerHTML = '';
    startConversation();
  }

  document.getElementById('startOverLink').addEventListener('click', resetChat);

  /* ==================================================================
     Start
     ================================================================== */
  function startConversation() {
    // Check for deep-link: analyze.html?method=ttest
    var params = new URLSearchParams(window.location.search);
    var deepMethod = params.get('method');
    if (deepMethod) {
      // Find method in METHOD_REGISTRY
      var found = null;
      METHOD_REGISTRY.forEach(function(cat) {
        cat.methods.forEach(function(m) {
          if (m.id === deepMethod) found = m;
        });
      });
      if (found && found.implemented) {
        selectMethod(found);
        return;
      }
    }
    runNode(TREE);
  }

  startConversation();

})();
</script>
</body>
</html>
