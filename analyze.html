            return;
          }
        }

        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        runPropensity(treatment, covariates, covLabels, outcome.length >= treatment.length ? outcome : null);
      });
    }

    bindEvents();
  }

  function runPropensity(treatment, covariates, covLabels, outcome) {
    // Trim to minimum length
    var minLen = treatment.length;
    covariates.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
    if (outcome) minLen = Math.min(minLen, outcome.length);
    treatment = treatment.slice(0, minLen);
    covariates = covariates.map(function(c) { return c.slice(0, minLen); });
    if (outcome) outcome = outcome.slice(0, minLen);

    var n = minLen;
    var nCovs = covariates.length;

    // Estimate propensity scores via logistic regression
    var logReg = StatsEngine.logisticRegression(treatment, covariates);
    if (!logReg.converged) {
      showError('Propensity score model did not converge. Try fewer covariates or check for multicollinearity.');
      return;
    }

    var pScores = logReg.predicted; // predicted probabilities

    // Split into treated and control
    var treated = [], control = [];
    for (var i = 0; i < n; i++) {
      if (treatment[i] === 1) treated.push(i);
      else control.push(i);
    }

    // Nearest-neighbor matching (1:1 without replacement)
    var matched = [];
    var usedControl = {};
    treated.forEach(function(ti) {
      var bestDist = Infinity, bestJ = -1;
      control.forEach(function(ci) {
        if (usedControl[ci]) return;
        var d = Math.abs(pScores[ti] - pScores[ci]);
        if (d < bestDist) { bestDist = d; bestJ = ci; }
      });
      if (bestJ >= 0) {
        usedControl[bestJ] = true;
        matched.push({ treated: ti, control: bestJ, dist: bestDist });
      }
    });

    var nMatched = matched.length;

    // Compute SMD before and after matching for each covariate
    var balanceTable = [];
    for (var j = 0; j < nCovs; j++) {
      // Before matching
      var treatedVals = treated.map(function(i) { return covariates[j][i]; });
      var controlVals = control.map(function(i) { return covariates[j][i]; });
      var meanT = StatsEngine._helpers.mean(treatedVals);
      var meanC = StatsEngine._helpers.mean(controlVals);
      var sdT = StatsEngine._helpers.sd(treatedVals, 1);
      var sdC = StatsEngine._helpers.sd(controlVals, 1);
      var pooledSD = Math.sqrt((sdT * sdT + sdC * sdC) / 2);
      var smdBefore = pooledSD > 0 ? Math.abs(meanT - meanC) / pooledSD : 0;

      // After matching
      var matchedTreatedVals = matched.map(function(m) { return covariates[j][m.treated]; });
      var matchedControlVals = matched.map(function(m) { return covariates[j][m.control]; });
      var meanTm = StatsEngine._helpers.mean(matchedTreatedVals);
      var meanCm = StatsEngine._helpers.mean(matchedControlVals);
      var sdTm = StatsEngine._helpers.sd(matchedTreatedVals, 1);
      var sdCm = StatsEngine._helpers.sd(matchedControlVals, 1);
      var pooledSDm = Math.sqrt((sdTm * sdTm + sdCm * sdCm) / 2);
      var smdAfter = pooledSDm > 0 ? Math.abs(meanTm - meanCm) / pooledSDm : 0;

      balanceTable.push({ label: covLabels[j], smdBefore: smdBefore, smdAfter: smdAfter });
    }

    // ATT if outcome provided
    var att = null, attSE = null, attT = null, attP = null;
    if (outcome) {
      var treatedOutcomes = matched.map(function(m) { return outcome[m.treated]; });
      var controlOutcomes = matched.map(function(m) { return outcome[m.control]; });
      var diffs = [];
      for (var i = 0; i < nMatched; i++) diffs.push(treatedOutcomes[i] - controlOutcomes[i]);
      att = StatsEngine._helpers.mean(diffs);
      attSE = StatsEngine._helpers.sd(diffs, 1) / Math.sqrt(nMatched);
      attT = attSE > 0 ? att / attSE : 0;
      attP = 2 * (1 - jStat.studentt.cdf(Math.abs(attT), nMatched - 1));
    }

    var plainText = 'Propensity Score Matching: ' + nMatched + ' matched pairs from ' + treated.length + ' treated and ' + control.length + ' control units. ';
    var maxSmdBefore = Math.max.apply(null, balanceTable.map(function(b) { return b.smdBefore; }));
    var maxSmdAfter = Math.max.apply(null, balanceTable.map(function(b) { return b.smdAfter; }));
    plainText += 'Max SMD before matching = ' + round4(maxSmdBefore) + ', after matching = ' + round4(maxSmdAfter) + '. ';
    plainText += maxSmdAfter < 0.1 ? 'Good balance achieved after matching.' : maxSmdAfter < 0.25 ? 'Moderate balance achieved. Some residual imbalance remains.' : 'Poor balance — substantial imbalance remains after matching.';
    if (att !== null) {
      plainText += ' ATT estimate = ' + round4(att) + ' (SE = ' + round4(attSE) + ', t = ' + round4(attT) + ', p = ' + round6(attP) + '). ' +
        (attP < 0.05 ? 'The treatment effect is statistically significant.' : 'The treatment effect is not statistically significant.');
    }

    // Balance table
    var balHtml = '<table class="coeff-table"><tr><th>Covariate</th><th>SMD Before</th><th>SMD After</th><th>Improvement</th></tr>';
    balanceTable.forEach(function(row) {
      var improvement = row.smdBefore > 0 ? ((1 - row.smdAfter / row.smdBefore) * 100) : 0;
      var goodCls = row.smdAfter < 0.1 ? ' class="sig"' : '';
      balHtml += '<tr><td>' + escHtml(row.label) + '</td><td>' + round4(row.smdBefore) + '</td>' +
        '<td' + goodCls + '>' + round4(row.smdAfter) + '</td><td>' + round2(improvement) + '%</td></tr>';
    });
    balHtml += '</table>';

    var chartId = 'propChart_' + Date.now();
    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Matching Summary</div><div class="test-results-grid">' +
        testStat('Treated', treated.length) + testStat('Control', control.length) +
        testStat('Matched Pairs', nMatched) + testStat('Unmatched Treated', treated.length - nMatched);

    if (att !== null) {
      html += testStat('ATT', round4(att)) + testStat('ATT p-value', round6(attP), pClass(attP));
    }

    html += '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Covariate Balance (SMD < 0.1 = good)</div>' + balHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">SMD Before vs After Matching</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(200, balanceTable.length * 70 + 40) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    drawGroupedBarChart(chartId,
      balanceTable.map(function(row) { return { label: row.label, values: [row.smdBefore, row.smdAfter] }; }),
      ['SMD Before', 'SMD After'],
      [CHART_COLORS[6], CHART_COLORS[2]]
    );
    showNextSteps('causal', { n: n });
  }

  /* ==================================================================
     Multinomial Logistic Regression
     ================================================================== */
  function runMultinomialLogistic(yLabels, xs, labels) {
    // yLabels is array of category strings, xs is array of numeric arrays
    var n = yLabels.length;
    var categories = [];
    yLabels.forEach(function(v) { if (categories.indexOf(v) === -1) categories.push(v); });
    categories.sort();
    if (categories.length < 3) { showError('Multinomial logistic requires 3+ outcome categories. Found ' + categories.length + '.'); return; }

    var refCat = categories[0];
    var nonRefCats = categories.slice(1);

    // Build design matrix
    var nPred = xs.length;
    // For each non-ref category, run binary logistic regression (one-vs-ref)
    var allCoeffs = {};
    var allSE = {};
    var allOR = {};
    var predicted = new Array(n);

    nonRefCats.forEach(function(cat) {
      var yBin = yLabels.map(function(v) { return v === cat ? 1 : v === refCat ? 0 : -1; });
      var filtIdx = [];
      yBin.forEach(function(v, i) { if (v >= 0) filtIdx.push(i); });
      var yFilt = filtIdx.map(function(i) { return yBin[i]; });
      var xsFilt = xs.map(function(col) { return filtIdx.map(function(i) { return col[i]; }); });

      var r = StatsEngine.logisticRegression(yFilt, xsFilt);
      allCoeffs[cat] = r.coefficients;
      allSE[cat] = r.se;
      allOR[cat] = r.oddsRatios;
    });

    // Predict: for each observation, pick highest probability
    var correct = 0;
    for (var i = 0; i < n; i++) {
      var maxProb = 0; var bestCat = refCat;
      var denom = 1;
      nonRefCats.forEach(function(cat) {
        var lp = allCoeffs[cat][0];
        for (var j = 0; j < nPred; j++) lp += allCoeffs[cat][j + 1] * xs[j][i];
        var expLP = Math.exp(Math.min(lp, 500));
        denom += expLP;
      });
      nonRefCats.forEach(function(cat) {
        var lp = allCoeffs[cat][0];
        for (var j = 0; j < nPred; j++) lp += allCoeffs[cat][j + 1] * xs[j][i];
        var prob = Math.exp(Math.min(lp, 500)) / denom;
        if (prob > maxProb) { maxProb = prob; bestCat = cat; }
      });
      var refProb = 1 / denom;
      if (refProb > maxProb) bestCat = refCat;
      predicted[i] = bestCat;
      if (predicted[i] === yLabels[i]) correct++;
    }
    var accuracy = round4(correct / n);

    // Build results
    var plainText = 'Multinomial logistic regression with ' + nPred + ' predictor(s) and ' + categories.length + ' outcome categories. Reference category: "' + refCat + '". Overall classification accuracy: ' + (accuracy * 100).toFixed(1) + '%.';
    var chartId = 'mnlChart_' + Date.now();

    var coeffHtml = '';
    nonRefCats.forEach(function(cat) {
      coeffHtml += '<h4 style="margin-top:0.8rem">' + escHtml(cat) + ' vs ' + escHtml(refCat) + '</h4>';
      coeffHtml += '<table class="coeff-table"><tr><th>Predictor</th><th>B</th><th>SE</th><th>Odds Ratio</th></tr>';
      for (var j = 0; j < allCoeffs[cat].length; j++) {
        var predName = j === 0 ? 'Intercept' : escHtml(labels[j] || 'Predictor ' + j);
        coeffHtml += '<tr><td>' + predName + '</td><td>' + round4(allCoeffs[cat][j]) + '</td><td>' + round4(allSE[cat][j]) + '</td><td>' + round4(allOR[cat][j]) + '</td></tr>';
      }
      coeffHtml += '</table>';
    });

    var bars = [{ label: 'Accuracy', value: accuracy, color: CHART_COLORS[2] }];

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Model Summary</div><div class="test-results-grid">' +
        testStat('Reference Category', escHtml(refCat)) + testStat('Categories', categories.length) +
        testStat('n', n) + testStat('Accuracy', (accuracy * 100).toFixed(1) + '%') +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Coefficient Tables</div>' + coeffHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Classification Accuracy</div>' +
        '<canvas id="' + chartId + '" width="500" height="100" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, bars);
    showNextSteps('regression', { n: n });
  }

  /* ==================================================================
     Ordinal Regression
     ================================================================== */
  function runOrdinalRegression(yRaw, xs, labels) {
    var y = yRaw.map(function(v) { return Math.round(v); });
    var levels = [];
    y.forEach(function(v) { if (levels.indexOf(v) === -1) levels.push(v); });
    levels.sort(function(a, b) { return a - b; });
    if (levels.length < 3) { showError('Ordinal regression requires 3+ ordered levels. Found ' + levels.length + '.'); return; }

    var n = y.length;
    var nPred = xs.length;
    var K = levels.length;

    // Proportional odds model via binary logistic regressions at each threshold
    var thresholds = [];
    var coefficients = new Array(nPred).fill(0);
    var coeffCount = 0;

    for (var k = 0; k < K - 1; k++) {
      var cutpoint = levels[k];
      var yBin = y.map(function(v) { return v <= cutpoint ? 1 : 0; });
      var r = StatsEngine.logisticRegression(yBin, xs);
      thresholds.push({ level: cutpoint + '|' + levels[k + 1], value: round4(r.coefficients[0]) });
      for (var j = 0; j < nPred; j++) {
        coefficients[j] += r.coefficients[j + 1];
        coeffCount++;
      }
    }
    // Average coefficients across thresholds (proportional odds assumption)
    for (var j = 0; j < nPred; j++) coefficients[j] = coefficients[j] / (K - 1);

    var oddsRatios = coefficients.map(function(b) { return round4(Math.exp(b)); });

    // Pseudo R-squared (McFadden)
    var counts = {};
    y.forEach(function(v) { counts[v] = (counts[v] || 0) + 1; });
    var maxCount = 0; var mode = levels[0];
    levels.forEach(function(l) { if (counts[l] > maxCount) { maxCount = counts[l]; mode = l; } });
    var nullAccuracy = maxCount / n;
    // Predict using middle threshold
    var correct = 0;
    for (var i = 0; i < n; i++) {
      var predLevel = levels[K - 1];
      for (var k = 0; k < K - 1; k++) {
        var lp = thresholds[k].value;
        for (var j = 0; j < nPred; j++) lp += coefficients[j] * xs[j][i];
        var prob = 1 / (1 + Math.exp(-lp));
        if (prob > 0.5) { predLevel = levels[k]; break; }
      }
      if (predLevel === y[i]) correct++;
    }
    var pseudoR2 = round4(1 - (1 - correct / n) / (1 - nullAccuracy));

    var plainText = 'Ordinal regression with ' + nPred + ' predictor(s) across ' + K + ' ordered levels (' + levels.join(', ') + '). Pseudo R-squared = ' + pseudoR2 + '.';
    plainText += ' Odds ratios > 1 indicate higher odds of being in a higher category; < 1 indicate lower odds.';

    var chartId = 'ordChart_' + Date.now();

    var threshHtml = '<table class="coeff-table"><tr><th>Threshold</th><th>Estimate</th></tr>';
    thresholds.forEach(function(t) { threshHtml += '<tr><td>' + t.level + '</td><td>' + t.value + '</td></tr>'; });
    threshHtml += '</table>';

    var coeffHtml = '<table class="coeff-table"><tr><th>Predictor</th><th>B (avg)</th><th>Odds Ratio</th></tr>';
    for (var j = 0; j < nPred; j++) {
      coeffHtml += '<tr><td>' + escHtml(labels[j + 1] || 'Predictor ' + (j + 1)) + '</td><td>' + round4(coefficients[j]) + '</td><td>' + oddsRatios[j] + '</td></tr>';
    }
    coeffHtml += '</table>';

    var bars = [];
    for (var j = 0; j < nPred; j++) {
      bars.push({ label: labels[j + 1] || 'Predictor ' + (j + 1), value: oddsRatios[j], color: oddsRatios[j] >= 1 ? CHART_COLORS[2] : CHART_COLORS[6] });
    }

    var html = '<div class="results-section">';

    // Key metrics
    html += RC('Model Summary',
      renderMetrics([
        { label: 'Scale Levels', value: K + ' (' + levels.join(', ') + ')' },
        { label: 'Pseudo R\u00b2', value: pseudoR2 },
        { label: 'n', value: n }
      ])
    );

    // Odds ratios chart
    if (bars.length > 0) {
      html += renderChart(chartId, 'What Moves Respondents Up the Scale', 500, Math.max(120, bars.length * 55 + 30),
        'Odds ratio > 1 = pushes toward higher category. < 1 = pushes toward lower.');
    }

    // Tables (collapsed)
    html += renderCollapsed('Coefficient &amp; Threshold Tables',
      coeffHtml + '<div style="margin-top:1rem"><strong>Thresholds</strong></div>' + threshHtml
    );

    // Plain English
    var plainText2 = 'Ordinal regression predicting a ' + K + '-point scale. ';
    for (var j = 0; j < nPred; j++) {
      var orVal = oddsRatios[j];
      var predName = labels[j + 1] || 'Predictor ' + (j + 1);
      plainText2 += predName + ': odds ratio = ' + orVal + (orVal > 1 ? ' (increases odds of higher rating)' : ' (decreases odds)') + '. ';
    }
    html += renderPlainEnglish(plainText2);

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    if (bars.length > 0) drawBarChart(chartId, bars);
    showNextSteps('regression', { n: n });
  }

  /* ==================================================================
     Decision Trees
     ================================================================== */
  function runDecisionTree(yRaw, xs, labels) {
    var n = yRaw.length;
    var nPred = xs.length;
    var isClassification = false;
    // Check if Y looks categorical (has few unique or non-numeric)
    var uniqueY = [];
    yRaw.forEach(function(v) { if (uniqueY.indexOf(v) === -1) uniqueY.push(v); });
    if (uniqueY.length <= 10 && uniqueY.length < n * 0.3) isClassification = true;

    // Simple recursive partitioning (CART-like)
    function buildTree(indices, depth) {
      if (depth >= 4 || indices.length < 10) {
        // Leaf node
        var vals = indices.map(function(i) { return yRaw[i]; });
        if (isClassification) {
          var counts = {};
          vals.forEach(function(v) { counts[v] = (counts[v] || 0) + 1; });
          var best = null, bestCount = 0;
          for (var k in counts) { if (counts[k] > bestCount) { bestCount = counts[k]; best = k; } }
          return { leaf: true, value: best, n: indices.length };
        } else {
          var sum = 0; vals.forEach(function(v) { sum += v; });
          return { leaf: true, value: round4(sum / vals.length), n: indices.length };
        }
      }

      var bestGain = -Infinity, bestVar = -1, bestSplit = 0;
      // Try each predictor, find best split
      for (var j = 0; j < nPred; j++) {
        var sortedVals = indices.map(function(i) { return xs[j][i]; }).sort(function(a, b) { return a - b; });
        var tryPoints = [];
        for (var q = 0.2; q <= 0.8; q += 0.2) {
          tryPoints.push(sortedVals[Math.floor(q * sortedVals.length)]);
        }
        tryPoints.forEach(function(split) {
          var left = [], right = [];
          indices.forEach(function(i) { if (xs[j][i] <= split) left.push(i); else right.push(i); });
          if (left.length < 3 || right.length < 3) return;
          var gain;
          if (isClassification) {
            // Gini impurity reduction
            function gini(arr) {
              var counts = {}; arr.forEach(function(i) { counts[yRaw[i]] = (counts[yRaw[i]] || 0) + 1; });
              var g = 1;
              for (var k in counts) { var p = counts[k] / arr.length; g -= p * p; }
              return g;
            }
            var parentGini = gini(indices);
            gain = parentGini - (left.length / indices.length) * gini(left) - (right.length / indices.length) * gini(right);
          } else {
            // Variance reduction
            function variance(arr) {
              var vals = arr.map(function(i) { return yRaw[i]; });
              var m = 0; vals.forEach(function(v) { m += v; }); m /= vals.length;
              var v = 0; vals.forEach(function(val) { v += (val - m) * (val - m); }); return v / vals.length;
            }
            var parentVar = variance(indices);
            gain = parentVar - (left.length / indices.length) * variance(left) - (right.length / indices.length) * variance(right);
          }
          if (gain > bestGain) { bestGain = gain; bestVar = j; bestSplit = split; }
        });
      }

      if (bestGain <= 0.001 || bestVar === -1) {
        var vals = indices.map(function(i) { return yRaw[i]; });
        if (isClassification) {
          var counts = {};
          vals.forEach(function(v) { counts[v] = (counts[v] || 0) + 1; });
          var best = null, bestCount = 0;
          for (var k in counts) { if (counts[k] > bestCount) { bestCount = counts[k]; best = k; } }
          return { leaf: true, value: best, n: indices.length };
        } else {
          var sum = 0; vals.forEach(function(v) { sum += v; });
          return { leaf: true, value: round4(sum / vals.length), n: indices.length };
        }
      }

      var leftIdx = [], rightIdx = [];
      indices.forEach(function(i) { if (xs[bestVar][i] <= bestSplit) leftIdx.push(i); else rightIdx.push(i); });

      return {
        leaf: false,
        variable: bestVar,
        split: round4(bestSplit),
        varName: labels[bestVar + 1] || 'Predictor ' + (bestVar + 1),
        left: buildTree(leftIdx, depth + 1),
        right: buildTree(rightIdx, depth + 1),
        n: indices.length
      };
    }

    var allIndices = [];
    for (var i = 0; i < n; i++) allIndices.push(i);
    var tree = buildTree(allIndices, 0);

    // Tree rules as indented text
    function treeToText(node, indent) {
      if (node.leaf) return indent + 'PREDICT: ' + node.value + ' (n=' + node.n + ')\n';
      var txt = indent + 'IF ' + node.varName + ' <= ' + node.split + ' (n=' + node.n + ')\n';
      txt += treeToText(node.left, indent + '  ');
      txt += indent + 'ELSE ' + node.varName + ' > ' + node.split + '\n';
      txt += treeToText(node.right, indent + '  ');
      return txt;
    }
    var rulesText = treeToText(tree, '');

    // Variable importance (count of splits per variable)
    var importance = new Array(nPred).fill(0);
    function countSplits(node) {
      if (node.leaf) return;
      importance[node.variable] += node.n;
      countSplits(node.left);
      countSplits(node.right);
    }
    countSplits(tree);
    var totalImp = 0; importance.forEach(function(v) { totalImp += v; });
    if (totalImp === 0) totalImp = 1;

    // Accuracy / R-squared
    function predict(node, row) {
      if (node.leaf) return node.value;
      return row[node.variable] <= node.split ? predict(node.left, row) : predict(node.right, row);
    }
    var correct = 0; var ss_res = 0; var ss_tot = 0;
    var meanY = 0; yRaw.forEach(function(v) { meanY += v; }); meanY /= n;
    for (var i = 0; i < n; i++) {
      var row = xs.map(function(col) { return col[i]; });
      var pred = predict(tree, row);
      if (isClassification) { if (String(pred) === String(yRaw[i])) correct++; }
      else { ss_res += (yRaw[i] - pred) * (yRaw[i] - pred); ss_tot += (yRaw[i] - meanY) * (yRaw[i] - meanY); }
    }
    var fitStat = isClassification ? (correct / n) : (ss_tot > 0 ? round4(1 - ss_res / ss_tot) : 0);
    var fitLabel = isClassification ? 'Accuracy' : 'R\u00b2';

    var plainText = 'Decision tree with ' + nPred + ' predictor(s) and ' + n + ' observations. ' +
      (isClassification ? 'Classification accuracy: ' + (fitStat * 100).toFixed(1) + '%.' : 'R\u00b2 = ' + fitStat + '.') +
      ' The tree uses if/then rules to split the data based on predictor values.';

    var chartId = 'dtChart_' + Date.now();
    var bars = [];
    for (var j = 0; j < nPred; j++) {
      bars.push({ label: labels[j + 1] || 'Predictor ' + (j + 1), value: round4(importance[j] / totalImp), color: CHART_COLORS[j % CHART_COLORS.length] });
    }
    bars.sort(function(a, b) { return b.value - a.value; });

    var impHtml = '<table class="coeff-table"><tr><th>Variable</th><th>Importance</th></tr>';
    bars.forEach(function(b) { impHtml += '<tr><td>' + escHtml(b.label) + '</td><td>' + (b.value * 100).toFixed(1) + '%</td></tr>'; });
    impHtml += '</table>';

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Model Summary</div><div class="test-results-grid">' +
        testStat(fitLabel, isClassification ? (fitStat * 100).toFixed(1) + '%' : fitStat) + testStat('n', n) + testStat('Predictors', nPred) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Decision Rules</div>' +
        '<pre style="font-size:0.82rem;line-height:1.6;white-space:pre-wrap;color:var(--text-0);background:var(--bg-1);padding:1rem;border-radius:10px;overflow-x:auto;">' + escHtml(rulesText) + '</pre></div>' +
      '<div class="result-card"><div class="result-card-title">Variable Importance</div>' + impHtml + '</div>';
    if (bars.length > 0) {
      html += '<div class="result-card"><div class="result-card-title">Variable Importance Chart</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(120, bars.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>';
    }
    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    if (bars.length > 0) drawBarChart(chartId, bars);
    showNextSteps('clustering', { n: n });
  }

  /* ==================================================================
     Discriminant Analysis
     ================================================================== */
  function runDiscriminant(groupLabels, xs, labels) {
    var n = groupLabels.length;
    var nVars = xs.length;
    var groups = [];
    groupLabels.forEach(function(v) { if (groups.indexOf(v) === -1) groups.push(v); });
    groups.sort();
    var nGroups = groups.length;
    if (nGroups < 2) { showError('Discriminant analysis requires at least 2 groups. Found ' + nGroups + '.'); return; }

    // Compute group means and overall mean
    var overallMean = new Array(nVars).fill(0);
    for (var j = 0; j < nVars; j++) {
      xs[j].forEach(function(v) { overallMean[j] += v; });
      overallMean[j] /= n;
    }

    var groupMeans = {};
    var groupCounts = {};
    groups.forEach(function(g) { groupMeans[g] = new Array(nVars).fill(0); groupCounts[g] = 0; });
    for (var i = 0; i < n; i++) {
      var g = groupLabels[i];
      groupCounts[g]++;
      for (var j = 0; j < nVars; j++) groupMeans[g][j] += xs[j][i];
    }
    groups.forEach(function(g) { for (var j = 0; j < nVars; j++) groupMeans[g][j] /= groupCounts[g]; });

    // Within-group scatter matrix (pooled covariance)
    var Sw = [];
    for (var j1 = 0; j1 < nVars; j1++) { Sw[j1] = new Array(nVars).fill(0); }
    for (var i = 0; i < n; i++) {
      var g = groupLabels[i];
      for (var j1 = 0; j1 < nVars; j1++) {
        for (var j2 = 0; j2 < nVars; j2++) {
          Sw[j1][j2] += (xs[j1][i] - groupMeans[g][j1]) * (xs[j2][i] - groupMeans[g][j2]);
        }
      }
    }

    // Between-group scatter matrix
    var Sb = [];
    for (var j1 = 0; j1 < nVars; j1++) { Sb[j1] = new Array(nVars).fill(0); }
    groups.forEach(function(g) {
      var ni = groupCounts[g];
      for (var j1 = 0; j1 < nVars; j1++) {
        for (var j2 = 0; j2 < nVars; j2++) {
          Sb[j1][j2] += ni * (groupMeans[g][j1] - overallMean[j1]) * (groupMeans[g][j2] - overallMean[j2]);
        }
      }
    });

    // Wilks' Lambda = |Sw| / |Sw + Sb|
    function det2x2(m) { return m[0][0] * m[1][1] - m[0][1] * m[1][0]; }
    function detNxN(m) {
      var sz = m.length;
      if (sz === 1) return m[0][0];
      if (sz === 2) return det2x2(m);
      var d = 0;
      for (var c = 0; c < sz; c++) {
        var sub = [];
        for (var r = 1; r < sz; r++) {
          var row = [];
          for (var cc = 0; cc < sz; cc++) { if (cc !== c) row.push(m[r][cc]); }
          sub.push(row);
        }
        d += (c % 2 === 0 ? 1 : -1) * m[0][c] * detNxN(sub);
      }
      return d;
    }

    var SwPlusSb = [];
    for (var j1 = 0; j1 < nVars; j1++) {
      SwPlusSb[j1] = [];
      for (var j2 = 0; j2 < nVars; j2++) SwPlusSb[j1][j2] = Sw[j1][j2] + Sb[j1][j2];
    }

    var detSw = detNxN(Sw);
    var detTotal = detNxN(SwPlusSb);
    var wilksLambda = detTotal !== 0 ? round4(Math.abs(detSw / detTotal)) : 1;

    // Eigenvalues approximation: trace(Sw^-1 * Sb) / nVars for each discriminant function
    // Simplified: use ratio of between/within variance per variable
    var eigenvalues = [];
    var nFunctions = Math.min(nGroups - 1, nVars);
    for (var f = 0; f < nFunctions; f++) {
      var eigVal = 0;
      for (var j = 0; j < nVars; j++) { eigVal += Sw[j][j] > 0 ? Sb[j][j] / Sw[j][j] : 0; }
      eigenvalues.push(round4(eigVal / nVars / (f + 1)));
    }

    // Classification via nearest centroid (Mahalanobis-like using pooled variances)
    var correct = 0;
    var confusion = {};
    groups.forEach(function(g1) { confusion[g1] = {}; groups.forEach(function(g2) { confusion[g1][g2] = 0; }); });

    for (var i = 0; i < n; i++) {
      var bestGroup = groups[0]; var bestDist = Infinity;
      groups.forEach(function(g) {
        var dist = 0;
        for (var j = 0; j < nVars; j++) {
          var pooledVar = Sw[j][j] / (n - nGroups);
          if (pooledVar > 0) dist += Math.pow(xs[j][i] - groupMeans[g][j], 2) / pooledVar;
          else dist += Math.pow(xs[j][i] - groupMeans[g][j], 2);
        }
        if (dist < bestDist) { bestDist = dist; bestGroup = g; }
      });
      confusion[groupLabels[i]][bestGroup]++;
      if (bestGroup === groupLabels[i]) correct++;
    }
    var accuracy = round4(correct / n);

    // Discriminant function coefficients (simplified: standardized mean diffs)
    var coefficients = [];
    for (var j = 0; j < nVars; j++) {
      var pooledVar = Sw[j][j] / (n - nGroups);
      var pooledSD = Math.sqrt(pooledVar > 0 ? pooledVar : 1);
      var maxDiff = 0;
      groups.forEach(function(g) { var d = Math.abs(groupMeans[g][j] - overallMean[j]) / pooledSD; if (d > maxDiff) maxDiff = d; });
      coefficients.push(round4(maxDiff));
    }

    var plainText = 'Discriminant analysis with ' + nGroups + ' groups and ' + nVars + ' variable(s). ' +
      'Wilks\' Lambda = ' + wilksLambda + ' (closer to 0 = better separation). ' +
      'Classification accuracy: ' + (accuracy * 100).toFixed(1) + '%.';

    var chartId = 'discChart_' + Date.now();

    // Confusion matrix HTML
    var confHtml = '<table class="coeff-table"><tr><th>Actual \\ Predicted</th>';
    groups.forEach(function(g) { confHtml += '<th>' + escHtml(g) + '</th>'; });
    confHtml += '</tr>';
    groups.forEach(function(g1) {
      confHtml += '<tr><td><strong>' + escHtml(g1) + '</strong></td>';
      groups.forEach(function(g2) { confHtml += '<td>' + confusion[g1][g2] + '</td>'; });
      confHtml += '</tr>';
    });
    confHtml += '</table>';

    var coeffHtml = '<table class="coeff-table"><tr><th>Variable</th><th>Standardized Coefficient</th></tr>';
    for (var j = 0; j < nVars; j++) {
      coeffHtml += '<tr><td>' + escHtml(labels[j + 1] || 'Variable ' + (j + 1)) + '</td><td>' + coefficients[j] + '</td></tr>';
    }
    coeffHtml += '</table>';

    var bars = eigenvalues.map(function(ev, i) { return { label: 'Function ' + (i + 1), value: ev, color: CHART_COLORS[i % CHART_COLORS.length] }; });

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Model Summary</div><div class="test-results-grid">' +
        testStat('Wilks\' Lambda', wilksLambda) + testStat('Accuracy', (accuracy * 100).toFixed(1) + '%') +
        testStat('Groups', nGroups) + testStat('Variables', nVars) + testStat('n', n) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Eigenvalues</div><div class="test-results-grid">';
    eigenvalues.forEach(function(ev, i) { html += testStat('Function ' + (i + 1), ev); });
    html += '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Standardized Coefficients</div>' + coeffHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Confusion Matrix</div>' + confHtml + '</div>';
    if (bars.length > 0) {
      html += '<div class="result-card"><div class="result-card-title">Eigenvalues Chart</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(120, bars.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>';
    }
    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    if (bars.length > 0) drawBarChart(chartId, bars);
    showNextSteps('clustering', { n: n });
  }

  /* ==================================================================
     Survival Analysis (Kaplan-Meier)
     ================================================================== */
  function runSurvival(time, event, groupCol) {
    var n = time.length;
    // Validate event is 0/1
    for (var i = 0; i < n; i++) {
      if (event[i] !== 0 && event[i] !== 1) {
        showError('Event column must contain only 0 (censored) and 1 (event). Found "' + event[i] + '" at row ' + (i + 1) + '.');
        return;
      }
    }

    // Filter out empty group entries; determine if we have groups
    var hasGroups = groupCol && groupCol.length > 0 && groupCol.some(function(v) { return v !== ''; });
    var groups = [];
    if (hasGroups) {
      groupCol.forEach(function(v) { if (v !== '' && groups.indexOf(v) === -1) groups.push(v); });
      groups.sort();
    }

    function kaplanMeier(indices) {
      var data = indices.map(function(i) { return { time: time[i], event: event[i] }; });
      data.sort(function(a, b) { return a.time - b.time; });

      var nAtRisk = data.length;
      var survivalProb = 1;
      var table = [];
      var curve = [{ time: 0, survival: 1 }];
      var totalEvents = 0;
      var totalCensored = 0;

      var i = 0;
      while (i < data.length) {
        var t = data[i].time;
        var d = 0; // events at this time
        var c = 0; // censored at this time
        while (i < data.length && data[i].time === t) {
          if (data[i].event === 1) d++;
          else c++;
          i++;
        }
        if (d > 0) {
          survivalProb *= (1 - d / nAtRisk);
          table.push({ time: round4(t), nAtRisk: nAtRisk, events: d, censored: c, survival: round4(survivalProb) });
          curve.push({ time: t, survival: survivalProb });
        }
        totalEvents += d;
        totalCensored += c;
        nAtRisk -= (d + c);
      }

      // Median survival: time when survival drops below 0.5
      var median = null;
      for (var j = 0; j < curve.length; j++) {
        if (curve[j].survival <= 0.5) { median = round4(curve[j].time); break; }
      }

      return { table: table, curve: curve, totalEvents: totalEvents, totalCensored: totalCensored, median: median, n: indices.length };
    }

    var results = {};
    var curves = {};
    if (hasGroups) {
      groups.forEach(function(g) {
        var idx = [];
        for (var i = 0; i < n; i++) { if (groupCol[i] === g) idx.push(i); }
        results[g] = kaplanMeier(idx);
        curves[g] = results[g].curve;
      });
    } else {
      var allIdx = [];
      for (var i = 0; i < n; i++) allIdx.push(i);
      results['All'] = kaplanMeier(allIdx);
      curves['All'] = results['All'].curve;
    }

    // Log-rank test if groups
    var logRankP = null;
    if (hasGroups && groups.length === 2) {
      // Simplified log-rank test
      var allTimes = [];
      time.forEach(function(t) { if (allTimes.indexOf(t) === -1) allTimes.push(t); });
      allTimes.sort(function(a, b) { return a - b; });

      var O1 = 0, E1 = 0;
      var alive = {};
      groups.forEach(function(g) { alive[g] = results[g].n; });
      var totalAlive = n;

      allTimes.forEach(function(t) {
        var d = {}; groups.forEach(function(g) { d[g] = 0; });
        var c = {}; groups.forEach(function(g) { c[g] = 0; });
        for (var i = 0; i < n; i++) {
          if (time[i] === t && hasGroups) {
            var g = groupCol[i];
            if (event[i] === 1) d[g]++;
            else c[g]++;
          }
        }
        var dTotal = 0; groups.forEach(function(g) { dTotal += d[g]; });
        if (dTotal > 0 && totalAlive > 0) {
          O1 += d[groups[0]];
          E1 += dTotal * (alive[groups[0]] / totalAlive);
        }
        groups.forEach(function(g) { alive[g] -= d[g] + c[g]; });
        totalAlive -= dTotal;
        groups.forEach(function(g) { totalAlive -= c[g]; });
        // Fix: totalAlive recalc
        totalAlive = 0; groups.forEach(function(g) { totalAlive += alive[g]; });
      });

      var V = E1 > 0 ? E1 * (1 - E1 / results[groups[0]].n) : 1;
      var chiSq = V > 0 ? Math.pow(O1 - E1, 2) / V : 0;
      // Approximate p-value from chi-squared with 1 df
      logRankP = round6(Math.exp(-0.5 * chiSq) * (chiSq > 10 ? 0.001 : 1));
      if (chiSq > 3.84) logRankP = Math.min(logRankP, 0.05);
      if (chiSq > 6.63) logRankP = Math.min(logRankP, 0.01);
      // Better approximation using normal
      var z = Math.sqrt(chiSq);
      logRankP = round6(2 * (1 - normalCDF(z)));
    }

    function normalCDF(x) {
      var t = 1 / (1 + 0.2316419 * Math.abs(x));
      var d = 0.3989422804014327;
      var p = d * Math.exp(-x * x / 2) * (0.3193815 * t - 0.3565638 * t * t + 1.781478 * t * t * t - 1.821256 * t * t * t * t + 1.330274 * t * t * t * t * t);
      return x > 0 ? 1 - p : p;
    }

    // Build output
    var groupKeys = hasGroups ? groups : ['All'];
    var plainText = 'Kaplan-Meier survival analysis with ' + n + ' observations. ';
    groupKeys.forEach(function(g) {
      plainText += (hasGroups ? g + ': ' : '') + results[g].totalEvents + ' events, ' + results[g].totalCensored + ' censored. ';
      plainText += 'Median survival: ' + (results[g].median !== null ? results[g].median : 'not reached') + '. ';
    });
    if (logRankP !== null) {
      plainText += 'Log-rank test p = ' + logRankP + (logRankP < 0.05 ? ' (significant difference between groups).' : ' (no significant difference).');
    }

    var chartId = 'survChart_' + Date.now();

    // KM table HTML
    var tableHtml = '';
    groupKeys.forEach(function(g) {
      if (hasGroups) tableHtml += '<h4 style="margin-top:0.8rem">' + escHtml(g) + '</h4>';
      tableHtml += '<table class="coeff-table"><tr><th>Time</th><th>At Risk</th><th>Events</th><th>Censored</th><th>Survival</th></tr>';
      results[g].table.forEach(function(row) {
        tableHtml += '<tr><td>' + row.time + '</td><td>' + row.nAtRisk + '</td><td>' + row.events + '</td><td>' + row.censored + '</td><td>' + row.survival + '</td></tr>';
      });
      tableHtml += '</table>';
    });

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Summary</div><div class="test-results-grid">' +
        testStat('n', n);
    groupKeys.forEach(function(g) {
      html += testStat((hasGroups ? escHtml(g) + ' ' : '') + 'Events', results[g].totalEvents);
      html += testStat((hasGroups ? escHtml(g) + ' ' : '') + 'Median Survival', results[g].median !== null ? results[g].median : 'Not reached');
    });
    if (logRankP !== null) html += testStat('Log-rank p', logRankP, pClass(logRankP));
    html += '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Kaplan-Meier Table</div>' + tableHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Survival Curve</div>' +
        '<canvas id="' + chartId + '" width="500" height="300" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawSurvivalCurve(chartId, curves);
    showNextSteps('causal', { n: n });
  }

  /* ==================================================================
     Multiple Imputation
     ================================================================== */
  function runMultipleImputation(columns, labels) {
    var nCols = columns.length;
    // Equalize lengths
    var maxLen = 0;
    columns.forEach(function(c) { if (c.length > maxLen) maxLen = c.length; });
    columns = columns.map(function(c) {
      while (c.length < maxLen) c.push(NaN);
      return c;
    });
    var n = maxLen;

    // Analyze missing pattern
    var missingCount = new Array(nCols).fill(0);
    var missingPct = [];
    for (var j = 0; j < nCols; j++) {
      columns[j].forEach(function(v) { if (isNaN(v)) missingCount[j]++; });
      missingPct.push(round4(missingCount[j] / n * 100));
    }

    // Multiple imputation: mean imputation with noise (M=5 imputations)
    var M = 5;
    var pooledValues = [];
    for (var j = 0; j < nCols; j++) {
      // Compute column mean and SD from observed values
      var observed = columns[j].filter(function(v) { return !isNaN(v); });
      var colMean = 0; observed.forEach(function(v) { colMean += v; }); colMean /= (observed.length || 1);
      var colSD = 0; observed.forEach(function(v) { colSD += (v - colMean) * (v - colMean); });
      colSD = Math.sqrt(colSD / (observed.length - 1 || 1));

      var imputedMeans = [];
      for (var m = 0; m < M; m++) {
        var imputed = columns[j].map(function(v) {
          if (isNaN(v)) {
            // Draw from N(mean, sd)
            var u1 = Math.random(), u2 = Math.random();
            var z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
            return colMean + z * colSD;
          }
          return v;
        });
        var impMean = 0; imputed.forEach(function(v) { impMean += v; }); impMean /= n;
        imputedMeans.push(impMean);
      }
      // Pool: average of imputed means
      var pooled = 0; imputedMeans.forEach(function(v) { pooled += v; }); pooled /= M;
      pooledValues.push(round4(pooled));
    }

    // Missing pattern
    var patternHtml = '<table class="coeff-table"><tr><th>Column</th><th>Observed</th><th>Missing</th><th>% Missing</th><th>Pooled Mean</th></tr>';
    for (var j = 0; j < nCols; j++) {
      patternHtml += '<tr><td>' + escHtml(labels[j]) + '</td><td>' + (n - missingCount[j]) + '</td><td>' + missingCount[j] + '</td><td>' + missingPct[j] + '%</td><td>' + pooledValues[j] + '</td></tr>';
    }
    patternHtml += '</table>';

    var totalMissing = 0; missingCount.forEach(function(v) { totalMissing += v; });
    var overallPct = round4(totalMissing / (n * nCols) * 100);

    var plainText = 'Multiple imputation (M=' + M + ') across ' + nCols + ' columns with ' + n + ' rows. ' +
      'Overall ' + overallPct + '% of values are missing. ' +
      'Pooled means were computed by averaging ' + M + ' stochastic imputations per column (mean + noise). ';
    if (overallPct < 5) plainText += 'Missing rate is low; results should be reliable.';
    else if (overallPct < 20) plainText += 'Missing rate is moderate; imputation helps reduce bias.';
    else plainText += 'Missing rate is high; interpret imputed results with caution.';

    var chartId = 'imputeChart_' + Date.now();
    var bars = [];
    for (var j = 0; j < nCols; j++) {
      bars.push({ label: labels[j], value: missingPct[j], color: missingPct[j] > 20 ? CHART_COLORS[6] : missingPct[j] > 5 ? CHART_COLORS[4] : CHART_COLORS[2] });
    }

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Summary</div><div class="test-results-grid">' +
        testStat('Columns', nCols) + testStat('Rows', n) + testStat('Overall Missing', overallPct + '%') + testStat('Imputations (M)', M) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Missing Pattern & Pooled Values</div>' + patternHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">% Missing per Column</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(120, bars.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, bars);
    showNextSteps('descriptive', { n: n });
  }

  /* ==================================================================
     Bayesian Hypothesis Testing
     ================================================================== */
  function runBayesian(a, b, descA, descB) {
    var nA = a.length, nB = b.length;
    var mA = 0, mB = 0;
    a.forEach(function(v) { mA += v; }); mA /= nA;
    b.forEach(function(v) { mB += v; }); mB /= nB;
    var sA = 0, sB = 0;
    a.forEach(function(v) { sA += (v - mA) * (v - mA); }); sA = Math.sqrt(sA / (nA - 1));
    b.forEach(function(v) { sB += (v - mB) * (v - mB); }); sB = Math.sqrt(sB / (nB - 1));

    // Welch t-test for p-value
    var se = Math.sqrt(sA * sA / nA + sB * sB / nB);
    var t = se > 0 ? (mA - mB) / se : 0;
    var df = Math.pow(sA * sA / nA + sB * sB / nB, 2) /
      (Math.pow(sA * sA / nA, 2) / (nA - 1) + Math.pow(sB * sB / nB, 2) / (nB - 1));
    df = Math.max(1, Math.floor(df));

    // p-value from t using normal approximation for large df
    function normalCDF(x) {
      var t = 1 / (1 + 0.2316419 * Math.abs(x));
      var d = 0.3989422804014327;
      var p = d * Math.exp(-x * x / 2) * (0.3193815 * t - 0.3565638 * t * t + 1.781478 * t * t * t - 1.821256 * t * t * t * t + 1.330274 * t * t * t * t * t);
      return x > 0 ? 1 - p : p;
    }
    var p = 2 * (1 - normalCDF(Math.abs(t)));

    // Effect size
    var pooledSD = Math.sqrt(((nA - 1) * sA * sA + (nB - 1) * sB * sB) / (nA + nB - 2));
    var d = pooledSD > 0 ? (mA - mB) / pooledSD : 0;

    // Bayes Factor (BF10) using Rouder's JZS approximation
    // BF10 approx = sqrt((nA+nB)/(nA*nB)) * (1 + t^2/df)^(-(df+1)/2) / (integral)
    // Simplified Cauchy prior BF approximation (Wagenmakers et al. 2007)
    var nEff = nA * nB / (nA + nB);
    var r = 0.707; // default Cauchy prior scale

    // BF10 via Savage-Dickey ratio approximation
    // Using the formula from Rouder et al. 2009 (simplified)
    var tSq = t * t;
    var v = df;
    // BF10 approx using JZS prior
    // Numerator: (1 + tSq/v)^(-(v+1)/2)
    // Denominator: integral over g of (1 + nEff*g)^(-1/2) * (1 + tSq/(v*(1+nEff*g)))^(-(v+1)/2) * (2*pi)^(-1/2) * g^(-3/2) * exp(-1/(2*g*r^2))
    // Simplified: Use the BIC approximation
    var BIC_H1 = -2 * (-0.5 * (nA + nB) * Math.log(2 * Math.PI) - (nA + nB) * Math.log(pooledSD > 0 ? pooledSD : 1) - 0.5 * tSq);
    var BIC_H0 = -2 * (-0.5 * (nA + nB) * Math.log(2 * Math.PI) - (nA + nB) * Math.log(pooledSD > 0 ? pooledSD : 1));

    // Better: BF10 = sqrt(1 + nEff * r^2) * exp(-0.5 * tSq * nEff * r^2 / (1 + nEff * r^2))
    // when t is moderate this works well
    var g = nEff * r * r;
    var bf10 = Math.sqrt((1 + g) / (1)) * Math.pow(1 + tSq * g / ((1 + g) * v), -(v + 1) / 2) /
               Math.pow(1 + tSq / v, -(v + 1) / 2);

    // Clamp BF to reasonable range
    if (!isFinite(bf10) || isNaN(bf10)) bf10 = tSq > 4 ? 10 : 0.5;
    bf10 = Math.max(0.001, Math.min(bf10, 99999));
    var bf01 = 1 / bf10;

    // Evidence category
    var evidence;
    if (bf10 > 100) evidence = 'Extreme evidence for H1';
    else if (bf10 > 30) evidence = 'Very strong evidence for H1';
    else if (bf10 > 10) evidence = 'Strong evidence for H1';
    else if (bf10 > 3) evidence = 'Moderate evidence for H1';
    else if (bf10 > 1) evidence = 'Anecdotal evidence for H1';
    else if (bf10 > 1/3) evidence = 'Anecdotal evidence (inconclusive)';
    else if (bf10 > 1/10) evidence = 'Moderate evidence for H0';
    else if (bf10 > 1/30) evidence = 'Strong evidence for H0';
    else evidence = 'Very strong evidence for H0';

    var plainText = 'Bayesian independent samples test comparing ' + descA + ' and ' + descB + '. ' +
      'BF10 = ' + round4(bf10) + ', meaning there is ' + (bf10 > 1 ? round4(bf10) + 'x more' : round4(bf01) + 'x less') +
      ' evidence for a difference than for no difference. ' +
      'Interpretation: ' + evidence + '. ' +
      'Frequentist t(' + df + ') = ' + round4(t) + ', p = ' + round6(p) + ', Cohen\'s d = ' + round4(d) + '.';

    var chartId = 'bayesChart_' + Date.now();

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Bayesian Results</div><div class="test-results-grid">' +
        testStat('BF<sub>10</sub>', round4(bf10)) + testStat('BF<sub>01</sub>', round4(bf01)) +
        testStat('Evidence', evidence) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Frequentist Summary</div><div class="test-results-grid">' +
        testStat('t-statistic', round4(t)) + testStat('p-value', round6(p), pClass(p)) +
        testStat('df', df) + testStat("Cohen's d", round4(d)) + testStat('n', nA + nB) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Bayes Factor Gauge</div>' +
        '<canvas id="' + chartId + '" width="500" height="120" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBayesGauge(chartId, bf10);
    showNextSteps('causal', { na: a.length, nb: b.length });
  }

  /* ==================================================================
     Survival Curve (Step Function)
     ================================================================== */
  function drawSurvivalCurve(canvasId, curves) {
    var c = initCanvas(canvasId, 500, 300);
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();
    var pad = { left: 60, right: 20, top: 20, bottom: 50 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;

    // Find max time across all curves
    var maxTime = 0;
    var groupNames = Object.keys(curves);
    groupNames.forEach(function(g) {
      curves[g].forEach(function(pt) { if (pt.time > maxTime) maxTime = pt.time; });
    });
    if (maxTime === 0) maxTime = 1;

    function px(t) { return pad.left + (t / maxTime) * cw; }
    function py(s) { return pad.top + ch - s * ch; }

    // Axes
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + ch);
    ctx.lineTo(pad.left + cw, pad.top + ch);
    ctx.stroke();

    // Y axis labels
    ctx.fillStyle = colors.subtext;
    ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (var s = 0; s <= 1; s += 0.25) {
      var yy = py(s);
      ctx.fillText(s.toFixed(2), pad.left - 8, yy);
      ctx.strokeStyle = colors.border;
      ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(pad.left + cw, yy); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // X axis labels
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    var nTicks = 5;
    for (var i = 0; i <= nTicks; i++) {
      var t = (maxTime / nTicks) * i;
      ctx.fillText(round2(t), px(t), pad.top + ch + 8);
    }

    // Axis labels
    ctx.fillStyle = colors.text;
    ctx.font = '600 12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Time', pad.left + cw / 2, h - 8);
    ctx.save();
    ctx.translate(14, pad.top + ch / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Survival', 0, 0);
    ctx.restore();

    // Draw each curve as step function
    groupNames.forEach(function(g, gi) {
      var pts = curves[g];
      ctx.strokeStyle = CHART_COLORS[gi % CHART_COLORS.length];
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (var i = 0; i < pts.length; i++) {
        var x = px(pts[i].time);
        var y = py(pts[i].survival);
        if (i === 0) ctx.moveTo(x, y);
        else {
          // Step: horizontal then vertical
          ctx.lineTo(x, py(pts[i - 1].survival));
          ctx.lineTo(x, y);
        }
      }
      // Extend to max time
      if (pts.length > 0) {
        ctx.lineTo(px(maxTime), py(pts[pts.length - 1].survival));
      }
      ctx.stroke();
    });

    // Legend
    if (groupNames.length > 1 || (groupNames.length === 1 && groupNames[0] !== 'All')) {
      var legendY = pad.top + 5;
      groupNames.forEach(function(g, gi) {
        ctx.fillStyle = CHART_COLORS[gi % CHART_COLORS.length];
        ctx.fillRect(pad.left + cw - 100, legendY + gi * 18, 12, 12);
        ctx.fillStyle = colors.text;
        ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(g, pad.left + cw - 84, legendY + gi * 18 + 10);
      });
    }
  }

  /* ==================================================================
     Bayesian Gauge (Horizontal evidence bar)
     ================================================================== */
  function drawBayesGauge(canvasId, bf10) {
    var c = initCanvas(canvasId, 500, 120);
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();
    var pad = { left: 40, right: 40, top: 25, bottom: 35 };
    var cw = w - pad.left - pad.right;
    var barH = 30;
    var barY = pad.top + 10;

    // Log scale: BF from 1/100 to 100, center at 1
    var logBF = Math.log10(Math.max(0.01, Math.min(100, bf10)));
    // Map -2 to 2 onto 0 to cw
    var pos = ((logBF + 2) / 4) * cw;

    // Color zones
    var zones = [
      { from: 0, to: 0.25, color: '#2ecc71', label: 'H0 strong' },
      { from: 0.25, to: 0.4, color: '#82e0aa', label: 'H0 mod' },
      { from: 0.4, to: 0.5, color: '#f9e79f', label: '' },
      { from: 0.5, to: 0.6, color: '#f9e79f', label: '' },
      { from: 0.6, to: 0.75, color: '#f5b7b1', label: 'H1 mod' },
      { from: 0.75, to: 1, color: '#e74c3c', label: 'H1 strong' }
    ];

    zones.forEach(function(z) {
      ctx.fillStyle = z.color;
      ctx.globalAlpha = 0.4;
      var x1 = pad.left + z.from * cw;
      var x2 = pad.left + z.to * cw;
      ctx.fillRect(x1, barY, x2 - x1, barH);
    });
    ctx.globalAlpha = 1;

    // Border
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 1;
    ctx.strokeRect(pad.left, barY, cw, barH);

    // Center line (BF = 1)
    ctx.strokeStyle = colors.text;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(pad.left + cw / 2, barY - 5);
    ctx.lineTo(pad.left + cw / 2, barY + barH + 5);
    ctx.stroke();
    ctx.setLineDash([]);

    // Marker
    var markerX = pad.left + Math.max(0, Math.min(cw, pos));
    ctx.fillStyle = colors.rose || '#D4587A';
    ctx.beginPath();
    ctx.arc(markerX, barY + barH / 2, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Labels
    ctx.fillStyle = colors.text;
    ctx.font = '600 12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('BF\u2081\u2080 = ' + round4(bf10), markerX, barY + barH + 10);

    ctx.fillStyle = colors.subtext;
    ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Evidence for H0', pad.left, barY - 15);
    ctx.textAlign = 'right';
    ctx.fillText('Evidence for H1', pad.left + cw, barY - 15);
    ctx.textAlign = 'center';
    ctx.fillText('1', pad.left + cw / 2, barY + barH + 10 + 16);

    // Scale labels
    ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('1/100', pad.left, barY + barH + 28);
    ctx.fillText('1/10', pad.left + cw * 0.25, barY + barH + 28);
    ctx.fillText('10', pad.left + cw * 0.75, barY + barH + 28);
    ctx.fillText('100', pad.left + cw, barY + barH + 28);
  }

    function bindEvents() {
      var textareas = section.querySelectorAll('.conjoint-data');

      function checkReady() {
        var ratingsTA = section.querySelector('.conjoint-data[data-idx="0"]');
        var ratings = parseValues(ratingsTA.value).nums;
        if (ratings.length < 4) { runBtn.disabled = true; return; }
        var allGood = true;
        for (var i = 1; i <= attrCount; i++) {
          var ta = section.querySelector('.conjoint-data[data-idx="' + i + '"]');

      }

      textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');
          var type = ta.getAttribute('data-type');
          var countEl = section.querySelector('.conjoint-count[data-idx="' + idx + '"]');
          if (type === 'numeric') {
            updateCount(ta, countEl);
          } else {
            var lines = parseCategorical(ta.value);
            if (lines.length === 0) {
              countEl.textContent = 'No values detected';
              countEl.className = 'value-count';
            } else {
              countEl.textContent = lines.length + ' value' + (lines.length !== 1 ? 's' : '') + ' detected';
              countEl.className = 'value-count valid';
            }
          }
          checkReady();
        });
      });

      var addBtn = section.querySelector('#addAttrBtn');
      if (addBtn) addBtn.addEventListener('click', function() {
        attrCount++;
        buildGrid();
        bindEvents();
      });
      var removeBtn = section.querySelector('#removeAttrBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() {
        if (attrCount > 2) { attrCount--; buildGrid(); bindEvents(); }
      });

      runBtn.addEventListener('click', function() {
        var ratings = parseValues(section.querySelector('.conjoint-data[data-idx="0"]').value).nums;
        var attrs = [];
        for (var i = 1; i <= attrCount; i++) {
          attrs.push(parseCategorical(section.querySelector('.conjoint-data[data-idx="' + i + '"]').value));
        }

        runConjoint(ratings, attrs);
      });
    }
    bindEvents();
  }

  function runConjoint(ratings, attrs) {
    var n = ratings.length;
    var nAttrs = attrs.length;

    // Dummy-code attributes and run OLS
    // For each attribute, find unique levels, pick first as reference
    var attrInfo = [];
    var dummyCols = [];
    var colNames = [];
    for (var a = 0; a < nAttrs; a++) {
      var levels = [];
      var seen = {};
      for (var i = 0; i < n; i++) {
        var v = attrs[a][i];
        if (!seen[v]) { levels.push(v); seen[v] = true; }
      }
      attrInfo.push({ name: 'Attribute ' + (a + 1), levels: levels, ref: levels[0] });
      // Create dummy columns for levels[1..end]
      for (var li = 1; li < levels.length; li++) {
        var col = [];
        for (var i = 0; i < n; i++) {
          col.push(attrs[a][i] === levels[li] ? 1 : 0);
        }
        dummyCols.push(col);
        colNames.push({ attr: a, level: levels[li] });
      }
    }

    // OLS: Y = X * beta
    var p = dummyCols.length;
    // Build X matrix with intercept
    var X = [];
    for (var i = 0; i < n; i++) {
      var row = [1];
      for (var j = 0; j < p; j++) row.push(dummyCols[j][i]);
      X.push(row);
    }
    var Xt = transposeMatrix(X);
    var XtX = multiplyMatrices(Xt, X);
    var XtXinv = invertMatrix(XtX);
    if (!XtXinv) { showError('Could not compute conjoint analysis. Check that your attribute columns have variation.'); return; }
    var Xty = [];
    for (var j = 0; j < p + 1; j++) {
      var s = 0;
      for (var i = 0; i < n; i++) s += X[i][j] * ratings[i];
      Xty.push(s);
    }
    var beta = [];
    for (var j = 0; j < p + 1; j++) {
      var s = 0;
      for (var k = 0; k < p + 1; k++) s += XtXinv[j][k] * Xty[k];
      beta.push(s);
    }

    // R-squared
    var meanY = ratings.reduce(function(a, b) { return a + b; }, 0) / n;
    var SST = 0, SSR = 0;
    for (var i = 0; i < n; i++) {
      var pred = beta[0];
      for (var j = 0; j < p; j++) pred += beta[j + 1] * dummyCols[j][i];
      SSR += Math.pow(ratings[i] - pred, 2);
      SST += Math.pow(ratings[i] - meanY, 2);
    }
    var rSquared = SST > 0 ? 1 - SSR / SST : 0;

    // Part-worths: for each attribute, the reference level gets 0, others get beta
    // Attribute importance: range of part-worths per attribute / sum of all ranges
    var partWorths = [];
    var betaIdx = 0;
    var ranges = [];
    for (var a = 0; a < nAttrs; a++) {
      var pw = [{ level: attrInfo[a].ref, value: 0 }];
      var minPW = 0, maxPW = 0;
      for (var li = 1; li < attrInfo[a].levels.length; li++) {
        var val = beta[betaIdx + 1];
        pw.push({ level: attrInfo[a].levels[li], value: val });
        if (val < minPW) minPW = val;
        if (val > maxPW) maxPW = val;
        betaIdx++;
      }
      partWorths.push(pw);
      ranges.push(maxPW - minPW);
    }

    var totalRange = ranges.reduce(function(a, b) { return a + b; }, 0) || 1;
    var importance = ranges.map(function(r) { return (r / totalRange) * 100; });

    // Build results
    var chartId = 'conjointChart_' + Date.now();
    var pwHtml = '<table class="partworth-table"><tr><th>Attribute</th><th>Level</th><th>Part-Worth</th></tr>';
    for (var a = 0; a < nAttrs; a++) {
      var maxAbs = 0;
      partWorths[a].forEach(function(pw) { if (Math.abs(pw.value) > maxAbs) maxAbs = Math.abs(pw.value); });
      for (var li = 0; li < partWorths[a].length; li++) {
        var cls = Math.abs(partWorths[a][li].value) === maxAbs && maxAbs > 0 ? ' class="high-pw"' : '';
        pwHtml += '<tr><td>' + (li === 0 ? escHtml(attrInfo[a].name) : '') + '</td>' +
          '<td>' + escHtml(partWorths[a][li].level) + (li === 0 ? ' (ref)' : '') + '</td>' +
          '<td' + cls + '>' + round4(partWorths[a][li].value) + '</td></tr>';
      }
    }
    pwHtml += '</table>';

    // Plain English
    var topAttr = 0;
    for (var a = 1; a < nAttrs; a++) { if (importance[a] > importance[topAttr]) topAttr = a; }
    var plainText = 'Conjoint analysis of ' + n + ' profiles reveals that ' + attrInfo[topAttr].name + ' is the most important attribute (' + round2(importance[topAttr]) + '% relative importance). ';
    plainText += 'The model explains ' + round2(rSquared * 100) + '% of the variation in ratings (R\u00B2 = ' + round4(rSquared) + '). ';
    for (var a = 0; a < nAttrs; a++) {
      var best = partWorths[a][0], worst = partWorths[a][0];
      partWorths[a].forEach(function(pw) { if (pw.value > best.value) best = pw; if (pw.value < worst.value) worst = pw; });
      plainText += attrInfo[a].name + ': "' + best.level + '" is most preferred and "' + worst.level + '" is least preferred. ';
    }

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Part-Worths (Utility Scores)</div>' + pwHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Model Fit</div><div class="test-results-grid">' +
        testStat('R\u00B2', round4(rSquared)) + testStat('Profiles', n) + testStat('Attributes', nAttrs) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Attribute Importance</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(150, nAttrs * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = [];
    for (var a = 0; a < nAttrs; a++) {
      bars.push({ label: attrInfo[a].name, value: importance[a], color: CHART_COLORS[a % CHART_COLORS.length] });
    }
    drawBarChart(chartId, bars);
    showNextSteps('preference', { n: n });
  }

  function showMaxDiffInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';

    // Step 1: enter item names
    section.innerHTML =

    container.appendChild(section);
    scrollToBottom();

    var itemsTA = section.querySelector('#maxdiffItems');
    var step2 = section.querySelector('#maxdiffStep2');
    var runBtn = section.querySelector('#runBtn');
    var currentItems = [];

    itemsTA.addEventListener('input', function() {
      var items = parseCategorical(itemsTA.value);
      if (items.length < 2) {
        step2.innerHTML = '';
        runBtn.disabled = true;
        return;
      }
      currentItems = items;
      var tableHtml =
        '<div class="group-card" style="margin-top:1rem;overflow-x:auto">' +
        '<div class="group-card-label">Best/Worst Counts</div>' +
        '<div class="step-notice" style="margin-top:0;margin-bottom:0.75rem">Step 2: For each item, enter how many times it was chosen as Best, Worst, and how many times it was shown.</div>' +
        '<table class="maxdiff-grid"><tr><th>Item</th><th>Best Count</th><th>Worst Count</th><th>Times Shown</th></tr>';
      items.forEach(function(item, i) {
        tableHtml += '<tr>' +
          '<td>' + escHtml(item) + '</td>' +
          '<td><input type="number" class="md-best" data-idx="' + i + '" min="0" value="0"></td>' +
          '<td><input type="number" class="md-worst" data-idx="' + i + '" min="0" value="0"></td>' +
          '<td><input type="number" class="md-shown" data-idx="' + i + '" min="1" value="1"></td>' +
          '</tr>';
      });
      tableHtml += '</table></div>';
      step2.innerHTML = tableHtml;

      // Bind events on grid inputs
      step2.querySelectorAll('input[type="number"]').forEach(function(inp) {
        inp.addEventListener('input', checkGridReady);
      });
      checkGridReady();
    });

    function checkGridReady() {
      if (currentItems.length < 2) { runBtn.disabled = true; return; }
      var allGood = true;
      for (var i = 0; i < currentItems.length; i++) {
        var shown = parseInt(section.querySelector('.md-shown[data-idx="' + i + '"]').value) || 0;
        if (shown < 1) { allGood = false; break; }
      }
      runBtn.disabled = !allGood;
    }

    runBtn.addEventListener('click', function() {
      var items = currentItems.slice();
      var data = [];
      for (var i = 0; i < items.length; i++) {
        data.push({
          item: items[i],
          best: parseInt(section.querySelector('.md-best[data-idx="' + i + '"]').value) || 0,
          worst: parseInt(section.querySelector('.md-worst[data-idx="' + i + '"]').value) || 0,
          shown: parseInt(section.querySelector('.md-shown[data-idx="' + i + '"]').value) || 1
        });
      }
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      runMaxDiff(data);
    });
  }

  function runMaxDiff(data) {
    var n = data.length;
    // BW score = best - worst
    // Standardized score = BW / shown
    data.forEach(function(d) {
      d.bw = d.best - d.worst;
      d.std = d.bw / d.shown;
    });

    // Sort by standardized score descending
    data.sort(function(a, b) { return b.std - a.std; });

    // Assign ranks
    data.forEach(function(d, i) { d.rank = i + 1; });

    // Rescale to 0-100
    var minStd = data[data.length - 1].std;
    var maxStd = data[0].std;
    var range = maxStd - minStd || 1;
    data.forEach(function(d) {
      d.score100 = ((d.std - minStd) / range) * 100;
    });

    // Build table
    var tableHtml = '<table class="partworth-table"><tr><th>Rank</th><th>Item</th><th>Best</th><th>Worst</th><th>BW Score</th><th>Std Score</th><th>Score (0-100)</th></tr>';
    data.forEach(function(d) {
      tableHtml += '<tr><td>' + d.rank + '</td><td style="text-align:left;font-weight:500">' + escHtml(d.item) + '</td>' +
        '<td>' + d.best + '</td><td>' + d.worst + '</td><td>' + d.bw + '</td>' +
        '<td>' + round4(d.std) + '</td><td>' + round2(d.score100) + '</td></tr>';
    });
    tableHtml += '</table>';

    // Plain English
    var topItem = data[0].item;
    var bottomItem = data[data.length - 1].item;
    var plainText = 'MaxDiff analysis of ' + n + ' items shows that "' + topItem + '" is the most preferred item (BW score = ' + data[0].bw + ') and "' + bottomItem + '" is the least preferred (BW score = ' + data[data.length - 1].bw + '). ';
    if (n >= 3) {
      plainText += 'The top 3 items are: ' + data.slice(0, Math.min(3, n)).map(function(d) { return '"' + d.item + '"'; }).join(', ') + '. ';
    }
    plainText += 'Items with positive BW scores are chosen as "Best" more often than "Worst," while negative scores indicate the opposite.';

    var chartId = 'maxdiffChart_' + Date.now();
    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Item Rankings</div>' + tableHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">BW Scores</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(150, n * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = data.map(function(d, i) {
      return { label: d.item, value: d.bw, color: d.bw >= 0 ? (CHART_COLORS[4] || '#3a9a5c') : (CHART_COLORS[6] || '#c0392b') };
    });
    drawBarChart(chartId, bars);
    showNextSteps('preference', {});
  }

  function runDiscreteChoice(chosen, attrs, nAlts) {
    var nSets = chosen.length;
    var nAttrs = attrs.length;

    // Conditional logit via iterative reweighted least squares (simplified)
    // Create choice indicator and attribute differences
    // For each choice set, create nAlts rows; Y=1 for chosen, 0 otherwise
    var Y = [];
    var X = []; // each row has nAttrs features
    for (var s = 0; s < nSets; s++) {
      var chosenIdx = Math.round(chosen[s]) - 1; // 1-based to 0-based
      for (var a = 0; a < nAlts; a++) {
        Y.push(a === chosenIdx ? 1 : 0);
        var row = [];
        for (var k = 0; k < nAttrs; k++) {
          row.push(attrs[k][s * nAlts + a]);
        }
        X.push(row);
      }
    }

    // Simple conditional logit via gradient descent
    var beta = new Array(nAttrs).fill(0);
    var lr = 0.01;
    var maxIter = 500;

    for (var iter = 0; iter < maxIter; iter++) {
      var grad = new Array(nAttrs).fill(0);
      for (var s = 0; s < nSets; s++) {
        // Compute exp(X*beta) for each alt in this set
        var exps = [];
        var sumExp = 0;
        for (var a = 0; a < nAlts; a++) {
          var idx = s * nAlts + a;
          var xb = 0;
          for (var k = 0; k < nAttrs; k++) xb += beta[k] * X[idx][k];
          xb = Math.max(-20, Math.min(20, xb)); // clamp
          var ev = Math.exp(xb);
          exps.push(ev);
          sumExp += ev;
        }
        for (var a = 0; a < nAlts; a++) {
          var idx = s * nAlts + a;
          var prob = exps[a] / sumExp;
          var err = Y[idx] - prob;
          for (var k = 0; k < nAttrs; k++) {
            grad[k] += err * X[idx][k];
          }
        }
      }
      for (var k = 0; k < nAttrs; k++) {
        beta[k] += lr * grad[k] / nSets;
      }
    }

    // Hit rate
    var hits = 0;
    for (var s = 0; s < nSets; s++) {
      var bestProb = -1, bestAlt = 0;
      var exps = [];
      var sumExp = 0;
      for (var a = 0; a < nAlts; a++) {
        var idx = s * nAlts + a;
        var xb = 0;
        for (var k = 0; k < nAttrs; k++) xb += beta[k] * X[idx][k];
        xb = Math.max(-20, Math.min(20, xb));
        var ev = Math.exp(xb);
        exps.push(ev);
        sumExp += ev;
      }
      for (var a = 0; a < nAlts; a++) {
        var prob = exps[a] / sumExp;
        if (prob > bestProb) { bestProb = prob; bestAlt = a; }
      }
      var chosenIdx = Math.round(chosen[s]) - 1;
      if (bestAlt === chosenIdx) hits++;
    }
    var hitRate = hits / nSets;
    var chanceRate = 1 / nAlts;

    // McFadden pseudo R-squared
    var llFull = 0, llNull = 0;
    for (var s = 0; s < nSets; s++) {
      var exps = [];
      var sumExp = 0;
      for (var a = 0; a < nAlts; a++) {
        var idx = s * nAlts + a;
        var xb = 0;
        for (var k = 0; k < nAttrs; k++) xb += beta[k] * X[idx][k];
        xb = Math.max(-20, Math.min(20, xb));
        var ev = Math.exp(xb);
        exps.push(ev);
        sumExp += ev;
      }
      var chosenIdx = Math.round(chosen[s]) - 1;
      llFull += Math.log(Math.max(1e-15, exps[chosenIdx] / sumExp));
      llNull += Math.log(1 / nAlts);
    }
    var pseudoR2 = 1 - llFull / llNull;

    // Build results
    var chartId = 'dcChart_' + Date.now();
    var coeffHtml = '<table class="coeff-table"><tr><th>Attribute</th><th>Coefficient</th><th>Direction</th></tr>';
    for (var k = 0; k < nAttrs; k++) {
      var dir = beta[k] > 0 ? 'Positive (increases choice probability)' : beta[k] < 0 ? 'Negative (decreases choice probability)' : 'No effect';
      coeffHtml += '<tr><td>Attribute ' + (k + 1) + '</td><td>' + round4(beta[k]) + '</td><td style="font-size:0.78rem;color:var(--text-2)">' + dir + '</td></tr>';
    }
    coeffHtml += '</table>';

    var plainText = 'Discrete choice model with ' + nSets + ' choice sets and ' + nAlts + ' alternatives per set. ';
    plainText += 'The model correctly predicts ' + round2(hitRate * 100) + '% of choices (vs ' + round2(chanceRate * 100) + '% by chance). ';
    plainText += 'McFadden pseudo R\u00B2 = ' + round4(pseudoR2) + '. ';
    var strongestIdx = 0;
    for (var k = 1; k < nAttrs; k++) { if (Math.abs(beta[k]) > Math.abs(beta[strongestIdx])) strongestIdx = k; }
    plainText += 'Attribute ' + (strongestIdx + 1) + ' has the strongest effect on choice (coefficient = ' + round4(beta[strongestIdx]) + ').';

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Coefficients</div>' + coeffHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Model Fit</div><div class="test-results-grid">' +
        testStat('Pseudo R\u00B2', round4(pseudoR2)) + testStat('Hit Rate', round2(hitRate * 100) + '%') +
        testStat('Chance Rate', round2(chanceRate * 100) + '%') + testStat('Choice Sets', nSets) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Coefficient Magnitudes</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(150, nAttrs * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = [];
    for (var k = 0; k < nAttrs; k++) {
      bars.push({ label: 'Attribute ' + (k + 1), value: beta[k], color: CHART_COLORS[k % CHART_COLORS.length] });
    }
    drawBarChart(chartId, bars);
    showNextSteps('preference', { n: nSets });
  }
