  // Top-box / Bottom-box card
  function renderTopBottomBox(topPct, botPct, topLabel, botLabel) {
    return '<div class="result-card"><div class="result-card-title">Top-Box / Bottom-Box</div>' +
      '<div style="display:flex;gap:1rem">' +
        '<div style="flex:1;padding:0.75rem;border-radius:10px;text-align:center;background:var(--green-soft);border:1px solid rgba(58,154,92,0.2)">' +
          '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em">Top-2 Box (' + topLabel + ')</div>' +
          '<div style="font-size:1.5rem;font-weight:700;color:var(--green);margin-top:0.3rem">' + topPct + '%</div></div>' +
        '<div style="flex:1;padding:0.75rem;border-radius:10px;text-align:center;background:var(--rose-soft);border:1px solid rgba(212,88,122,0.2)">' +
          '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em">Bottom-2 Box (' + botLabel + ')</div>' +
          '<div style="font-size:1.5rem;font-weight:700;color:var(--rose);margin-top:0.3rem">' + botPct + '%</div></div>' +
      '</div></div>';
  }

  // Distribution table with inline % bars
  function renderDistTable(rows, title) {
    var html = '<table class="freq-table"><tr><th>Response</th><th>Count</th><th>%</th></tr>';
    rows.forEach(function(row) {
      var barW = Math.min(row.pct, 100);
      html += '<tr><td>' + escHtml(String(row.value)) + '</td><td style="font-variant-numeric:tabular-nums">' + row.count + '</td>' +
        '<td class="pct-bar-cell"><span class="pct-bar" style="width:' + barW.toFixed(1) + '%"></span><span>' + row.pct.toFixed(1) + '%</span></td></tr>';
    });
    html += '</table>';
    return RC(title || 'Response Distribution', html);
  }

  // Plain English card (always at bottom)
  function renderPlainEnglish(text) {
    return '<div class="result-card plain-english"><div class="result-card-title">Plain English</div>' +
      '<div class="plain-english-text">' + text + '</div>' + makeCopyBtn(text) + '</div>';
  }

  // Collapsed details section
  function renderCollapsed(title, content) {
    return '<div class="result-card"><details><summary style="cursor:pointer;font-size:0.85rem;font-weight:600;color:var(--rose)">' + title + '</summary>' +
      '<div style="margin-top:0.75rem">' + content + '</div></details></div>';
  }

  // Canvas chart card
  function renderChart(chartId, title, width, height, footnote) {
    return '<div class="result-card"><div class="result-card-title">' + title + '</div>' +
      '<canvas id="' + chartId + '" width="' + width + '" height="' + height + '" style="width:100%;max-width:' + width + 'px;display:block;margin:0 auto;"></canvas>' +
      (footnote ? '<div style="font-size:0.75rem;color:var(--text-2);margin-top:8px">' + footnote + '</div>' : '') +
      '</div>';
  }

  // Big answer card (Yes/No, number, etc.)
  function renderBigAnswer(answer, subtitle, color) {
    return '<div class="result-card"><div style="text-align:center">' +
      '<div style="font-size:2.8rem;font-weight:700;color:' + (color || 'var(--rose)') + ';line-height:1">' + answer + '</div>' +
      (subtitle ? '<div style="font-size:0.88rem;color:var(--text-2);margin-top:0.4rem;line-height:1.5">' + subtitle + '</div>' : '') +
      '</div></div>';
  }

  // Group comparison cards (side by side boxes)
  function renderGroupCards(groups, labels, title) {
    var html = '<div class="result-card">' + (title ? '<div class="result-card-title">' + title + '</div>' : '');
    html += '<div style="display:flex;gap:0.6rem;flex-wrap:wrap">';
    for (var i = 0; i < groups.length; i++) {
      var vals = groups[i];
      var m = round2(StatsEngine._helpers.mean(vals));
      var med = round2(StatsEngine._helpers.median(vals));
      html += '<div style="flex:1;min-width:90px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:0.75rem;text-align:center">' +
        '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em">' + escHtml(labels[i]) + '</div>' +
        '<div style="font-size:1.5rem;font-weight:700;color:var(--text-0);margin:0.3rem 0">' + m + '</div>' +
        '<div style="font-size:0.72rem;color:var(--text-2)">median ' + med + ' &middot; n=' + vals.length + '</div>' +
      '</div>';
    }
    html += '</div>';
    return html;
  }

  // Polished significance badge
  function renderSigBadge(p) {
    var isSig = p < 0.05;
    return '<div style="text-align:center;margin-top:0.75rem">' +
      '<span style="display:inline-block;padding:0.3rem 0.9rem;border-radius:6px;font-size:0.82rem;font-weight:600;letter-spacing:0.02em;' +
      (isSig ? 'background:var(--green-soft);color:var(--green);border:1px solid rgba(58,154,92,0.2)' : 'background:var(--bg-1);color:var(--text-2);border:1px solid var(--border)') + '">' +
      (isSig ? 'Statistically significant (p = ' + round4(p) + ')' : 'Not statistically significant (p = ' + round4(p) + ')') +
      '</span></div>';
  }

  /* ==================================================================
     Generic Charts
     ================================================================== */

  // bars = [{label, value, sd, color}]
  function drawBarChart(canvasId, bars) {
    var c = initCanvas(canvasId, 500, Math.max(120, bars.length * 55 + 30));
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();

    var allVals = [];
    bars.forEach(function(b) {
      allVals.push(b.value + (b.sd || 0));
      allVals.push(b.value - (b.sd || 0));
      allVals.push(0);
    });
    var minVal = Math.min.apply(null, allVals);
    var maxVal = Math.max.apply(null, allVals);
    var range = maxVal - minVal || 1;
    var rangeMin = minVal - range * 0.1;
    var rangeMax = maxVal + range * 0.15;

    var leftPad = 130, rightPad = 60, topPad = 10;
    var barHeight = 28, barGap = 22;
    var chartW = w - leftPad - rightPad;

    function xPos(val) { return leftPad + ((val - rangeMin) / (rangeMax - rangeMin)) * chartW; }

    // Zero line
    if (rangeMin <= 0 && rangeMax >= 0) {
      ctx.strokeStyle = colors.border;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(xPos(0), topPad - 5);
      ctx.lineTo(xPos(0), topPad + bars.length * (barHeight + barGap));
      ctx.stroke();
    }

    bars.forEach(function(bar, i) {
      var y = topPad + i * (barHeight + barGap);
      var barStart = xPos(Math.min(0, bar.value));
      var barEnd = xPos(Math.max(0, bar.value));
      var bw = barEnd - barStart;

      ctx.fillStyle = bar.color || CHART_COLORS[i % CHART_COLORS.length];
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(barStart, y, bw, barHeight, 4);
      else ctx.rect(barStart, y, bw, barHeight);
      ctx.fill();
      ctx.globalAlpha = 1;

      if (bar.sd !== undefined && bar.sd !== null) {
        var errLeft = xPos(bar.value - bar.sd);
        var errRight = xPos(bar.value + bar.sd);
        var errY = y + barHeight / 2;
        ctx.strokeStyle = bar.color || CHART_COLORS[i % CHART_COLORS.length];
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(errLeft, errY); ctx.lineTo(errRight, errY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(errLeft, errY - 5); ctx.lineTo(errLeft, errY + 5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(errRight, errY - 5); ctx.lineTo(errRight, errY + 5); ctx.stroke();
      }

      ctx.fillStyle = colors.text;
      ctx.font = '500 12px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      var trunc = bar.label.length > 18 ? bar.label.substring(0, 16) + '...' : bar.label;
      ctx.fillText(trunc, leftPad - 10, y + barHeight / 2);

      ctx.fillStyle = colors.subtext;
      ctx.font = '600 12px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(typeof bar.value === 'number' ? bar.value.toFixed(2) : bar.value, barEnd + 8, y + barHeight / 2);
    });
  }

  // Scatter plot
  function drawScatterPlot(canvasId, x, y, xLabel, yLabel) {
    var c = initCanvas(canvasId, 500, 350);
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();
    var pad = { left: 60, right: 20, top: 20, bottom: 50 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;

    var xMin = Math.min.apply(null, x), xMax = Math.max.apply(null, x);
    var yMin = Math.min.apply(null, y), yMax = Math.max.apply(null, y);
    var xRange = xMax - xMin || 1, yRange = yMax - yMin || 1;
    xMin -= xRange * 0.05; xMax += xRange * 0.05;
    yMin -= yRange * 0.05; yMax += yRange * 0.05;
    xRange = xMax - xMin; yRange = yMax - yMin;

    function px(v) { return pad.left + ((v - xMin) / xRange) * cw; }
    function py(v) { return pad.top + ch - ((v - yMin) / yRange) * ch; }

    // Axes
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + ch);
    ctx.lineTo(pad.left + cw, pad.top + ch);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = colors.subtext;
    ctx.font = '500 11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(xLabel, pad.left + cw / 2, h - 10);
    ctx.save();
    ctx.translate(15, pad.top + ch / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(yLabel, 0, 0);
    ctx.restore();

    // Points
    ctx.fillStyle = colors.rose;
    ctx.globalAlpha = 0.6;
    for (var i = 0; i < x.length; i++) {
      ctx.beginPath();
      ctx.arc(px(x[i]), py(y[i]), 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Trend line (simple linear regression)
    var n = x.length;
    var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
    for (var i = 0; i < n; i++) { sumX += x[i]; sumY += y[i]; sumXY += x[i] * y[i]; sumX2 += x[i] * x[i]; }
    var slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    var intercept = (sumY - slope * sumX) / n;

    ctx.strokeStyle = colors.rose;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(px(xMin), py(slope * xMin + intercept));
    ctx.lineTo(px(xMax), py(slope * xMax + intercept));
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Histogram
  function drawHistogram(canvasId, values, numBins) {
    var c = initCanvas(canvasId, 500, 250);
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();
    var pad = { left: 55, right: 20, top: 20, bottom: 40 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;

    // Detect discrete data: all integers with <= 15 unique values
    var uniqueVals = {};
    var allInteger = true;
    values.forEach(function(v) {
      uniqueVals[v] = (uniqueVals[v] || 0) + 1;
      if (v !== Math.floor(v)) allInteger = false;
    });
    var uniqueKeys = Object.keys(uniqueVals);
    var isDiscrete = allInteger && uniqueKeys.length <= 15;
    var totalN = values.length;

    if (isDiscrete) {
      // Discrete mode: one bar per unique value, sorted numerically, show %
      var sorted = uniqueKeys.map(function(k) {
        return { label: k, count: uniqueVals[k], pct: uniqueVals[k] / totalN * 100 };
      }).sort(function(a, b) { return parseFloat(a.label) - parseFloat(b.label); });

      var maxPct = Math.max.apply(null, sorted.map(function(d) { return d.pct; }));
      var bw = cw / sorted.length;

      // Bars
      ctx.fillStyle = colors.rose;
      ctx.globalAlpha = 0.75;
      for (var i = 0; i < sorted.length; i++) {
        var bh = maxPct > 0 ? (sorted[i].pct / maxPct) * ch : 0;
        ctx.fillRect(pad.left + i * bw + 2, pad.top + ch - bh, bw - 4, bh);
      }
      ctx.globalAlpha = 1;

      // Value labels on bars
      ctx.fillStyle = colors.text;
      ctx.font = '600 10px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      for (var i = 0; i < sorted.length; i++) {
        var bh = maxPct > 0 ? (sorted[i].pct / maxPct) * ch : 0;
        if (sorted[i].pct > 0) {
          ctx.fillText(sorted[i].pct.toFixed(1) + '%', pad.left + i * bw + bw / 2, pad.top + ch - bh - 4);
        }
      }

      // Axes
      ctx.strokeStyle = colors.border;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top);
      ctx.lineTo(pad.left, pad.top + ch);
      ctx.lineTo(pad.left + cw, pad.top + ch);
      ctx.stroke();

      // X labels
      ctx.fillStyle = colors.subtext;
      ctx.font = '400 11px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      for (var i = 0; i < sorted.length; i++) {
        ctx.fillText(sorted[i].label, pad.left + i * bw + bw / 2, pad.top + ch + 16);
      }

      // Y labels (%)
      ctx.textAlign = 'right';
      ctx.fillText(maxPct.toFixed(0) + '%', pad.left - 6, pad.top + 5);
      ctx.fillText('0%', pad.left - 6, pad.top + ch + 4);
    } else {
      // Continuous mode: classic histogram with bins
      if (!numBins) numBins = Math.min(15, Math.max(5, Math.ceil(Math.sqrt(values.length))));
      var mn = Math.min.apply(null, values), mx = Math.max.apply(null, values);
      var range = mx - mn || 1;
      var binWidth = range / numBins;
      var bins = new Array(numBins);
      for (var i = 0; i < numBins; i++) bins[i] = 0;
      values.forEach(function(v) {
        var idx = Math.min(numBins - 1, Math.floor((v - mn) / binWidth));
        bins[idx]++;
      });
      var maxCount = Math.max.apply(null, bins);

      // Bars
      var bw = cw / numBins;
      ctx.fillStyle = colors.rose;
      ctx.globalAlpha = 0.7;
      for (var i = 0; i < numBins; i++) {
        var bh = maxCount > 0 ? (bins[i] / maxCount) * ch : 0;
        ctx.fillRect(pad.left + i * bw + 1, pad.top + ch - bh, bw - 2, bh);
      }
      ctx.globalAlpha = 1;

      // Axes
      ctx.strokeStyle = colors.border;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top);
      ctx.lineTo(pad.left, pad.top + ch);
      ctx.lineTo(pad.left + cw, pad.top + ch);
      ctx.stroke();

      // X labels
      ctx.fillStyle = colors.subtext;
      ctx.font = '400 10px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      for (var i = 0; i <= numBins; i += Math.max(1, Math.floor(numBins / 5))) {
        var v = mn + i * binWidth;
        ctx.fillText(v.toFixed(1), pad.left + i * bw, pad.top + ch + 15);
      }
      // Y label
      ctx.textAlign = 'right';
      ctx.fillText(maxCount, pad.left - 8, pad.top + 5);
      ctx.fillText('0', pad.left - 8, pad.top + ch + 4);
    }
  }

  /* ==================================================================
     t-test (using StatsEngine)
     ================================================================== */
  function runTTest(a, b, descA, descB) {
    var r = StatsEngine.ttest(a, b);
    var result = {
      na: a.length, nb: b.length,
      ma: round4(r.meanA), mb: round4(r.meanB),
      sa: round4(r.sdA), sb: round4(r.sdB),
      meda: round4(StatsEngine._helpers.median(a)), medb: round4(StatsEngine._helpers.median(b)),
      t: round4(r.t), p: round6(r.p),
      df: round2(r.df), d: round4(r.cohensD),
      ci_low: round4(r.ci95.lower), ci_high: round4(r.ci95.upper)
    };
    showTTestResults(result, descA, descB, a, b);
  }

  function showTTestResults(r, descA, descB, rawA, rawB) {
    var absD = Math.abs(r.d);
    var eff = effectLabel(absD);
    var pc = pClass(r.p);
    var higher = r.ma > r.mb ? descA : descB;
    var lower = r.ma > r.mb ? descB : descA;
    var chartId = 'meansChart_' + Date.now();

    var html = '<div class="results-section">';

    // Group comparison + significance
    html += renderGroupCards(rawA && rawB ? [rawA, rawB] : [[r.ma], [r.mb]], [descA, descB], 'Group Comparison');
    html += renderSigBadge(r.p) + '</div>';

    // Means bar chart
    html += renderChart(chartId, 'Mean Comparison', 500, 180);

    // Per-group distribution
    if (rawA && rawB) html += groupDistTable([rawA, rawB], [descA, descB]);

    // Collapsed details
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 't-statistic', value: r.t },
        { label: 'p-value', value: r.p, cls: pc },
        { label: 'df', value: r.df },
        { label: "Cohen's d", value: r.d },
        { label: '95% CI', value: '[' + r.ci_low + ', ' + r.ci_high + ']' }
      ]) +
      '<div class="effect-interpretation">Effect size: <strong>' + eff + '</strong> (|d| < 0.2 = negligible, 0.2\u20130.5 = small, 0.5\u20130.8 = medium, > 0.8 = large)</div>'
    );

    // Plain English
    var plainText = r.p < 0.05 ?
      higher + ' scores significantly higher than ' + lower + ' (mean ' + (r.ma > r.mb ? r.ma : r.mb) + ' vs ' + (r.ma > r.mb ? r.mb : r.ma) + '). The difference is ' + eff + '.' :
      'No significant difference between ' + descA + ' (mean ' + r.ma + ') and ' + descB + ' (mean ' + r.mb + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: descA, value: r.ma, sd: r.sa, color: CHART_COLORS[0] },
      { label: descB, value: r.mb, sd: r.sb, color: CHART_COLORS[1] }
    ]);
    showNextSteps('group_comparison', { na: r.na, nb: r.nb, p: r.p });
  }

  /* ==================================================================
     Paired t-test
     ================================================================== */
  function runPairedTTest(a, b, descA, descB) {
    if (a.length !== b.length) {
      showError('Both columns must have the same number of values (each row is one person measured twice). Yours have ' + a.length + ' and ' + b.length + ' values. Check if you missed a row when pasting.');
      return;
    }
    var r = StatsEngine.pairedTTest(a, b);
    var pc = pClass(r.p);
    var eff = effectLabel(r.cohensD);
    var chartId = 'pairedChart_' + Date.now();
    var mA = round2(StatsEngine._helpers.mean(a)), mB = round2(StatsEngine._helpers.mean(b));

    var html = '<div class="results-section">';
    html += renderGroupCards([a, b], [descA, descB], 'Paired Comparison');
    html += renderSigBadge(r.p) + '</div>';

    html += renderChart(chartId, 'Mean Comparison', 500, 180);

    html += groupDistTable([a, b], [descA, descB]);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 't', value: round4(r.t) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: 'df', value: r.df },
        { label: "Cohen's d", value: round4(r.cohensD) },
        { label: 'Mean Diff', value: round4(r.meanDiff) },
        { label: '95% CI', value: '[' + round4(r.ci95.lower) + ', ' + round4(r.ci95.upper) + ']' }
      ]) +
      '<div class="effect-interpretation">Effect size: <strong>' + eff + '</strong></div>'
    );

    var higher = mA > mB ? descA : descB;
    var plainText = r.p < 0.05 ?
      higher + ' scores significantly higher (mean ' + Math.max(mA, mB) + ' vs ' + Math.min(mA, mB) + '). Effect is ' + eff + '.' :
      'No significant difference between ' + descA + ' (mean ' + mA + ') and ' + descB + ' (mean ' + mB + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: descA, value: mA, sd: round2(StatsEngine._helpers.sd(a, 1)), color: CHART_COLORS[0] },
      { label: descB, value: mB, sd: round2(StatsEngine._helpers.sd(b, 1)), color: CHART_COLORS[1] }
    ]);
    showNextSteps('paired', r);
  }

  /* ==================================================================
     One-way ANOVA
     ================================================================== */
  function runAnova(groups, labels) {
    var r = StatsEngine.anova(groups);
    var pc = pClass(r.p);
    var chartId = 'anovaChart_' + Date.now();

    var html = '<div class="results-section">';

    // Group comparison card with significance
    html += renderGroupCards(groups, labels, 'Group Comparison');
    html += renderSigBadge(r.p) + '</div>';

    // Means bar chart
    var sds = [];
    for (var i = 0; i < r.k; i++) sds.push(StatsEngine._helpers.sd(groups[i], 1));
    html += renderChart(chartId, 'Mean Comparison', 500, Math.max(180, r.k * 55 + 30));

    // Per-group distribution
    html += groupDistTable(groups, labels);

    // Post-hoc (only if significant)
    if (r.p < 0.05 && r.posthoc && r.posthoc.length > 0) {
      var phHtml = '<table class="posthoc-table"><tr><th>Comparison</th><th>Mean Diff</th><th>p (Bonf.)</th><th>Cohen\'s d</th></tr>';
      r.posthoc.forEach(function(ph) {
        var sig = ph.pBonferroni < 0.05 ? ' style="font-weight:700;color:var(--green)"' : '';
        phHtml += '<tr><td>' + escHtml(labels[ph.groupA]) + ' vs ' + escHtml(labels[ph.groupB]) + '</td>' +
          '<td>' + round4(ph.meanDiff) + '</td>' +
          '<td' + sig + '>' + round6(ph.pBonferroni) + '</td><td>' + round4(ph.cohensD) + '</td></tr>';
      });
      phHtml += '</table>';
      html += RC('Which Groups Differ? (Post-Hoc)', phHtml);
    }

    // Statistical details (collapsed)
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'F-statistic', value: round4(r.F) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: 'df (between)', value: r.dfBetween },
        { label: 'df (within)', value: r.dfWithin },
        { label: 'Eta-squared', value: round4(r.etaSquared) },
        { label: 'Grand Mean', value: round4(r.grandMean) }
      ])
    );

    // Plain English
    var best = { mean: -Infinity, label: '' }, worst = { mean: Infinity, label: '' };
    for (var i = 0; i < r.k; i++) {
      if (r.groupMeans[i] > best.mean) { best = { mean: r.groupMeans[i], label: labels[i] }; }
      if (r.groupMeans[i] < worst.mean) { worst = { mean: r.groupMeans[i], label: labels[i] }; }
    }
    var plainText = r.p < 0.05 ?
      'There is a significant difference across ' + r.k + ' groups. ' + best.label + ' scores highest (mean ' + round2(best.mean) + ') and ' + worst.label + ' scores lowest (mean ' + round2(worst.mean) + ').' :
      'No significant difference found across ' + r.k + ' groups (p = ' + round4(r.p) + '). The groups perform similarly.';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = [];
    for (var i = 0; i < r.k; i++) {
      bars.push({ label: labels[i], value: r.groupMeans[i], sd: sds[i], color: CHART_COLORS[i % CHART_COLORS.length] });
    }
    drawBarChart(chartId, bars);
    showNextSteps('group_comparison', r);
  }

  /* ==================================================================
     Mann-Whitney U
     ================================================================== */
  function runMannWhitney(a, b, descA, descB) {
    var r = StatsEngine.mannWhitney(a, b);
    var pc = pClass(r.p);
    var medA = round4(StatsEngine._helpers.median(a));
    var medB = round4(StatsEngine._helpers.median(b));
    var chartId = 'mwChart_' + Date.now();

    var html = '<div class="results-section">';

    // Group comparison card with significance
    html += renderGroupCards([a, b], [descA, descB], 'Group Comparison');
    html += renderSigBadge(r.p) + '</div>';

    // Median bar chart
    html += renderChart(chartId, 'Median Comparison', 500, 180);

    // Per-group distribution
    html += groupDistTable([a, b], [descA, descB]);

    // Statistical details (collapsed)
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'U statistic', value: round2(r.U) },
        { label: 'z', value: round4(r.z) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: 'Effect size r', value: round4(r.r) }
      ])
    );

    // Plain English
    var higher = medA >= medB ? descA : descB;
    var lower = medA >= medB ? descB : descA;
    var plainText = r.p < 0.05 ?
      higher + ' scores significantly higher than ' + lower + ' (median ' + Math.max(medA, medB) + ' vs ' + Math.min(medA, medB) + ').' :
      'No significant difference between ' + descA + ' (median ' + medA + ') and ' + descB + ' (median ' + medB + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: descA, value: medA, color: CHART_COLORS[0] },
      { label: descB, value: medB, color: CHART_COLORS[1] }
    ]);
    showNextSteps('group_comparison', r);
  }

  /* ==================================================================
     Chi-Square
     ================================================================== */
  function runChiSquare(observed) {
    var r = StatsEngine.chiSquare(observed);
    var interp = StatsEngine.interpret.chiSquare(r);
    var pc = pClass(r.p);

    var plainText = interp.summary + ' ' + interp.details;

    // Expected table
    var expHtml = '<table class="expected-table"><tr><th></th>';
    for (var c = 0; c < r.expected[0].length; c++) expHtml += '<th>Col ' + (c + 1) + '</th>';
    expHtml += '</tr>';
    for (var rr = 0; rr < r.expected.length; rr++) {
      expHtml += '<tr><th>Row ' + (rr + 1) + '</th>';
      for (var c = 0; c < r.expected[rr].length; c++) {
        var cls = r.expected[rr][c] < 5 ? ' class="small-expected"' : '';
        expHtml += '<td' + cls + '>' + round2(r.expected[rr][c]) + '</td>';
      }
      expHtml += '</tr>';
    }
    expHtml += '</table>';

    // Observed vs Expected bar chart
    var chartId = 'chiChart_' + Date.now();
    var bars = [];
    for (var rr = 0; rr < observed.length; rr++) {
      for (var c = 0; c < observed[rr].length; c++) {
        bars.push({ label: 'R' + (rr+1) + 'C' + (c+1) + ' Obs', value: observed[rr][c], color: CHART_COLORS[0] });
        bars.push({ label: 'R' + (rr+1) + 'C' + (c+1) + ' Exp', value: round2(r.expected[rr][c]), color: CHART_COLORS[1] });
      }
    }

    var warningHtml = r.warning ? '<div class="effect-interpretation" style="color:var(--amber)">Warning: ' + r.warning + '</div>' : '';

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('Chi-Square', round4(r.chiSquare)) + testStat('p-value', round6(r.p), pc) +
        testStat('df', r.df) + testStat("Cramer's V", round4(r.cramersV)) +
      '</div>' + warningHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Expected Frequencies</div>' + expHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Observed vs Expected</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(180, bars.length * 30 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, bars);
    showNextSteps('group_comparison', r);
  }

  /* ==================================================================
     Pearson Correlation
     ================================================================== */
  function runPearson(x, y, descX, descY) {
    if (x.length !== y.length) { var ml = Math.min(x.length, y.length); x = x.slice(0, ml); y = y.slice(0, ml); }
    var r = StatsEngine.pearson(x, y);
    var pc = pClass(r.p);
    var chartId = 'scatterPlot_' + Date.now();
    var strength = Math.abs(r.r) < 0.1 ? 'negligible' : Math.abs(r.r) < 0.3 ? 'weak' : Math.abs(r.r) < 0.5 ? 'moderate' : Math.abs(r.r) < 0.7 ? 'strong' : 'very strong';
    var direction = r.r > 0 ? 'positive' : r.r < 0 ? 'negative' : 'no';

    var html = '<div class="results-section">';

    // Key metrics
    html += RC('Correlation Summary',
      renderMetrics([
        { label: 'Correlation (r)', value: round4(r.r) },
        { label: 'Strength', value: strength },
        { label: 'R\u00b2', value: round4(r.rSquared * 100) + '%' },
        { label: 'n', value: r.n }
      ]) + renderSigBadge(r.p)
    );

    // Variable summaries
    html += renderGroupCards([x, y], [descX, descY], 'Variable Summaries') + '</div>';

    // Scatter plot
    html += renderChart(chartId, 'Scatter Plot', 500, 350);

    // Statistical details (collapsed)
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'r', value: round4(r.r) },
        { label: 'R\u00b2', value: round4(r.rSquared) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: '95% CI', value: '[' + round4(r.ci95.lower) + ', ' + round4(r.ci95.upper) + ']' }
      ])
    );

    // Plain English
    var plainText = 'There is a ' + strength + ' ' + direction + ' correlation between ' + descX + ' and ' + descY + ' (r = ' + round4(r.r) + '). ';
    plainText += r.p < 0.05 ? 'This relationship is statistically significant. ' : 'This relationship is not statistically significant. ';
    plainText += round4(r.rSquared * 100) + '% of the variation in one variable is explained by the other.';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawScatterPlot(chartId, x, y, descX, descY);
    showNextSteps('correlation', r);
  }

  /* ==================================================================
     Cronbach's Alpha
     ================================================================== */
  function runCronbach(items, labels) {
    var r = StatsEngine.cronbachAlpha(items);
    var interp = StatsEngine.interpret.cronbachAlpha(r);

    var plainText = interp.summary + ' ' + interp.details;
    var chartId = 'cronbachChart_' + Date.now();

    // Item analysis table
    var itemHtml = '<table class="posthoc-table"><tr><th>Item</th><th>Item-Total r</th><th>Alpha if Deleted</th></tr>';
    for (var i = 0; i < r.k; i++) {
      var rColor = r.itemTotalCorrelations[i] < 0.3 ? ' style="color:var(--amber);font-weight:700"' : '';
      itemHtml += '<tr><td>' + escHtml(labels[i]) + '</td><td' + rColor + '>' + round4(r.itemTotalCorrelations[i]) + '</td>' +
        '<td>' + round4(r.alphaIfDeleted[i]) + '</td></tr>';
    }
    itemHtml += '</table>';

    var level = r.alpha >= 0.9 ? 'excellent' : r.alpha >= 0.8 ? 'good' : r.alpha >= 0.7 ? 'acceptable' : r.alpha >= 0.6 ? 'questionable' : r.alpha >= 0.5 ? 'poor' : 'unacceptable';
    var isReliable = r.alpha >= 0.7;

    var html = '<div class="results-section">';

    // Big answer upfront: is the scale reliable?
    html += RC('Is Your Scale Reliable?',
      '<div style="text-align:center">' +
        '<div style="font-size:2.8rem;font-weight:700;color:' + (isReliable ? 'var(--green)' : 'var(--rose)') + ';line-height:1">' + (isReliable ? 'Yes' : 'No') + '</div>' +
        '<div style="font-size:0.88rem;color:var(--text-2);margin-top:0.4rem;line-height:1.5">' +
          'Cronbach\u2019s Alpha = ' + round4(r.alpha) + ' (' + level + ')<br>' +
          r.k + ' items, ' + r.n + ' respondents. ' +
          (isReliable ? 'These items reliably measure the same concept.' : 'These items may not consistently measure the same thing. Consider revising.') +
        '</div></div>'
    );

    // Item analysis: which items to keep/drop
    var weakItems = [];
    for (var i = 0; i < r.k; i++) {
      if (r.itemTotalCorrelations[i] < 0.3) weakItems.push(labels[i]);
    }
    if (weakItems.length > 0) {
      html += '<div class="result-card"><div class="result-card-title">Items to Review</div>' +
        '<div style="font-size:0.9rem;color:var(--text-0)">These items have weak correlations with the rest of the scale (r < 0.3). Removing them may improve reliability:</div>' +
        '<ul style="margin:0.5rem 0 0 1.2rem;font-size:0.85rem;color:var(--amber)">';
      weakItems.forEach(function(w) { html += '<li>' + escHtml(w) + '</li>'; });
      html += '</ul></div>';
    }

    // Item-total correlations chart
    html += renderChart(chartId, 'Item-Total Correlations', 500, Math.max(180, r.k * 55 + 30),
      'Higher = item fits the scale better. Below 0.3 (amber) = consider removing.');

    // Detailed table (collapsed)
    html += renderCollapsed('Detailed Item Analysis', itemHtml);

    // Plain English
    var plainText2 = 'Cronbach\u2019s Alpha = ' + round4(r.alpha) + ' (' + level + '). ' +
      (isReliable ? 'Your ' + r.k + ' items form a reliable scale.' : 'Your scale is below the 0.7 threshold. ') +
      (weakItems.length > 0 ? 'Consider reviewing: ' + weakItems.join(', ') + '.' : '');
    html += renderPlainEnglish(plainText2);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = [];
    for (var i = 0; i < r.k; i++) {
      bars.push({
        label: labels[i],
        value: r.itemTotalCorrelations[i],
        color: r.itemTotalCorrelations[i] < 0.3 ? CHART_COLORS[4] : CHART_COLORS[2]
      });
    }
    drawBarChart(chartId, bars);
    showNextSteps('scale', r);
  }

  /* ==================================================================
     Summary Statistics
     ================================================================== */
  function runSummary(vals, desc) {
    var r = StatsEngine.describe(vals);
    var chartId = 'histChart_' + Date.now();

    // Detect discrete/Likert data
    var uniqueVals = {};
    var allInt = true;
    vals.forEach(function(v) { uniqueVals[v] = (uniqueVals[v] || 0) + 1; if (v !== Math.floor(v)) allInt = false; });
    var uniqueKeys = Object.keys(uniqueVals);
    var isDiscrete = allInt && uniqueKeys.length >= 2 && uniqueKeys.length <= 15;
    var sortedKeys = isDiscrete ? uniqueKeys.map(Number).sort(function(a, b) { return a - b; }) : [];

    var html = '<div class="results-section">';

    // Key metrics card
    html += RC('Summary', renderMetrics([
      { label: 'Respondents', value: r.n },
      { label: 'Mean', value: round2(r.mean) },
      { label: 'Median', value: round2(r.median) },
      { label: 'Std Dev', value: round2(r.sd) }
    ]));

    // Top-box / Bottom-box for Likert
    if (isDiscrete && sortedKeys.length >= 5) {
      var minV = sortedKeys[0], maxV = sortedKeys[sortedKeys.length - 1];
      if (maxV - minV >= 4) {
        var topCount = 0, botCount = 0;
        sortedKeys.forEach(function(k) {
          if (k >= maxV - 1) topCount += uniqueVals[k];
          if (k <= minV + 1) botCount += uniqueVals[k];
        });
        var topPct = round2(topCount / r.n * 100);
        var botPct = round2(botCount / r.n * 100);
        html += renderTopBottomBox(topPct, botPct, (maxV - 1) + '\u2013' + maxV, minV + '\u2013' + (minV + 1));
      }
    }

    // % Distribution table (discrete data only)
    if (isDiscrete) {
      var distRows = [];
      sortedKeys.forEach(function(k) {
        var count = uniqueVals[k];
        distRows.push({ value: k, count: count, pct: round2(count / r.n * 100) });
      });
      html += renderDistTable(distRows, 'Response Distribution');
    }

    // Chart (histogram — now auto-detects discrete)
    html += renderChart(chartId, 'Distribution', 500, 250);

    // Detailed stats (collapsed for clean look)
    var modeStr = r.mode.length === 0 ? 'none' : r.mode.map(function(v) { return round4(v); }).join(', ');
    html += renderCollapsed('Detailed Statistics',
      statRow('Mode', modeStr) + statRow('Variance', round4(r.variance)) +
      statRow('Std Error', round4(r.se)) + statRow('Min', round4(r.min)) + statRow('Max', round4(r.max)) +
      statRow('Range', round4(r.range)) + statRow('IQR', round4(r.iqr)) +
      statRow('Skewness', round4(r.skewness)) + statRow('Kurtosis (excess)', round4(r.kurtosis)) +
      statRow('95% CI of Mean', '[' + round4(r.ci95.lower) + ', ' + round4(r.ci95.upper) + ']') +
      statRow('5th percentile', round4(r.p5)) + statRow('25th (Q1)', round4(r.p25)) +
      statRow('75th (Q3)', round4(r.p75)) + statRow('95th percentile', round4(r.p95))
    );

    // Plain English
    var plainText;
    if (isDiscrete) {
      plainText = r.n + ' respondents. Average: ' + round2(r.mean) + ' (median: ' + round2(r.median) + ', SD: ' + round2(r.sd) + '). ' +
        'Most common response: ' + modeStr + '.';
    } else {
      plainText = r.n + ' values analyzed. Mean = ' + round2(r.mean) + ', Median = ' + round2(r.median) + ', SD = ' + round2(r.sd) + '. ' +
        'Range: ' + round4(r.min) + ' to ' + round4(r.max) + '.';
    }
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawHistogram(chartId, vals);
    showNextSteps('descriptive', r);
  }

  /* ==================================================================
     Spearman Correlation
     ================================================================== */
  function runSpearman(x, y, descX, descY) {
    if (x.length !== y.length) { var ml = Math.min(x.length, y.length); x = x.slice(0, ml); y = y.slice(0, ml); }
    var r = StatsEngine.spearman(x, y);
    var pc = pClass(r.p);
    var chartId = 'spearmanPlot_' + Date.now();
    var rho = r.rho;
    var strength = Math.abs(rho) < 0.1 ? 'negligible' : Math.abs(rho) < 0.3 ? 'weak' : Math.abs(rho) < 0.5 ? 'moderate' : Math.abs(rho) < 0.7 ? 'strong' : 'very strong';
    var direction = rho > 0 ? 'positive' : rho < 0 ? 'negative' : 'no';

    var html = '<div class="results-section">';

    // Key metrics
    html += RC('Correlation Summary',
      renderMetrics([
        { label: 'Correlation (rho)', value: round4(rho) },
        { label: 'Strength', value: strength },
        { label: 'R\u00b2', value: round4(r.rSquared * 100) + '%' },
        { label: 'n', value: r.n }
      ]) + renderSigBadge(r.p)
    );

    // Variable summaries
    html += renderGroupCards([x, y], [descX, descY], 'Variable Summaries') + '</div>';

    // Scatter plot
    html += renderChart(chartId, 'Scatter Plot', 500, 350);

    // Statistical details (collapsed)
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'rho', value: round4(rho) },
        { label: 'R\u00b2', value: round4(r.rSquared) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: '95% CI', value: '[' + round4(r.ci95.lower) + ', ' + round4(r.ci95.upper) + ']' }
      ])
    );

    // Plain English
    var plainText = 'There is a ' + strength + ' ' + direction + ' rank correlation between ' + descX + ' and ' + descY + ' (rho = ' + round4(rho) + '). ';
    plainText += r.p < 0.05 ? 'This relationship is statistically significant. ' : 'This relationship is not statistically significant. ';
    plainText += 'When one goes up, the other tends to go ' + (rho > 0 ? 'up' : 'down') + '.';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawScatterPlot(chartId, x, y, descX, descY);
    showNextSteps('correlation', r);
  }

  /* ==================================================================
     Point-Biserial Correlation — Input
     ================================================================== */
  function showPointBiserialInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    section.innerHTML =
      '<div class="input-grid">' +
        '<div class="group-card">' +
          '<div class="group-card-label">Binary Column (e.g., Yes/No, Male/Female)</div>' +
          '<textarea id="dataBinary" placeholder="Paste binary values, one per line...\ne.g.:\nYes\nNo\nYes\nYes\nNo"></textarea>' +
          '<div class="desc-label">Label for this variable</div>' +
          '<input type="text" id="descBinary" placeholder="e.g., Gender, Purchased">' +
          '<div class="value-count" id="countBinary">No values detected</div>' +
        '</div>' +
        '<div class="group-card">' +
          '<div class="group-card-label">Numeric Column (e.g., score, revenue)</div>' +
          '<textarea id="dataCont" placeholder="Paste numeric values, one per line..."></textarea>' +
          '<div class="desc-label">Label for this variable</div>' +
          '<input type="text" id="descCont" placeholder="e.g., Satisfaction score">' +
          '<div class="value-count" id="countCont">No values detected</div>' +
        '</div>' +
      '</div>' +
      '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
    container.appendChild(section);
    scrollToBottom();

    var dataBin = section.querySelector('#dataBinary');
    var dataCont = section.querySelector('#dataCont');
    var countBin = section.querySelector('#countBinary');
    var countCont = section.querySelector('#countCont');
    var runBtn = section.querySelector('#runBtn');

    function parseBinaryValues(text) {
      var lines = text.split(/[\n,\t]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s !== ''; });
      return lines;
    }

    function checkReady() {
      var binLines = parseBinaryValues(dataBin.value);
      var contParsed = parseValues(dataCont.value);
      runBtn.disabled = !(binLines.length >= 3 && contParsed.nums.length >= 3);
    }

    dataBin.addEventListener('input', function() {
      var lines = parseBinaryValues(dataBin.value);
      if (lines.length === 0) {
        countBin.textContent = 'No values detected';
        countBin.className = 'value-count';
      } else {
        var unique = {};
        lines.forEach(function(v) { unique[v] = true; });
        var uCount = Object.keys(unique).length;
        if (uCount === 2) {
          countBin.textContent = lines.length + ' values, 2 categories detected';
          countBin.className = 'value-count valid';
        } else if (uCount === 1) {
          countBin.textContent = lines.length + ' values, but only 1 category detected (need exactly 2)';
          countBin.className = 'value-count warning';
        } else {
          countBin.textContent = lines.length + ' values, ' + uCount + ' categories (need exactly 2)';
          countBin.className = 'value-count warning';
        }
      }
      checkReady();
    });

    dataCont.addEventListener('input', function() { updateCount(dataCont, countCont); checkReady(); });

    runBtn.addEventListener('click', function() {
      var binLines = parseBinaryValues(dataBin.value);
      var contNums = parseValues(dataCont.value).nums;
      var descBin = section.querySelector('#descBinary').value || 'Binary variable';
      var descC = section.querySelector('#descCont').value || 'Numeric variable';

      // Map binary values to 0/1
      var unique = {};
      binLines.forEach(function(v) { unique[v] = true; });
      var keys = Object.keys(unique);
      if (keys.length !== 2) {
        showError('Binary column must have exactly 2 unique values. Found ' + keys.length + '.');
        return;
      }

      var mapping = {};
      // If values are already 0 and 1
      if ((keys.indexOf('0') > -1 && keys.indexOf('1') > -1)) {
        mapping['0'] = 0;
        mapping['1'] = 1;
      } else {
        mapping[keys[0]] = 0;
        mapping[keys[1]] = 1;
      }

      var binary = binLines.map(function(v) { return mapping[v]; });

      // Trim to equal length
      var minLen = Math.min(binary.length, contNums.length);
      binary = binary.slice(0, minLen);
      contNums = contNums.slice(0, minLen);

      var mappingText = '';
      if (!(keys.indexOf('0') > -1 && keys.indexOf('1') > -1)) {
        mappingText = 'Mapping: "' + keys[0] + '" = 0, "' + keys[1] + '" = 1. ';
      }

      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      runPointBiserial(binary, contNums, descBin, descC, mappingText, keys);
    });
  }

  function runPointBiserial(binary, continuous, descBin, descCont, mappingText, categoryNames) {
    var r = StatsEngine.pointBiserial(binary, continuous);
    var pc = pClass(r.p);
    var strength = Math.abs(r.r) < 0.1 ? 'negligible' : Math.abs(r.r) < 0.3 ? 'weak' : Math.abs(r.r) < 0.5 ? 'moderate' : Math.abs(r.r) < 0.7 ? 'strong' : 'very strong';
    var group0Label = categoryNames ? categoryNames[0] : 'Group 0';
    var group1Label = categoryNames ? categoryNames[1] : 'Group 1';
    var chartId = 'pbChart_' + Date.now();

    var html = '<div class="results-section">';

    html += RC('Correlation Summary',
      renderMetrics([
        { label: 'Correlation (r)', value: round4(r.r) },
        { label: 'Strength', value: strength },
        { label: 'n', value: r.n }
      ]) + renderSigBadge(r.p)
    );

    // Build fake arrays for renderGroupCards to show mean/median/n per group
    var g0Vals = binary.reduce(function(acc, v, i) { if (v === 0) acc.push(continuous[i]); return acc; }, []);
    var g1Vals = binary.reduce(function(acc, v, i) { if (v === 1) acc.push(continuous[i]); return acc; }, []);
    html += renderGroupCards([g0Vals, g1Vals], [group0Label, group1Label], 'Mean ' + escHtml(descCont) + ' by Group') + '</div>';

    html += renderChart(chartId, 'Mean Comparison', 500, 180);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'r', value: round4(r.r) },
        { label: 't', value: round4(r.t) },
        { label: 'p', value: round6(r.p), cls: pc },
        { label: 'df', value: r.df }
      ]) + (mappingText ? '<div style="font-size:0.82rem;color:var(--text-2);margin-top:0.5rem">' + mappingText + '</div>' : '')
    );

    var higher = r.mean1 > r.mean0 ? group1Label : group0Label;
    var plainText = higher + ' has a higher mean ' + descCont + ' (' + round2(Math.max(r.mean0, r.mean1)) + ' vs ' + round2(Math.min(r.mean0, r.mean1)) + '). ' +
      'The correlation is ' + strength + '. ' +
      (r.p < 0.05 ? 'This difference is statistically significant.' : 'This difference is not statistically significant.');
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: group0Label, value: r.mean0, color: CHART_COLORS[0] },
      { label: group1Label, value: r.mean1, color: CHART_COLORS[1] }
    ]);
    showNextSteps('correlation', r);
  }

  /* ==================================================================
     Linear & Logistic Regression — Input
     ================================================================== */
  function showRegressionInput(type) {
    var isLogistic = type === 'logistic';
    var isPoisson = type === 'poisson';
    var isMultinomial = type === 'multinomial';
    var isOrdinal = type === 'ordinal';
    var isDecisionTree = type === 'decision_tree';
    var isDiscriminant = type === 'discriminant';
    var section = document.createElement('div');
    section.className = 'data-input-section';
    var colCount = 2;
    var maxCols = 10;

    function buildGrid() {
      var gridHtml = '<div class="input-grid multi-col">';
      for (var i = 0; i < colCount; i++) {
        var label, placeholder;
        if (i === 0) {
          label = isLogistic ? 'Outcome (0 or 1)' : isPoisson ? 'Count outcome (0, 1, 2, ...)' : isMultinomial ? 'Outcome (3+ categories)' : isOrdinal ? 'Ordinal outcome (1-5)' : isDecisionTree ? 'Outcome' : isDiscriminant ? 'Group (categories)' : 'Outcome (Y)';
          placeholder = isLogistic ? 'Paste 0/1 values, one per line...' : isPoisson ? 'Paste count values (0, 1, 2, ...)...' : isMultinomial ? 'Paste category labels, one per line...' : isOrdinal ? 'Paste ordinal values (1, 2, 3, ...)...' : isDecisionTree ? 'Paste outcome values, one per line...' : isDiscriminant ? 'Paste group labels, one per line...' : 'Paste outcome values, one per line...';
        } else {
          label = isDiscriminant ? 'Variable ' + i : 'Predictor ' + i;
          placeholder = 'Paste predictor values, one per line...';
        }
        gridHtml +=
          '<div class="group-card" data-col="' + i + '">' +
            '<div class="group-card-label">' + label + '</div>' +
            '<textarea class="multi-data" data-idx="' + i + '" placeholder="' + placeholder + '"></textarea>' +
            '<div class="desc-label">Label</div>' +
            '<input type="text" class="multi-desc" data-idx="' + i + '" placeholder="' + (i === 0 ? 'e.g., Satisfaction' : 'e.g., Predictor ' + i) + '">' +
            '<div class="value-count multi-count" data-idx="' + i + '">No values detected</div>' +
          '</div>';
      }
      gridHtml += '</div>';
      gridHtml += '<div style="display:flex;gap:8px;justify-content:center">';
      if (colCount < maxCols) gridHtml += '<button class="add-col-btn" id="addColBtn">+ Add another predictor</button>';
      if (colCount > 2) gridHtml += '<button class="remove-col-btn" id="removeColBtn">- Remove last predictor</button>';
      gridHtml += '</div>';
      gridHtml += '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
      section.innerHTML = gridHtml;
    }

    buildGrid();
    container.appendChild(section);
    scrollToBottom();

    function bindEvents() {
      var textareas = section.querySelectorAll('.multi-data');
      var runBtn = section.querySelector('#runBtn');
      textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');
          var countEl = section.querySelector('.multi-count[data-idx="' + idx + '"]');
          updateCount(ta, countEl);
          checkReady();
        });
      });

      function checkReady() {
        var allGood = true;
        var catFirstCol = isMultinomial || isDiscriminant;
        section.querySelectorAll('.multi-data').forEach(function(ta, idx) {
          if (idx === 0 && catFirstCol) {
            if (parseCategorical(ta.value).length < 5) allGood = false;
          } else {
            if (parseValues(ta.value).nums.length < 5) allGood = false;
          }
        });
        runBtn.disabled = !allGood;
      }

      // Update count display for categorical first column
      if (isMultinomial || isDiscriminant) {
        var firstTa = section.querySelector('.multi-data[data-idx="0"]');
        if (firstTa) {
          firstTa.removeEventListener('input', firstTa._handler);
          firstTa._handler = function() {
            var idx = firstTa.getAttribute('data-idx');
            var countEl = section.querySelector('.multi-count[data-idx="' + idx + '"]');
            var lines = parseCategorical(firstTa.value);
            if (lines.length === 0) { countEl.textContent = 'No values detected'; countEl.className = 'value-count'; }
            else { countEl.textContent = lines.length + ' value' + (lines.length !== 1 ? 's' : '') + ' detected'; countEl.className = 'value-count valid'; }
            checkReady();
          };
          firstTa.addEventListener('input', firstTa._handler);
        }
      }

      var addBtn = section.querySelector('#addColBtn');
      if (addBtn) addBtn.addEventListener('click', function() {
        colCount++;
        buildGrid();
        bindEvents();
        scrollToBottom();
      });
      var removeBtn = section.querySelector('#removeColBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() {
        if (colCount > 2) { colCount--; buildGrid(); bindEvents(); scrollToBottom(); }
      });

      runBtn.addEventListener('click', function() {
        var columns = [];
        var labels = [];
        var catFirstCol = isMultinomial || isDiscriminant;
        section.querySelectorAll('.multi-data').forEach(function(ta, i) {
          if (i === 0 && catFirstCol) {
            columns.push(parseCategorical(ta.value));
          } else {
            columns.push(parseValues(ta.value).nums);
          }
          var descEl = section.querySelector('.multi-desc[data-idx="' + i + '"]');
          labels.push(descEl ? (descEl.value || (i === 0 ? 'Outcome' : 'Predictor ' + i)) : (i === 0 ? 'Outcome' : 'Predictor ' + i));
        });

        // Trim all to minimum length
        var minLen = Infinity;
        columns.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
        columns = columns.map(function(c) { return c.slice(0, minLen); });

        var y = columns[0];
        var xs = columns.slice(1);

        if (isLogistic) {
          // Auto-recode: if Y has exactly 2 unique values that aren't 0/1, recode them
          var uniqueY = {};
          y.forEach(function(v) { uniqueY[v] = true; });
          var uniqueKeys = Object.keys(uniqueY);
          if (uniqueKeys.length === 2 && !(uniqueKeys.indexOf('0') > -1 && uniqueKeys.indexOf('1') > -1)) {
            // Recode: smaller value → 0, larger → 1
            var sorted = uniqueKeys.map(Number).sort(function(a, b) { return a - b; });
            y = y.map(function(v) { return v === sorted[0] ? 0 : 1; });
            addAssistantMessage('<small style="color:var(--text-2)">Auto-recoded outcome: ' + sorted[0] + ' \u2192 0, ' + sorted[1] + ' \u2192 1</small>');
          }
          // Validate Y is 0/1
          for (var i = 0; i < y.length; i++) {
            if (y[i] !== 0 && y[i] !== 1) {
              showError('Outcome column must contain only 0 and 1 values (or exactly 2 categories). Found "' + y[i] + '" at row ' + (i + 1) + '. Unique values: ' + uniqueKeys.join(', '));
              return;
            }
          }
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runLogisticRegression(y, xs, labels);
        } else if (isPoisson) {
          // Validate Y is non-negative integers
          for (var i = 0; i < y.length; i++) {
            if (y[i] < 0 || y[i] !== Math.floor(y[i])) {
              showError('Count outcome must contain only non-negative integers (0, 1, 2, ...). Found "' + y[i] + '" at row ' + (i + 1) + '.');
              return;
            }
          }
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runPoissonRegression(y, xs, labels);
        } else if (isMultinomial) {
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runMultinomialLogistic(y, xs, labels);
        } else if (isOrdinal) {
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runOrdinalRegression(y, xs, labels);
        } else if (isDecisionTree) {
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runDecisionTree(y, xs, labels);
        } else if (isDiscriminant) {
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runDiscriminant(y, xs, labels);
        } else {
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runLinearRegression(y, xs, labels);
        }
      });
    }

    bindEvents();
  }

  /* ==================================================================
     Multiple Linear Regression — Results
     ================================================================== */
  function runLinearRegression(y, xs, labels) {
    var r = StatsEngine.linearRegression(y, xs);
    if (r.error) {
      showError('Regression error: ' + r.error);
      return;
    }
    var interp = StatsEngine.interpret.linearRegression(r);
    var pc = pClass(r.fP);

    var plainText = interp.summary + ' ' + interp.details;
    var chartId = 'regChart_' + Date.now();

    // Coefficient table
    var coeffHtml = '<table class="coeff-table"><tr><th>Predictor</th><th>B</th><th>SE</th><th>t</th><th>p</th></tr>';
    for (var i = 0; i < r.coefficients.length; i++) {
      var predName = i === 0 ? 'Intercept' : escHtml(labels[i] || ('Predictor ' + i));
      var sigCls = r.pValues[i] < 0.05 ? ' class="sig"' : '';
      coeffHtml += '<tr><td>' + predName + '</td><td>' + round4(r.coefficients[i]) + '</td>' +
        '<td>' + round4(r.se[i]) + '</td><td>' + round4(r.tStats[i]) + '</td>' +
        '<td' + sigCls + '>' + round6(r.pValues[i]) + '</td></tr>';
    }
    coeffHtml += '</table>';

    // Standardized coefficients for chart (skip intercept)
    var bars = [];
    if (r.coefficients.length > 1) {
      // Compute standardized coefficients: beta_std = b * (sd_x / sd_y)
      var sdY = StatsEngine._helpers.sd(y, 1);
      for (var i = 1; i < r.coefficients.length; i++) {
        var xCol = xs[i - 1];
        var sdX = StatsEngine._helpers.sd(xCol, 1);
        var stdCoeff = sdY > 0 ? r.coefficients[i] * (sdX / sdY) : 0;
        bars.push({
          label: labels[i] || ('Predictor ' + i),
          value: stdCoeff,
          color: stdCoeff >= 0 ? CHART_COLORS[2] : CHART_COLORS[6]
        });
      }
      // Sort by absolute value
      bars.sort(function(a, b) { return Math.abs(b.value) - Math.abs(a.value); });
    }

    var html = '<div class="results-section">';

    // Key metrics
    html += RC('Model Summary',
      renderMetrics([
        { label: 'R\u00b2', value: round4(r.R2 * 100) + '%' },
        { label: 'Adj. R\u00b2', value: round4(r.adjR2 * 100) + '%' },
        { label: 'Predictors', value: r.coefficients.length - 1 },
        { label: 'n', value: r.n }
      ]) + renderSigBadge(r.fP) +
      '<div style="font-size:0.85rem;color:var(--text-2);text-align:center;margin-top:0.5rem">' +
        'The model explains <strong>' + round4(r.R2 * 100) + '%</strong> of the variation in the outcome.' +
        (r.R2 < 0.1 ? ' That\u2019s very little.' : r.R2 < 0.3 ? ' That\u2019s a modest amount.' : ' That\u2019s substantial.') +
      '</div>'
    );

    // Which predictors matter most (chart first)
    if (bars.length > 0) {
      html += renderChart(chartId, 'Which Predictors Matter Most', 500, Math.max(180, bars.length * 55 + 30),
        'Standardized coefficients: longer bar = stronger effect');
    }

    // Coefficient table (collapsed)
    html += renderCollapsed('Coefficient Table &amp; Details',
      coeffHtml +
      renderMetrics([
        { label: 'F', value: round4(r.F) },
        { label: 'p (model)', value: round6(r.fP), cls: pc },
        { label: 'RMSE', value: round4(r.RMSE) },
        { label: 'Durbin-Watson', value: round4(r.durbinWatson) }
      ])
    );

    // Plain English
    var sigPredictors = [];
    for (var i = 1; i < r.pValues.length; i++) {
      if (r.pValues[i] < 0.05) sigPredictors.push(labels[i] || ('Predictor ' + i));
    }
    var plainText = 'The model explains ' + round4(r.R2 * 100) + '% of the variation. ';
    plainText += sigPredictors.length > 0 ?
      'Significant predictors: ' + sigPredictors.join(', ') + '.' :
      'No individual predictor is statistically significant.';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    if (bars.length > 0) drawBarChart(chartId, bars);
    showNextSteps('regression', { n: r.n, r2: r.R2, p: r.fP });
  }

  /* ==================================================================
     Logistic Regression — Results
     ================================================================== */
  function runLogisticRegression(y, xs, labels) {
    var r = StatsEngine.logisticRegression(y, xs);
    var interp = StatsEngine.interpret.logisticRegression(r);
    var pc = r.converged && r.pValues && r.pValues.some(function(p) { return p < 0.05; }) ? 'p-sig' : 'p-nonsig';

    var plainText = interp.summary + ' ' + interp.details;
    var chartId = 'logRegChart_' + Date.now();

    // Coefficient table with odds ratios
    var coeffHtml = '<table class="coeff-table"><tr><th>Predictor</th><th>B</th><th>SE</th><th>z</th><th>p</th><th>Odds Ratio</th></tr>';
    for (var i = 0; i < r.coefficients.length; i++) {
      var predName = i === 0 ? 'Intercept' : escHtml(labels[i] || ('Predictor ' + i));
      var sigCls = r.pValues[i] < 0.05 ? ' class="sig"' : '';
      coeffHtml += '<tr><td>' + predName + '</td><td>' + round4(r.coefficients[i]) + '</td>' +
        '<td>' + round4(r.se[i]) + '</td><td>' + round4(r.zStats[i]) + '</td>' +
        '<td' + sigCls + '>' + round6(r.pValues[i]) + '</td>' +
        '<td>' + round4(r.oddsRatios[i]) + '</td></tr>';
    }
    coeffHtml += '</table>';

    // Odds ratios bar chart (skip intercept)
    var bars = [];
    for (var i = 1; i < r.oddsRatios.length; i++) {
      bars.push({
        label: labels[i] || ('Predictor ' + i),
        value: r.oddsRatios[i],
        color: r.oddsRatios[i] >= 1 ? CHART_COLORS[2] : CHART_COLORS[6]
      });
    }
    bars.sort(function(a, b) { return Math.abs(b.value - 1) - Math.abs(a.value - 1); });

    var convergeText = r.converged ? 'Converged in ' + r.iterations + ' iterations.' : 'WARNING: Model did not converge. Results may be unreliable.';

    var html = '<div class="results-section">';

    // Key metrics
    html += RC('Model Summary',
      renderMetrics([
        { label: 'Pseudo R\u00b2', value: round4(r.pseudoR2 * 100) + '%' },
        { label: 'Accuracy', value: r.accuracy !== undefined ? round2(r.accuracy * 100) + '%' : '\u2014' },
        { label: 'Predictors', value: r.coefficients.length - 1 },
        { label: 'n', value: r.n }
      ]) +
      (!r.converged ? '<div style="text-align:center;margin-top:0.5rem;color:var(--amber);font-size:0.82rem">\u26A0 Model did not converge. Results may be unreliable.</div>' : '')
    );

    // Odds ratios chart (the key visual)
    if (bars.length > 0) {
      html += renderChart(chartId, 'Odds Ratios \u2014 What Increases/Decreases the Odds', 500, Math.max(180, bars.length * 55 + 30),
        'Values > 1 increase odds, < 1 decrease odds. Further from 1 = stronger effect.');
    }

    // Coefficient table (collapsed)
    html += renderCollapsed('Coefficient Table &amp; Details',
      coeffHtml +
      renderMetrics([
        { label: 'Pseudo R\u00b2', value: round4(r.pseudoR2) },
        { label: 'AIC', value: round2(r.AIC) },
        { label: 'BIC', value: round2(r.BIC) },
        { label: 'Log-Likelihood', value: round2(r.logLikelihood) }
      ])
    );

    // Plain English
    var sigPreds = [];
    for (var i = 1; i < r.pValues.length; i++) {
      if (r.pValues[i] < 0.05) {
        var orText = r.oddsRatios[i] > 1 ? 'increases odds by ' + round2((r.oddsRatios[i] - 1) * 100) + '%' : 'decreases odds by ' + round2((1 - r.oddsRatios[i]) * 100) + '%';
        sigPreds.push((labels[i] || 'Predictor ' + i) + ' (' + orText + ')');
      }
    }
    var plainText2 = sigPreds.length > 0 ?
      'Significant predictors: ' + sigPreds.join('; ') + '.' :
      'No predictor significantly predicts the outcome.';
    html += renderPlainEnglish(plainText2);

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    if (bars.length > 0) drawBarChart(chartId, bars);
    showNextSteps('regression', { n: r.n || y.length });
  }

  /* ==================================================================
     K-Means Clustering — Input
     ================================================================== */
  function showKMeansInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    var colCount = 2;
    var maxCols = 10;

    function buildGrid() {
      var gridHtml =
        '<div class="analysis-controls">' +
          '<label>Number of clusters (K): <input type="number" id="kInput" min="2" max="8" value="3"></label>' +
        '</div>';
      gridHtml += '<div class="input-grid multi-col">';
      for (var i = 0; i < colCount; i++) {
        gridHtml +=
          '<div class="group-card" data-col="' + i + '">' +
            '<div class="group-card-label">Variable ' + (i + 1) + '</div>' +
            '<textarea class="multi-data" data-idx="' + i + '" placeholder="Paste numeric values, one per line..."></textarea>' +
            '<div class="desc-label">Label</div>' +
            '<input type="text" class="multi-desc" data-idx="' + i + '" placeholder="e.g., Variable ' + (i + 1) + '">' +
            '<div class="value-count multi-count" data-idx="' + i + '">No values detected</div>' +
          '</div>';
      }
      gridHtml += '</div>';
      gridHtml += '<div style="display:flex;gap:8px;justify-content:center">';
      if (colCount < maxCols) gridHtml += '<button class="add-col-btn" id="addColBtn">+ Add another variable</button>';
      if (colCount > 2) gridHtml += '<button class="remove-col-btn" id="removeColBtn">- Remove last variable</button>';
      gridHtml += '</div>';
      gridHtml += '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
      section.innerHTML = gridHtml;
    }

    buildGrid();
    container.appendChild(section);
    scrollToBottom();

    function bindEvents() {
      var textareas = section.querySelectorAll('.multi-data');
      var runBtn = section.querySelector('#runBtn');
      textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');
          var countEl = section.querySelector('.multi-count[data-idx="' + idx + '"]');
          updateCount(ta, countEl);
          checkReady();
        });
      });

      function checkReady() {
        var allGood = true;
        section.querySelectorAll('.multi-data').forEach(function(ta) {
          if (parseValues(ta.value).nums.length < 3) allGood = false;
        });
        runBtn.disabled = !allGood;
      }

      var addBtn = section.querySelector('#addColBtn');
      if (addBtn) addBtn.addEventListener('click', function() {
        colCount++;
        buildGrid();
        bindEvents();
        scrollToBottom();
      });
      var removeBtn = section.querySelector('#removeColBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() {
        if (colCount > 2) { colCount--; buildGrid(); bindEvents(); scrollToBottom(); }
      });

      runBtn.addEventListener('click', function() {
        var columns = [];
        var labels = [];
        section.querySelectorAll('.multi-data').forEach(function(ta, i) {
          columns.push(parseValues(ta.value).nums);
          var descEl = section.querySelector('.multi-desc[data-idx="' + i + '"]');
          labels.push(descEl ? (descEl.value || 'Variable ' + (i + 1)) : 'Variable ' + (i + 1));
        });

        var k = Math.max(2, Math.min(8, parseInt(section.querySelector('#kInput').value) || 3));

        // Trim to minimum length
        var minLen = Infinity;
        columns.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
        columns = columns.map(function(c) { return c.slice(0, minLen); });

        if (minLen < k) {
          showError('You need at least as many data points as clusters. You have ' + minLen + ' data points and K = ' + k + '.');
          return;
        }

        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        runKMeans(columns, k, labels);
      });
    }

    bindEvents();
  }

  /* ==================================================================
     K-Means Clustering — Results
     ================================================================== */
  function runKMeans(data, k, labels) {
    var r = StatsEngine.kMeans(data, k);
    var interp = StatsEngine.interpret.kMeans(r);

    var plainText = interp.summary + ' ' + interp.details;
    var chartId = 'kmeansChart_' + Date.now();

    // Centroid table
    var centroidHtml = '<table class="coeff-table"><tr><th>Cluster</th><th>Size</th>';
    labels.forEach(function(l) { centroidHtml += '<th>' + escHtml(l) + '</th>'; });
    centroidHtml += '<th>Within SS</th></tr>';
    for (var c = 0; c < r.k; c++) {
      centroidHtml += '<tr><td>Cluster ' + (c + 1) + '</td><td>' + r.clusterSizes[c] + '</td>';
      for (var j = 0; j < r.centroids[c].length; j++) {
        centroidHtml += '<td>' + round4(r.centroids[c][j]) + '</td>';
      }
      centroidHtml += '<td>' + round2(r.withinSS[c]) + '</td></tr>';
    }
    centroidHtml += '</table>';

    var ratio = r.totalSS > 0 ? r.betweenSS / r.totalSS : 0;

    var html = '<div class="results-section">';

    // Segment overview: sizes and quality
    var segHtml = '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">';
    for (var c = 0; c < r.k; c++) {
      var pct = round2(r.clusterSizes[c] / r.n * 100);
      segHtml += '<div style="flex:1;min-width:90px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
        '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase">Segment ' + (c + 1) + '</div>' +
        '<div style="font-size:1.3rem;font-weight:700;margin:0.2rem 0;color:' + CHART_COLORS[c % CHART_COLORS.length] + '">' + r.clusterSizes[c] + '</div>' +
        '<div style="font-size:0.72rem;color:var(--text-2)">' + pct + '% of total</div></div>';
    }
    segHtml += '</div>';
    segHtml += '<div style="font-size:0.82rem;color:var(--text-2);text-align:center;margin-top:0.5rem">Separation quality: <strong>' + (ratio * 100).toFixed(1) + '%</strong> of variance explained by segments</div>';
    html += RC('Segments Found: ' + r.k, segHtml);

    // What makes each segment different (centroid profile)
    html += RC('Segment Profiles', centroidHtml +
      '<div style="font-size:0.78rem;color:var(--text-2);margin-top:6px">Values show the average score per variable in each segment. Higher = that segment scores higher on that variable.</div>');

    // Chart
    if (data.length === 2) {
      html += renderChart(chartId, 'Segment Scatter Plot', 500, 350);
    } else {
      html += renderChart(chartId, 'Segment Sizes', 500, Math.max(180, r.k * 55 + 30));
    }

    // Plain English describing each segment
    var plainText2 = r.k + ' segments found from ' + r.n + ' respondents. ';
    for (var c = 0; c < r.k; c++) {
      var highest = { val: -Infinity, label: '' }, lowest = { val: Infinity, label: '' };
      for (var j = 0; j < r.centroids[c].length; j++) {
        if (r.centroids[c][j] > highest.val) { highest = { val: r.centroids[c][j], label: labels[j] }; }
        if (r.centroids[c][j] < lowest.val) { lowest = { val: r.centroids[c][j], label: labels[j] }; }
      }
      plainText2 += 'Segment ' + (c + 1) + ' (' + r.clusterSizes[c] + ' people): highest on ' + highest.label + ', lowest on ' + lowest.label + '. ';
    }
    html += renderPlainEnglish(plainText2);

    // Collapsed details
    html += renderCollapsed('Technical Details',
      renderMetrics([
        { label: 'K', value: r.k },
        { label: 'n', value: r.n },
        { label: 'Between/Total SS', value: (ratio * 100).toFixed(1) + '%' },
        { label: 'Within SS', value: round2(r.totalWithinSS) },
        { label: 'Converged', value: r.converged ? 'Yes' : 'No' }
      ])
    );

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    if (data.length === 2) {
      // Draw colored scatter plot
      drawClusterScatter(chartId, data[0], data[1], r.assignments, r.k, labels[0], labels[1], r.centroids);
    } else {
      var bars = [];
      for (var c = 0; c < r.k; c++) {
        bars.push({ label: 'Cluster ' + (c + 1), value: r.clusterSizes[c], color: CHART_COLORS[c % CHART_COLORS.length] });
      }
      drawBarChart(chartId, bars);
    }
    showNextSteps('clustering', { n: r.n });
  }

  // Cluster scatter plot (colored by cluster)
  function drawClusterScatter(canvasId, x, y, assignments, k, xLabel, yLabel, centroids) {
    var c = initCanvas(canvasId, 500, 350);
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();
    var pad = { left: 60, right: 20, top: 20, bottom: 50 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;

    var xMin = Math.min.apply(null, x), xMax = Math.max.apply(null, x);
    var yMin = Math.min.apply(null, y), yMax = Math.max.apply(null, y);
    var xRange = xMax - xMin || 1, yRange = yMax - yMin || 1;
    xMin -= xRange * 0.05; xMax += xRange * 0.05;
    yMin -= yRange * 0.05; yMax += yRange * 0.05;
    xRange = xMax - xMin; yRange = yMax - yMin;

    function px(v) { return pad.left + ((v - xMin) / xRange) * cw; }
    function py(v) { return pad.top + ch - ((v - yMin) / yRange) * ch; }

    // Axes
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + ch);
    ctx.lineTo(pad.left + cw, pad.top + ch);
    ctx.stroke();

    // Axis labels
    ctx.fillStyle = colors.subtext;
    ctx.font = '500 11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(xLabel, pad.left + cw / 2, h - 10);
    ctx.save();
    ctx.translate(15, pad.top + ch / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(yLabel, 0, 0);
    ctx.restore();

    // Points colored by cluster
    ctx.globalAlpha = 0.6;
    for (var i = 0; i < x.length; i++) {
      ctx.fillStyle = CHART_COLORS[assignments[i] % CHART_COLORS.length];
      ctx.beginPath();
      ctx.arc(px(x[i]), py(y[i]), 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw centroids
    ctx.globalAlpha = 1;
    for (var ci = 0; ci < k; ci++) {
      ctx.strokeStyle = CHART_COLORS[ci % CHART_COLORS.length];
      ctx.lineWidth = 2;
      var cx2 = px(centroids[ci][0]);
      var cy2 = py(centroids[ci][1]);
      ctx.beginPath();
      ctx.moveTo(cx2 - 6, cy2 - 6); ctx.lineTo(cx2 + 6, cy2 + 6);
      ctx.moveTo(cx2 + 6, cy2 - 6); ctx.lineTo(cx2 - 6, cy2 + 6);
      ctx.stroke();
    }
  }

  /* ==================================================================
     Kruskal-Wallis
     ================================================================== */
  function runKruskalWallis(groups, labels) {
    var r = StatsEngine.kruskalWallis(groups);
    var pc = pClass(r.p);
    var chartId = 'kwChart_' + Date.now();
    var medians = [];
    for (var i = 0; i < r.k; i++) medians.push(StatsEngine._helpers.median(groups[i]));

    var html = '<div class="results-section">';

    // Group comparison with significance
    html += renderGroupCards(groups, labels, 'Group Comparison');
    html += renderSigBadge(r.p) + '</div>';

    // Median bar chart
    html += renderChart(chartId, 'Median Comparison', 500, Math.max(180, r.k * 55 + 30));

    // Per-group distribution
    html += groupDistTable(groups, labels);

    // Post-hoc (only if significant)
    if (r.p < 0.05 && r.posthoc && r.posthoc.length > 0) {
      var phHtml = '<table class="posthoc-table"><tr><th>Comparison</th><th>Rank Diff</th><th>p (Bonf.)</th></tr>';
      r.posthoc.forEach(function(ph) {
        var sig = ph.pBonferroni < 0.05 ? ' style="font-weight:700;color:var(--green)"' : '';
        phHtml += '<tr><td>' + escHtml(labels[ph.groupA]) + ' vs ' + escHtml(labels[ph.groupB]) + '</td>' +
          '<td>' + round4(ph.meanRankDiff) + '</td><td' + sig + '>' + round6(ph.pBonferroni) + '</td></tr>';
      });
      phHtml += '</table>';
      html += RC('Which Groups Differ? (Post-Hoc)', phHtml);
    }

    // Statistical details (collapsed)
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'H statistic', value: round4(r.H) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: 'df', value: r.df },
        { label: 'Eta-squared', value: round4(r.etaSquared) }
      ])
    );

    // Plain English
    var best = { med: -Infinity, label: '' }, worst = { med: Infinity, label: '' };
    for (var i = 0; i < r.k; i++) {
      if (medians[i] > best.med) { best = { med: medians[i], label: labels[i] }; }
      if (medians[i] < worst.med) { worst = { med: medians[i], label: labels[i] }; }
    }
    var plainText = r.p < 0.05 ?
      'Significant difference across ' + r.k + ' groups. ' + best.label + ' scores highest (median ' + round2(best.med) + '), ' + worst.label + ' scores lowest (median ' + round2(worst.med) + ').' :
      'No significant difference across ' + r.k + ' groups (p = ' + round4(r.p) + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var i = 0; i < r.k; i++) bars.push({ label: labels[i], value: medians[i], color: CHART_COLORS[i % CHART_COLORS.length] });
    drawBarChart(chartId, bars);
    showNextSteps('group_comparison', r);
  }

  /* ==================================================================
     Wilcoxon Signed-Rank
     ================================================================== */
  function runWilcoxon(a, b, descA, descB) {
    if (a.length !== b.length) {
      showError('Both columns must have the same number of values (each row is one person measured twice). Yours have ' + a.length + ' and ' + b.length + ' values. Check if you missed a row when pasting.');
      return;
    }
    var r = StatsEngine.wilcoxon(a, b);
    var pc = pClass(r.p);
    var medA = round2(StatsEngine._helpers.median(a)), medB = round2(StatsEngine._helpers.median(b));
    var chartId = 'wilcoxonChart_' + Date.now();

    var html = '<div class="results-section">';
    html += renderGroupCards([a, b], [descA, descB], 'Paired Comparison');
    html += renderSigBadge(r.p) + '</div>';

    html += renderChart(chartId, 'Median Comparison', 500, 180);

    html += groupDistTable([a, b], [descA, descB]);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'W', value: round2(r.W) },
        { label: 'z', value: round4(r.z) },
        { label: 'p-value', value: round6(r.p), cls: pc },
        { label: 'Effect size r', value: round4(r.r) }
      ]) +
      '<div class="effect-interpretation">' + r.nNonZero + ' non-zero pairs out of ' + r.nPairs + ' total.</div>'
    );

    var higher = medA >= medB ? descA : descB;
    var plainText = r.p < 0.05 ?
      higher + ' scores significantly higher (median ' + Math.max(medA, medB) + ' vs ' + Math.min(medA, medB) + ').' :
      'No significant difference between ' + descA + ' (median ' + medA + ') and ' + descB + ' (median ' + medB + ').';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: descA, value: medA, color: CHART_COLORS[0] },
      { label: descB, value: medB, color: CHART_COLORS[1] }
    ]);
    showNextSteps('paired', r);
  }

  /* ==================================================================

  function showFisherExactInput() {

    function buildFE() {
