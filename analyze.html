  function runLCA(cols, labels, nClasses) {
    var nItems = cols.length;
    var n = cols[0].length;

    // Build data matrix: rows = observations, cols = items
    var data = [];
    for (var i = 0; i < n; i++) {
      var row = [];
      for (var j = 0; j < nItems; j++) row.push(cols[j][i]);
      data.push(row);
    }

    // EM algorithm for LCA
    // Initialize: random class probabilities
    var pi = []; // class mixing proportions
    var theta = []; // theta[c][j] = P(item j = 1 | class c)
    for (var c = 0; c < nClasses; c++) {
      pi.push(1 / nClasses);
      var row = [];
      for (var j = 0; j < nItems; j++) {
        row.push(0.2 + Math.random() * 0.6); // random initial probabilities
      }
      theta.push(row);
    }

    var maxIter = 200;
    var prevLL = -Infinity;

    for (var iter = 0; iter < maxIter; iter++) {
      // E-step: compute posterior P(class c | observation i)
      var resp = []; // resp[i][c]
      var logLik = 0;
      for (var i = 0; i < n; i++) {
        var logProbs = [];
        for (var c = 0; c < nClasses; c++) {
          var lp = Math.log(pi[c]);
          for (var j = 0; j < nItems; j++) {
            var p = Math.max(1e-10, Math.min(1 - 1e-10, theta[c][j]));
            lp += data[i][j] === 1 ? Math.log(p) : Math.log(1 - p);
          }
          logProbs.push(lp);
        }
        // Log-sum-exp for normalization
        var maxLP = Math.max.apply(null, logProbs);
        var sumExp = 0;
        for (var c = 0; c < nClasses; c++) sumExp += Math.exp(logProbs[c] - maxLP);
        var logTotal = maxLP + Math.log(sumExp);
        logLik += logTotal;

        var r = [];
        for (var c = 0; c < nClasses; c++) {
          r.push(Math.exp(logProbs[c] - logTotal));
        }
        resp.push(r);
      }

      // Check convergence
      if (Math.abs(logLik - prevLL) < 1e-6) break;
      prevLL = logLik;

      // M-step
      for (var c = 0; c < nClasses; c++) {
        var Nc = 0;
        for (var i = 0; i < n; i++) Nc += resp[i][c];
        pi[c] = Nc / n;
        for (var j = 0; j < nItems; j++) {
          var s = 0;
          for (var i = 0; i < n; i++) s += resp[i][c] * data[i][j];
          theta[c][j] = Math.max(0.001, Math.min(0.999, s / Math.max(Nc, 1e-10)));
        }
      }
    }

    // BIC = -2 * LL + k * ln(n)
    var nParams = (nClasses - 1) + nClasses * nItems;
    var BIC = -2 * prevLL + nParams * Math.log(n);

    // Entropy
    var entropy = 0;
    for (var i = 0; i < n; i++) {
      for (var c = 0; c < nClasses; c++) {
        if (resp[i][c] > 1e-10) entropy -= resp[i][c] * Math.log(resp[i][c]);
      }
    }
    var relativeEntropy = 1 - entropy / (n * Math.log(nClasses));

    // Assign each observation to most likely class
    var assignments = [];
    var classCounts = new Array(nClasses).fill(0);
    for (var i = 0; i < n; i++) {
      var bestC = 0;
      for (var c = 1; c < nClasses; c++) {
        if (resp[i][c] > resp[i][bestC]) bestC = c;
      }
      assignments.push(bestC + 1);
      classCounts[bestC]++;
    }

    // Build results
    // Item probability table
    var tableHtml = '<table class="lca-table"><tr><th>Item</th>';
    for (var c = 0; c < nClasses; c++) {
      tableHtml += '<th>Class ' + (c + 1) + ' (' + round2(pi[c] * 100) + '%)</th>';
    }
    tableHtml += '</tr>';
    for (var j = 0; j < nItems; j++) {
      tableHtml += '<tr><td>' + escHtml(labels[j]) + '</td>';
      var maxProb = 0;
      for (var c = 0; c < nClasses; c++) { if (theta[c][j] > maxProb) maxProb = theta[c][j]; }
      for (var c = 0; c < nClasses; c++) {
        var cls = theta[c][j] === maxProb && maxProb > 0.5 ? ' class="high-prob"' : '';
        tableHtml += '<td' + cls + '>' + round4(theta[c][j]) + '</td>';
      }
      tableHtml += '</tr>';
    }
    tableHtml += '</table>';

    // Class sizes
    var sizeHtml = '';
    for (var c = 0; c < nClasses; c++) {
      sizeHtml += statRow('Class ' + (c + 1), classCounts[c] + ' (' + round2(pi[c] * 100) + '%)');
    }

    // Plain English
    var plainText = 'Latent Class Analysis identified ' + nClasses + ' classes from ' + n + ' observations across ' + nItems + ' binary items. ';
    for (var c = 0; c < nClasses; c++) {
      var highItems = [];
      for (var j = 0; j < nItems; j++) {
        if (theta[c][j] > 0.6) highItems.push(labels[j]);
      }
      plainText += 'Class ' + (c + 1) + ' (' + round2(pi[c] * 100) + '% of respondents)';
      if (highItems.length > 0) {
        plainText += ' is characterized by high probability on: ' + highItems.join(', ');
      } else {
        plainText += ' has generally low probabilities across items';
      }
      plainText += '. ';
    }
    plainText += 'Model fit: BIC = ' + round2(BIC) + ', relative entropy = ' + round4(relativeEntropy) + ' (closer to 1 = clearer class separation).';

    var chartId = 'lcaChart_' + Date.now();
    var chartHeight = Math.max(150, nItems * (nClasses * 20 + 24) + 40);

    var html = '<div class="results-section">';

    // Class overview upfront
    var classHtml = '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">';
    for (var c = 0; c < nClasses; c++) {
      var highItems = [];
      for (var j = 0; j < nItems; j++) { if (theta[c][j] > 0.6) highItems.push(labels[j]); }
      classHtml += '<div style="flex:1;min-width:120px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem">' +
        '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase">Class ' + (c + 1) + '</div>' +
        '<div style="font-size:1.3rem;font-weight:700;color:' + CHART_COLORS[c % CHART_COLORS.length] + '">' + classCounts[c] + ' <span style="font-size:0.7rem;color:var(--text-2)">(' + round2(pi[c] * 100) + '%)</span></div>' +
        '<div style="font-size:0.78rem;color:var(--text-2);margin-top:0.3rem">' + (highItems.length > 0 ? 'High on: ' + highItems.join(', ') : 'Low across items') + '</div></div>';
    }
    classHtml += '</div>';
    classHtml += '<div style="font-size:0.82rem;color:var(--text-2);text-align:center;margin-top:0.5rem">Class separation: entropy = ' + round4(relativeEntropy) + (relativeEntropy > 0.8 ? ' (good)' : relativeEntropy > 0.6 ? ' (moderate)' : ' (weak)') + '</div>';
    html += RC('Classes Found: ' + nClasses, classHtml);

    // Item probabilities chart
    html += renderChart(chartId, 'What Defines Each Class', 500, chartHeight);

    // Probability table (collapsed)
    html += renderCollapsed('Item Probability Table', tableHtml);

    // Technical details (collapsed)
    html += renderCollapsed('Model Fit Details',
      renderMetrics([
        { label: 'BIC', value: round2(BIC) },
        { label: 'Entropy', value: round4(relativeEntropy) },
        { label: 'Log-Likelihood', value: round2(prevLL) },
        { label: 'Parameters', value: nParams }
      ])
    );

    // Plain English
    html += renderPlainEnglish(plainText);

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    // Grouped bar chart of item probabilities per class
    var items = labels.map(function(label, j) {
      var values = [];
      for (var c = 0; c < nClasses; c++) values.push(theta[c][j] * 100);
      return { label: label, values: values };
    });
    var legendLabels = [];
    var legendColors = [];
    for (var c = 0; c < nClasses; c++) {
      legendLabels.push('Class ' + (c + 1));
      legendColors.push(CHART_COLORS[c % CHART_COLORS.length]);
    }
    drawGroupedBarChart(chartId, items, legendLabels, legendColors);
    showNextSteps('clustering', { n: n });
  }

        // Auto-generate template
        var template = '';
        if (colCount <= 6) {
          var half = Math.ceil(colCount / 2);
          var f1Items = [];
          var f2Items = [];
          for (var x = 1; x <= colCount; x++) {
            if (x <= half) f1Items.push(x); else f2Items.push(x);
          }
          template = 'Factor1: ' + f1Items.join(',');
          if (f2Items.length > 0) template += '; Factor2: ' + f2Items.join(',');
        } else {
          var third = Math.ceil(colCount / 3);
          var f1 = [], f2 = [], f3 = [];
          for (var x = 1; x <= colCount; x++) {
            if (x <= third) f1.push(x);
            else if (x <= third * 2) f2.push(x);
            else f3.push(x);
          }
          template = 'Factor1: ' + f1.join(',') + '; Factor2: ' + f2.join(',') + '; Factor3: ' + f3.join(',');
        }
        modelArea.value = template;
      }
    }

    buildGrid();
    container.appendChild(section);
    scrollToBottom();

    function parseCFAModel(text) {
      // Parse "Factor1: 1,2,3; Factor2: 4,5,6"
      var factors = [];
      var parts = text.split(';');
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i].trim();
        if (!p) continue;
        var colonIdx = p.indexOf(':');
        if (colonIdx === -1) continue;
        var name = p.substring(0, colonIdx).trim();
        var items = p.substring(colonIdx + 1).split(',').map(function(s) { return parseInt(s.trim()); }).filter(function(n) { return !isNaN(n) && n >= 1; });
        if (name && items.length > 0) factors.push({ name: name, items: items });
      }
      return factors;
    }

    function bindEvents() {
      var textareas = section.querySelectorAll('.cfa-data');
      var runBtn = section.querySelector('#runBtn');

      function checkReady() {
        var allGood = true;
        var firstLen = -1;
        section.querySelectorAll('textarea.cfa-data[data-idx]').forEach(function(ta) {
          var vals = parseValues(ta.value).nums;
          if (vals.length < 5) { allGood = false; return; }
          if (firstLen === -1) firstLen = vals.length;
          else if (vals.length !== firstLen) allGood = false;
        });
        // Check model spec
        var model = parseCFAModel(section.querySelector('#cfaModelSpec').value);
        if (model.length < 1) allGood = false;
        // Check all item numbers are valid
        for (var f = 0; f < model.length; f++) {
          for (var j = 0; j < model[f].items.length; j++) {
            if (model[f].items[j] > colCount) allGood = false;
          }
          if (model[f].items.length < 1) allGood = false;
        }
        runBtn.disabled = !allGood;
      }

      section.querySelectorAll('textarea.cfa-data[data-idx]').forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');
          var countEl = section.querySelector('.cfa-count[data-idx="' + idx + '"]');
          updateCount(ta, countEl);
          checkReady();
        });
      });

      section.querySelector('#cfaModelSpec').addEventListener('input', checkReady);

      var addBtn = section.querySelector('#addCFAColBtn');
      if (addBtn) addBtn.addEventListener('click', function() { colCount++; buildGrid(); bindEvents(); scrollToBottom(); });
      var removeBtn = section.querySelector('#removeCFAColBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() { if (colCount > 3) { colCount--; buildGrid(); bindEvents(); scrollToBottom(); } });

      runBtn.addEventListener('click', function() {
        var cols = [];
        var labels = [];
        section.querySelectorAll('textarea.cfa-data[data-idx]').forEach(function(ta, i) {
          cols.push(parseValues(ta.value).nums);
          var desc = section.querySelector('.cfa-desc[data-idx="' + i + '"]');
          labels.push(desc && desc.value ? desc.value : 'Item ' + (i + 1));
        });
        var model = parseCFAModel(section.querySelector('#cfaModelSpec').value);
        // Trim to min length
        var minLen = Infinity;
        cols.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
        cols = cols.map(function(c) { return c.slice(0, minLen); });
        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        runCFA(cols, labels, model);
      });
    }
    bindEvents();
  }

  function runCFA(cols, labels, model) {
    var nItems = cols.length;
    var n = cols[0].length;
    var nFactors = model.length;

    // Build data matrix (rows = obs, cols = items)
    var data = [];
    for (var i = 0; i < n; i++) {
      var row = [];
      for (var j = 0; j < nItems; j++) row.push(cols[j][i]);
      data.push(row);
    }

    // Compute means and SDs
    var means = [], sds = [];
    for (var j = 0; j < nItems; j++) {
      var s = 0;
      for (var i = 0; i < n; i++) s += data[i][j];
      means.push(s / n);
    }
    for (var j = 0; j < nItems; j++) {
      var ss = 0;
      for (var i = 0; i < n; i++) ss += (data[i][j] - means[j]) * (data[i][j] - means[j]);
      sds.push(Math.sqrt(ss / (n - 1)));
    }

    // Standardize data
    var Z = [];
    for (var i = 0; i < n; i++) {
      var row = [];
      for (var j = 0; j < nItems; j++) row.push(sds[j] > 0 ? (data[i][j] - means[j]) / sds[j] : 0);
      Z.push(row);
    }

    // Compute observed correlation matrix
    var R = [];
    for (var a = 0; a < nItems; a++) {
      R[a] = [];
      for (var b = 0; b < nItems; b++) {
        var s = 0;
        for (var i = 0; i < n; i++) s += Z[i][a] * Z[i][b];
        R[a][b] = s / (n - 1);
      }
    }

    // Build pattern matrix: which items load on which factors (0-indexed item numbers)
    var pattern = []; // pattern[item] = factor index (or -1)
    for (var j = 0; j < nItems; j++) pattern.push(-1);
    for (var f = 0; f < nFactors; f++) {
      for (var k = 0; k < model[f].items.length; k++) {
        var itemIdx = model[f].items[k] - 1; // convert to 0-indexed
        if (itemIdx >= 0 && itemIdx < nItems) pattern[itemIdx] = f;
      }
    }

    // Estimate loadings via regression approach for each factor
    // For items assigned to factor f, compute loadings as avg inter-item correlation approach
    var loadings = new Array(nItems);
    for (var j = 0; j < nItems; j++) loadings[j] = new Array(nFactors).fill(0);

    for (var f = 0; f < nFactors; f++) {
      var fItems = model[f].items.map(function(x) { return x - 1; });
      if (fItems.length < 2) {
        for (var k = 0; k < fItems.length; k++) loadings[fItems[k]][f] = 1.0;
        continue;
      }
      // Compute factor score as mean of standardized items in this factor
      var factorScores = [];
      for (var i = 0; i < n; i++) {
        var fs = 0;
        for (var k = 0; k < fItems.length; k++) fs += Z[i][fItems[k]];
        factorScores.push(fs / fItems.length);
      }
      // Standardize factor scores
      var fMean = 0, fSD = 0;
      for (var i = 0; i < n; i++) fMean += factorScores[i];
      fMean /= n;
      for (var i = 0; i < n; i++) fSD += (factorScores[i] - fMean) * (factorScores[i] - fMean);
      fSD = Math.sqrt(fSD / (n - 1));
      if (fSD > 0) {
        for (var i = 0; i < n; i++) factorScores[i] = (factorScores[i] - fMean) / fSD;
      }
      // Loading = correlation between each item and factor score
      for (var j = 0; j < nItems; j++) {
        var s = 0;
        for (var i = 0; i < n; i++) s += Z[i][j] * factorScores[i];
        loadings[j][f] = s / (n - 1);
      }
    }

    // Compute implied correlation matrix: Sigma = Lambda * Phi * Lambda' + Theta
    // Factor correlations (Phi)
    var phi = [];
    for (var a = 0; a < nFactors; a++) {
      phi[a] = [];
      for (var b = 0; b < nFactors; b++) {
        if (a === b) { phi[a][b] = 1; continue; }
        // Correlation between factor scores
        var fItemsA = model[a].items.map(function(x) { return x - 1; });
        var fItemsB = model[b].items.map(function(x) { return x - 1; });
        var scoresA = [], scoresB = [];
        for (var i = 0; i < n; i++) {
          var sa = 0, sb = 0;
          for (var k = 0; k < fItemsA.length; k++) sa += Z[i][fItemsA[k]];
          for (var k = 0; k < fItemsB.length; k++) sb += Z[i][fItemsB[k]];
          scoresA.push(sa / fItemsA.length);
          scoresB.push(sb / fItemsB.length);
        }
        var mA = 0, mB = 0;
        for (var i = 0; i < n; i++) { mA += scoresA[i]; mB += scoresB[i]; }
        mA /= n; mB /= n;
        var num = 0, dA = 0, dB = 0;
        for (var i = 0; i < n; i++) {
          num += (scoresA[i] - mA) * (scoresB[i] - mB);
          dA += (scoresA[i] - mA) * (scoresA[i] - mA);
          dB += (scoresB[i] - mB) * (scoresB[i] - mB);
        }
        phi[a][b] = dA > 0 && dB > 0 ? num / Math.sqrt(dA * dB) : 0;
      }
    }

    // Implied matrix: Sigma_ij = sum_f sum_g loadings[i][f] * phi[f][g] * loadings[j][g]
    var Sigma = [];
    for (var a = 0; a < nItems; a++) {
      Sigma[a] = [];
      for (var b = 0; b < nItems; b++) {
        var s = 0;
        for (var f = 0; f < nFactors; f++) {
          for (var g = 0; g < nFactors; g++) {
            s += loadings[a][f] * phi[f][g] * loadings[b][g];
          }
        }
        Sigma[a][b] = s;
      }
    }
    // Add unique variances on diagonal
    for (var j = 0; j < nItems; j++) {
      Sigma[j][j] = Math.max(Sigma[j][j], 1.0); // ensure diagonal >= 1
    }

    // Residual matrix
    var residual = [];
    var sumResidSq = 0, sumOffDiag = 0, countOffDiag = 0;
    for (var a = 0; a < nItems; a++) {
      residual[a] = [];
      for (var b = 0; b < nItems; b++) {
        residual[a][b] = R[a][b] - Sigma[a][b];
        if (a !== b) {
          sumResidSq += residual[a][b] * residual[a][b];
          sumOffDiag += R[a][b] * R[a][b];
          countOffDiag++;
        }
      }
    }

    // Fit indices (simplified)
    var p = nItems;
    var df = p * (p + 1) / 2 - (nItems * nFactors + nFactors * (nFactors - 1) / 2 + nItems);
    df = Math.max(df, 1);

    // SRMR
    var srmr = Math.sqrt(sumResidSq / (p * (p - 1)));

    // Approximate chi-square
    var chiSq = 0;
    for (var a = 0; a < nItems; a++) {
      for (var b = a + 1; b < nItems; b++) {
        chiSq += residual[a][b] * residual[a][b];
      }
    }
    chiSq *= (n - 1);

    // RMSEA
    var rmsea = Math.sqrt(Math.max(0, (chiSq / df - 1)) / (n - 1));

    // CFI (compare to null model — uncorrelated items)
    var chiSqNull = 0;
    for (var a = 0; a < nItems; a++) {
      for (var b = a + 1; b < nItems; b++) {
        chiSqNull += R[a][b] * R[a][b];
      }
    }
    chiSqNull *= (n - 1);
    var dfNull = p * (p - 1) / 2;
    var cfi = 1 - Math.max(0, chiSq - df) / Math.max(1, chiSqNull - dfNull);
    cfi = Math.min(1, Math.max(0, cfi));

    // Communalities
    var communalities = [];
    for (var j = 0; j < nItems; j++) {
      var h2 = 0;
      for (var f = 0; f < nFactors; f++) h2 += loadings[j][f] * loadings[j][f];
      communalities.push(h2);
    }

    // Traffic light for fit indices
    function fitColor(metric, value) {
      if (metric === 'cfi') return value >= 0.95 ? 'green' : value >= 0.90 ? 'amber' : 'red';
      if (metric === 'rmsea') return value <= 0.05 ? 'green' : value <= 0.08 ? 'amber' : 'red';
      if (metric === 'srmr') return value <= 0.05 ? 'green' : value <= 0.08 ? 'amber' : 'red';
      return '';
    }
    function fitVerdict(metric, value) {
      if (metric === 'cfi') return value >= 0.95 ? 'Excellent' : value >= 0.90 ? 'Acceptable' : 'Poor';
      if (metric === 'rmsea') return value <= 0.05 ? 'Excellent' : value <= 0.08 ? 'Acceptable' : 'Poor';
      if (metric === 'srmr') return value <= 0.05 ? 'Excellent' : value <= 0.08 ? 'Acceptable' : 'Poor';
      return '';
    }

    // Build loadings table
    var loadHtml = '<table class="loadings-table"><tr><th>Item</th>';
    for (var f = 0; f < nFactors; f++) loadHtml += '<th>' + escHtml(model[f].name) + '</th>';
    loadHtml += '<th>h&sup2;</th></tr>';
    for (var j = 0; j < nItems; j++) {
      loadHtml += '<tr><td>' + escHtml(labels[j]) + '</td>';
      for (var f = 0; f < nFactors; f++) {
        var lv = loadings[j][f];
        var cls = Math.abs(lv) >= 0.4 ? ' class="high-loading"' : '';
        loadHtml += '<td' + cls + '>' + round4(lv) + '</td>';
      }
      loadHtml += '<td>' + round4(communalities[j]) + '</td></tr>';
    }
    loadHtml += '</table>';

    // Factor correlations table (if > 1 factor)
    var corrHtml = '';
    if (nFactors > 1) {
      corrHtml = '<table class="loadings-table"><tr><th></th>';
      for (var f = 0; f < nFactors; f++) corrHtml += '<th>' + escHtml(model[f].name) + '</th>';
      corrHtml += '</tr>';
      for (var a = 0; a < nFactors; a++) {
        corrHtml += '<tr><td><strong>' + escHtml(model[a].name) + '</strong></td>';
        for (var b = 0; b < nFactors; b++) {
          corrHtml += '<td>' + round4(phi[a][b]) + '</td>';
        }
        corrHtml += '</tr>';
      }
      corrHtml += '</table>';
    }

    // Plain English
    var plainText = 'Confirmatory Factor Analysis tested a ' + nFactors + '-factor model on ' + nItems + ' items with ' + n + ' observations. ';
    for (var f = 0; f < nFactors; f++) {
      var fLabels = model[f].items.map(function(x) { return labels[x - 1] || 'Item ' + x; });
      plainText += model[f].name + ' was measured by ' + fLabels.join(', ') + '. ';
    }
    plainText += 'Fit indices: CFI = ' + round4(cfi) + ' (' + fitVerdict('cfi', cfi) + '), ';
    plainText += 'RMSEA = ' + round4(rmsea) + ' (' + fitVerdict('rmsea', rmsea) + '), ';
    plainText += 'SRMR = ' + round4(srmr) + ' (' + fitVerdict('srmr', srmr) + '). ';
    var overallFit = (cfi >= 0.90 && rmsea <= 0.08 && srmr <= 0.08) ? 'The model shows acceptable fit.' : 'The model shows some misfit \u2014 consider revising the factor structure.';
    plainText += overallFit + ' Note: this is a simplified CFA \u2014 for full SEM, use specialized software like lavaan or Mplus.';

    var chartId = 'cfaChart_' + Date.now();
    var chartHeight = Math.max(180, nItems * 55 + 30);

    var goodFit = cfi >= 0.90 && rmsea <= 0.08 && srmr <= 0.08;

    var html = '<div class="results-section">';

    // Big answer upfront: does the model fit?
    html += RC('Does Your Model Fit the Data?',
      '<div style="text-align:center">' +
        '<div style="font-size:2.8rem;font-weight:700;color:' + (goodFit ? 'var(--green)' : 'var(--rose)') + ';line-height:1">' + (goodFit ? 'Yes' : 'Needs Work') + '</div>' +
        '<div style="font-size:0.88rem;color:var(--text-2);margin-top:0.4rem;line-height:1.5">' + nFactors + '-factor model, ' + nItems + ' items, n=' + n + '</div>' +
      '</div>'
    );

    // Fit indices with color coding
    html += RC('Fit Indices',
      renderMetrics([
        { label: 'CFI', value: round4(cfi) + ' (' + fitVerdict('cfi', cfi) + ')', cls: fitColor('cfi', cfi) },
        { label: 'RMSEA', value: round4(rmsea) + ' (' + fitVerdict('rmsea', rmsea) + ')', cls: fitColor('rmsea', rmsea) },
        { label: 'SRMR', value: round4(srmr) + ' (' + fitVerdict('srmr', srmr) + ')', cls: fitColor('srmr', srmr) }
      ])
    );

    // Loading chart
    html += renderChart(chartId, 'Factor Loadings', 500, chartHeight,
      'Bar color = factor assignment. \u2265 0.4 = good loading.');

    // Detailed tables (collapsed)
    html += renderCollapsed('Loading Table &amp; Details',
      loadHtml +
      (corrHtml ? '<div style="margin-top:1rem"><strong>Factor Correlations</strong></div>' + corrHtml : '')
    );

    // Plain English
    html += renderPlainEnglish(plainText);

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    // Horizontal bar chart of loadings (primary loading per item)
    var bars = [];
    for (var j = 0; j < nItems; j++) {
      var maxF = 0, maxVal = Math.abs(loadings[j][0]);
      for (var f = 1; f < nFactors; f++) {
        if (Math.abs(loadings[j][f]) > maxVal) { maxF = f; maxVal = Math.abs(loadings[j][f]); }
      }
      bars.push({
        label: labels[j],
        value: loadings[j][maxF],
        color: CHART_COLORS[maxF % CHART_COLORS.length]
      });
    }
    drawBarChart(chartId, bars);
    showNextSteps('scale', { n: n });
  }

  /* ==================================================================
     Item Response Theory — Rasch (1PL)
     ================================================================== */
  function showIRTInput() {

      gridHtml += '</div>';

      section.innerHTML = gridHtml;
    }

    buildGrid();
    container.appendChild(section);
    scrollToBottom();

    function bindEvents() {
      var textareas = section.querySelectorAll('.irt-data');
      var runBtn = section.querySelector('#runBtn');

      function checkReady() {
        var allGood = true;
        var firstLen = -1;
        section.querySelectorAll('.irt-data').forEach(function(ta) {
          var vals = parseValues(ta.value).nums;
          if (vals.length < 5) { allGood = false; return; }
          if (firstLen === -1) firstLen = vals.length;
          else if (vals.length !== firstLen) allGood = false;
          for (var i = 0; i < vals.length; i++) {
            if (vals[i] !== 0 && vals[i] !== 1) { allGood = false; return; }
          }
        });
        runBtn.disabled = !allGood;
      }

      textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');

          var parsed = parseValues(ta.value);
          if (parsed.nums.length === 0) {
            countEl.textContent = 'No values detected';
            countEl.className = 'value-count';
          } else {
            var nonBinary = 0;
            parsed.nums.forEach(function(v) { if (v !== 0 && v !== 1) nonBinary++; });
            if (nonBinary > 0) {
              countEl.textContent = parsed.nums.length + ' values, ' + nonBinary + ' not 0/1';
              countEl.className = 'value-count warning';

              countEl.textContent = parsed.nums.length + ' binary values';
              countEl.className = 'value-count valid';
            }
          }
          checkReady();
        });
      });

      var addBtn = section.querySelector('#addIRTColBtn');
      if (addBtn) addBtn.addEventListener('click', function() { colCount++; buildGrid(); bindEvents(); scrollToBottom(); });
      var removeBtn = section.querySelector('#removeIRTColBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() { if (colCount > 3) { colCount--; buildGrid(); bindEvents(); scrollToBottom(); } });

      runBtn.addEventListener('click', function() {

        var labels = [];
        section.querySelectorAll('.irt-data').forEach(function(ta, i) {

          var desc = section.querySelector('.irt-desc[data-idx="' + i + '"]');

  function runIRT(cols, labels) {
    var nItems = cols.length;
    var n = cols[0].length;

    // Build data matrix (rows = persons, cols = items)
    var data = [];
    for (var i = 0; i < n; i++) {
      var row = [];
      for (var j = 0; j < nItems; j++) row.push(cols[j][i]);
      data.push(row);
    }

    // Person raw scores
    var personRaw = [];
    for (var i = 0; i < n; i++) {
      var s = 0;
      for (var j = 0; j < nItems; j++) s += data[i][j];
      personRaw.push(s);
    }

    // Item proportions correct
    var itemP = [];
    for (var j = 0; j < nItems; j++) {
      var s = 0;
      for (var i = 0; i < n; i++) s += data[i][j];
      itemP.push(s / n);
    }

    // JMLE (Joint Maximum Likelihood Estimation) for Rasch model
    // Initialize item difficulties from log-odds
    var beta = []; // item difficulty
    for (var j = 0; j < nItems; j++) {
      var pj = Math.max(0.001, Math.min(0.999, itemP[j]));
      beta.push(-Math.log(pj / (1 - pj)));
    }

    // Initialize person abilities from raw scores
    var theta = []; // person ability
    for (var i = 0; i < n; i++) {
      var pi = Math.max(0.5, Math.min(nItems - 0.5, personRaw[i]));
      theta.push(Math.log(pi / (nItems - pi)));
    }

    // Iterative estimation
    var maxIter = 100;
    for (var iter = 0; iter < maxIter; iter++) {
      var maxChange = 0;

      // Update item difficulties
      for (var j = 0; j < nItems; j++) {
        var observed = 0;
        var expected = 0;
        var info = 0;
        for (var i = 0; i < n; i++) {
          var logit = theta[i] - beta[j];
          var p = 1 / (1 + Math.exp(-logit));
          p = Math.max(1e-10, Math.min(1 - 1e-10, p));
          observed += data[i][j];
          expected += p;
          info += p * (1 - p);
        }
        var delta = (observed - expected) / Math.max(info, 0.01);
        beta[j] -= delta; // Note: negative because item difficulty
        if (Math.abs(delta) > maxChange) maxChange = Math.abs(delta);
      }

      // Center item difficulties
      var meanBeta = 0;
      for (var j = 0; j < nItems; j++) meanBeta += beta[j];
      meanBeta /= nItems;
      for (var j = 0; j < nItems; j++) beta[j] -= meanBeta;

      // Update person abilities
      for (var i = 0; i < n; i++) {
        var observed = personRaw[i];
        var expected = 0;
        var info = 0;
        for (var j = 0; j < nItems; j++) {
          var logit = theta[i] - beta[j];
          var p = 1 / (1 + Math.exp(-logit));
          p = Math.max(1e-10, Math.min(1 - 1e-10, p));
          expected += p;
          info += p * (1 - p);
        }
        var delta = (observed - expected) / Math.max(info, 0.01);
        theta[i] += delta;
        if (Math.abs(delta) > maxChange) maxChange = Math.abs(delta);
      }

      if (maxChange < 0.001) break;
    }

    // Compute item SE, infit, outfit
    var itemSE = [], infit = [], outfit = [];
    for (var j = 0; j < nItems; j++) {
      var info = 0;
      var sumWeightedResidSq = 0, sumWeights = 0;
      var sumStdResidSq = 0;
      for (var i = 0; i < n; i++) {
        var logit = theta[i] - beta[j];
        var p = 1 / (1 + Math.exp(-logit));
        p = Math.max(1e-10, Math.min(1 - 1e-10, p));
        var w = p * (1 - p);
        info += w;
        var resid = data[i][j] - p;
        var stdResid = resid / Math.sqrt(Math.max(w, 1e-10));
        sumWeightedResidSq += resid * resid; // weighted by variance
        sumWeights += w;
        sumStdResidSq += stdResid * stdResid;
      }
      itemSE.push(1 / Math.sqrt(Math.max(info, 0.01)));
      infit.push(sumWeightedResidSq / Math.max(sumWeights, 0.01));
      outfit.push(sumStdResidSq / n);
    }

    // Person ability summary stats
    var thetaMean = 0, thetaVar = 0;
    for (var i = 0; i < n; i++) thetaMean += theta[i];
    thetaMean /= n;
    for (var i = 0; i < n; i++) thetaVar += (theta[i] - thetaMean) * (theta[i] - thetaMean);
    thetaVar /= (n - 1);
    var thetaSD = Math.sqrt(thetaVar);
    var thetaMin = theta[0], thetaMax = theta[0];
    for (var i = 1; i < n; i++) {
      if (theta[i] < thetaMin) thetaMin = theta[i];
      if (theta[i] > thetaMax) thetaMax = theta[i];
    }

    // Person separation reliability: R = var(theta) / (var(theta) + mean(SE^2))
    var meanSE2 = 0;
    for (var i = 0; i < n; i++) {
      var pInfo = 0;
      for (var j = 0; j < nItems; j++) {
        var logit = theta[i] - beta[j];
        var p = 1 / (1 + Math.exp(-logit));
        p = Math.max(1e-10, Math.min(1 - 1e-10, p));
        pInfo += p * (1 - p);
      }
      meanSE2 += 1 / Math.max(pInfo, 0.01);
    }
    meanSE2 /= n;
    var reliability = Math.max(0, (thetaVar - meanSE2) / Math.max(thetaVar, 0.001));

    // Flag items
    var flagged = [];
    for (var j = 0; j < nItems; j++) {
      var flags = [];
      if (infit[j] > 1.3 || infit[j] < 0.7) flags.push('infit');
      if (outfit[j] > 1.3 || outfit[j] < 0.7) flags.push('outfit');
      flagged.push(flags);
    }

    // Sort items by difficulty for table
    var sortedIdx = [];
    for (var j = 0; j < nItems; j++) sortedIdx.push(j);
    sortedIdx.sort(function(a, b) { return beta[a] - beta[b]; });

    // Build item difficulty table
    var tableHtml = '<table class="loadings-table"><tr><th>Item</th><th>Difficulty</th><th>SE</th><th>Infit</th><th>Outfit</th><th>Flags</th></tr>';
    for (var k = 0; k < nItems; k++) {
      var j = sortedIdx[k];
      var flagStr = flagged[j].length > 0 ? '<span style="color:var(--amber);font-weight:700">' + flagged[j].join(', ') + '</span>' : '<span style="color:var(--green)">OK</span>';
      tableHtml += '<tr><td>' + escHtml(labels[j]) + '</td><td>' + round4(beta[j]) + '</td><td>' + round4(itemSE[j]) + '</td>' +
        '<td' + (infit[j] > 1.3 || infit[j] < 0.7 ? ' style="color:var(--amber);font-weight:700"' : '') + '>' + round4(infit[j]) + '</td>' +
        '<td' + (outfit[j] > 1.3 || outfit[j] < 0.7 ? ' style="color:var(--amber);font-weight:700"' : '') + '>' + round4(outfit[j]) + '</td>' +
        '<td>' + flagStr + '</td></tr>';
    }
    tableHtml += '</table>';

    // Count flagged
    var nFlagged = 0;
    for (var j = 0; j < nItems; j++) { if (flagged[j].length > 0) nFlagged++; }

    // Plain English
    var plainText = 'IRT Rasch (1PL) model estimated ' + nItems + ' item difficulties and ' + n + ' person abilities. ';
    var easiest = labels[sortedIdx[0]], hardest = labels[sortedIdx[nItems - 1]];
    plainText += 'Easiest item: ' + easiest + ' (difficulty = ' + round4(beta[sortedIdx[0]]) + '), ';
    plainText += 'hardest item: ' + hardest + ' (difficulty = ' + round4(beta[sortedIdx[nItems - 1]]) + '). ';
    plainText += 'Person ability: M = ' + round4(thetaMean) + ', SD = ' + round4(thetaSD) + '. ';
    plainText += 'Person separation reliability = ' + round4(reliability) + (reliability >= 0.8 ? ' (good)' : reliability >= 0.7 ? ' (acceptable)' : ' (low)') + '. ';
    if (nFlagged > 0) plainText += nFlagged + ' item(s) flagged for misfit (infit/outfit outside 0.7\u20131.3). ';
    plainText += 'Note: this is a 1PL Rasch model \u2014 for 2PL/3PL models, use specialized IRT software.';

    var chartId = 'irtChart_' + Date.now();
    var chartHeight = Math.max(180, nItems * 55 + 30);

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Person Ability Summary</div><div class="test-results-grid">' +
        testStat('Mean Ability', round4(thetaMean)) + testStat('SD', round4(thetaSD)) +
        testStat('Min', round4(thetaMin)) + testStat('Max', round4(thetaMax)) +
        testStat('Reliability', round4(reliability)) + testStat('n', n) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Item Parameters</div>' + tableHtml +
        '<div class="effect-interpretation">Difficulty: higher = harder. Infit/Outfit: expected range 0.7\u20131.3. Items outside this range may not fit the Rasch model well.</div></div>' +
      '<div class="result-card"><div class="result-card-title">Item Difficulties (sorted)</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + chartHeight + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    // Bar chart of item difficulties sorted
    var bars = [];
    for (var k = 0; k < nItems; k++) {
      var j = sortedIdx[k];
      bars.push({
        label: labels[j],
        value: beta[j],
        color: flagged[j].length > 0 ? CHART_COLORS[4] : CHART_COLORS[2]
      });
    }
    drawBarChart(chartId, bars);
    showNextSteps('scale', { n: n });
  }

  /* ==================================================================
     Mixed-Effects Model (Random Intercept)
     ================================================================== */
  function showMixedEffectsInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    var predCount = 1;
    var maxPreds = 8;

    function buildGrid() {
      var gridHtml = '<div class="input-grid multi-col">';
      // Grouping variable first
      gridHtml +=
        '<div class="group-card">' +
          '<div class="group-card-label" style="background:var(--coral-soft);padding:4px 8px;border-radius:6px">Grouping variable (categories)</div>' +
          '<textarea class="me-data" data-idx="group" data-type="categorical" placeholder="e.g., Team A, Team A, Team B, Team B...\nOne value per row (same order as outcome)"></textarea>' +
          '<div class="value-count me-count" data-idx="group">No values detected</div>' +
        '</div>';
      // Outcome
      gridHtml +=
        '<div class="group-card">' +
          '<div class="group-card-label">Outcome (numeric)</div>' +
          '<textarea class="me-data" data-idx="outcome" data-type="numeric" placeholder="Paste outcome values, one per line..."></textarea>' +
          '<div class="desc-label">Label</div>' +
          '<input type="text" class="me-desc" data-idx="outcome" placeholder="e.g., Satisfaction">' +
          '<div class="value-count me-count" data-idx="outcome">No values detected</div>' +
        '</div>';
      // Predictors
      for (var i = 0; i < predCount; i++) {
        gridHtml +=
          '<div class="group-card">' +
            '<div class="group-card-label">Predictor ' + (i + 1) + ' (numeric)</div>' +
            '<textarea class="me-data me-pred" data-idx="pred' + i + '" data-type="numeric" placeholder="Paste predictor values, one per line..."></textarea>' +
            '<div class="desc-label">Label</div>' +
            '<input type="text" class="me-desc" data-idx="pred' + i + '" placeholder="e.g., Predictor ' + (i + 1) + '">' +
            '<div class="value-count me-count" data-idx="pred' + i + '">No values detected</div>' +
          '</div>';
      }
      gridHtml += '</div>';
      gridHtml += '<div style="display:flex;gap:8px;justify-content:center">';
      if (predCount < maxPreds) gridHtml += '<button class="add-col-btn" id="addMEPredBtn">+ Add predictor</button>';
      if (predCount > 1) gridHtml += '<button class="remove-col-btn" id="removeMEPredBtn">- Remove last predictor</button>';
      gridHtml += '</div>';
      gridHtml += '<button class="run-btn" id="runBtn" disabled>Run Mixed-Effects Model</button>';
      section.innerHTML = gridHtml;
    }

    buildGrid();
    container.appendChild(section);
    scrollToBottom();

    function bindEvents() {
      var runBtn = section.querySelector('#runBtn');

      function checkReady() {
        var allGood = true;
        var groupTa = section.querySelector('.me-data[data-idx="group"]');
        var groups = parseCategorical(groupTa.value);
        if (groups.length < 5) allGood = false;

        var outcomeTa = section.querySelector('.me-data[data-idx="outcome"]');
        var outcome = parseValues(outcomeTa.value).nums;
        if (outcome.length < 5) allGood = false;

        if (groups.length !== outcome.length && groups.length > 0 && outcome.length > 0) allGood = false;

        section.querySelectorAll('.me-pred').forEach(function(ta) {
          var vals = parseValues(ta.value).nums;
          if (vals.length < 5) allGood = false;
          if (vals.length !== outcome.length && vals.length > 0 && outcome.length > 0) allGood = false;
        });

        // Need at least 2 groups
        if (allGood) {
          var uniqueGroups = {};
          groups.forEach(function(g) { uniqueGroups[g] = true; });
          if (Object.keys(uniqueGroups).length < 2) allGood = false;
        }

        runBtn.disabled = !allGood;
      }

      section.querySelectorAll('.me-data').forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');
          var countEl = section.querySelector('.me-count[data-idx="' + idx + '"]');
          var type = ta.getAttribute('data-type');
          if (type === 'numeric') {
            updateCount(ta, countEl);
          } else {
            var lines = parseCategorical(ta.value);
            if (lines.length === 0) {
              countEl.textContent = 'No values detected';
              countEl.className = 'value-count';
            } else {
              var unique = {};
              lines.forEach(function(l) { unique[l] = true; });
              countEl.textContent = lines.length + ' values, ' + Object.keys(unique).length + ' groups';
              countEl.className = 'value-count valid';
            }
          }
          checkReady();
        });
      });

      var addBtn = section.querySelector('#addMEPredBtn');
      if (addBtn) addBtn.addEventListener('click', function() { predCount++; buildGrid(); bindEvents(); scrollToBottom(); });
      var removeBtn = section.querySelector('#removeMEPredBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() { if (predCount > 1) { predCount--; buildGrid(); bindEvents(); scrollToBottom(); } });

      runBtn.addEventListener('click', function() {
        var groups = parseCategorical(section.querySelector('.me-data[data-idx="group"]').value);
        var outcome = parseValues(section.querySelector('.me-data[data-idx="outcome"]').value).nums;
        var outcomeLabel = (section.querySelector('.me-desc[data-idx="outcome"]') || {}).value || 'Outcome';
        var preds = [];
        var predLabels = [];
        section.querySelectorAll('.me-pred').forEach(function(ta) {
          preds.push(parseValues(ta.value).nums);
          var idx = ta.getAttribute('data-idx');
          var desc = section.querySelector('.me-desc[data-idx="' + idx + '"]');
          predLabels.push(desc && desc.value ? desc.value : idx);
        });
        // Trim to min length
        var minLen = Math.min(groups.length, outcome.length);
        preds.forEach(function(p) { minLen = Math.min(minLen, p.length); });
        groups = groups.slice(0, minLen);
        outcome = outcome.slice(0, minLen);
        preds = preds.map(function(p) { return p.slice(0, minLen); });

        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        runMixedEffects(outcome, preds, groups, outcomeLabel, predLabels);
      });
    }
    bindEvents();
  }

  function runMixedEffects(outcome, preds, groups, outcomeLabel, predLabels) {
    var n = outcome.length;
    var nPreds = preds.length;

    // Identify unique groups
    var uniqueGroups = [];
    var groupMap = {};
    for (var i = 0; i < n; i++) {
      if (groupMap[groups[i]] === undefined) {
        groupMap[groups[i]] = uniqueGroups.length;
        uniqueGroups.push(groups[i]);
      }
    }
    var nGroups = uniqueGroups.length;
    var groupIdx = groups.map(function(g) { return groupMap[g]; });

    // Step 1: Fit OLS regression (fixed effects) with predictors
    // Design matrix X: intercept + predictors
    var nCols = 1 + nPreds;
    var X = [];
    for (var i = 0; i < n; i++) {
      var row = [1]; // intercept
      for (var p = 0; p < nPreds; p++) row.push(preds[p][i]);
      X.push(row);
    }

    // OLS: beta = (X'X)^-1 X'y
    var XtX = [];
    for (var a = 0; a < nCols; a++) {
      XtX[a] = [];
      for (var b = 0; b < nCols; b++) {
        var s = 0;
        for (var i = 0; i < n; i++) s += X[i][a] * X[i][b];
        XtX[a][b] = s;
      }
    }
    var Xty = [];
    for (var a = 0; a < nCols; a++) {
      var s = 0;
      for (var i = 0; i < n; i++) s += X[i][a] * outcome[i];
      Xty.push(s);
    }

    var XtXinv = invertMatrix(XtX);
    if (!XtXinv) {
      container.insertAdjacentHTML('beforeend', '<div class="results-section"><div class="result-card"><div class="result-card-title">Error</div><p>Could not estimate model — predictor matrix is singular. Check for perfectly correlated or constant predictors.</p></div></div>');
      scrollToBottom();
      return;
    }

    var betaFixed = [];
    for (var a = 0; a < nCols; a++) {
      var s = 0;
      for (var b = 0; b < nCols; b++) s += XtXinv[a][b] * Xty[b];
      betaFixed.push(s);
    }

    // Fixed-effect residuals
    var fixedResid = [];
    for (var i = 0; i < n; i++) {
      var yhat = 0;
      for (var a = 0; a < nCols; a++) yhat += X[i][a] * betaFixed[a];
      fixedResid.push(outcome[i] - yhat);
    }

    // Step 2: Estimate group-level random intercepts
    var groupMeans = new Array(nGroups).fill(0);
    var groupCounts = new Array(nGroups).fill(0);
    for (var i = 0; i < n; i++) {
      groupMeans[groupIdx[i]] += fixedResid[i];
      groupCounts[groupIdx[i]]++;
    }
    for (var g = 0; g < nGroups; g++) {
      groupMeans[g] = groupCounts[g] > 0 ? groupMeans[g] / groupCounts[g] : 0;
    }

    // Variance components
    // sigma_u^2 = between-group variance of random intercepts
    var grandMean = 0;
    for (var g = 0; g < nGroups; g++) grandMean += groupMeans[g];
    grandMean /= nGroups;
    var sigmaU2 = 0;
    for (var g = 0; g < nGroups; g++) sigmaU2 += (groupMeans[g] - grandMean) * (groupMeans[g] - grandMean);
    sigmaU2 /= Math.max(nGroups - 1, 1);

    // sigma_e^2 = within-group residual variance
    var sigmaE2 = 0;
    for (var i = 0; i < n; i++) {
      var withinResid = fixedResid[i] - groupMeans[groupIdx[i]];
      sigmaE2 += withinResid * withinResid;
    }
    sigmaE2 /= Math.max(n - nGroups - nPreds, 1);

    // ICC = sigma_u^2 / (sigma_u^2 + sigma_e^2)
    var icc = sigmaU2 / Math.max(sigmaU2 + sigmaE2, 1e-10);

    // Standard errors for fixed effects
    var mse = sigmaE2;
    var fixedSE = [];
    for (var a = 0; a < nCols; a++) {
      fixedSE.push(Math.sqrt(Math.max(0, XtXinv[a][a] * mse)));
    }

    // t-values and p-values (approx)
    var fixedT = [];
    var fixedP = [];
    for (var a = 0; a < nCols; a++) {
      var t = fixedSE[a] > 0 ? betaFixed[a] / fixedSE[a] : 0;
      fixedT.push(t);
      // Approximate p-value from t (using normal approximation for large n)
      var absT = Math.abs(t);
      var pVal = 2 * (1 - normalCDF(absT));
      fixedP.push(pVal);
    }

    // R-squared marginal (fixed effects only) and conditional (fixed + random)
    var yMean = 0;
    for (var i = 0; i < n; i++) yMean += outcome[i];
    yMean /= n;
    var ssTot = 0;
    for (var i = 0; i < n; i++) ssTot += (outcome[i] - yMean) * (outcome[i] - yMean);

    var ssResidFixed = 0;
    for (var i = 0; i < n; i++) ssResidFixed += fixedResid[i] * fixedResid[i];
    var r2Marginal = 1 - ssResidFixed / Math.max(ssTot, 1e-10);

    var ssResidCond = 0;
    for (var i = 0; i < n; i++) {
      var condResid = fixedResid[i] - groupMeans[groupIdx[i]];
      ssResidCond += condResid * condResid;
    }
    var r2Conditional = 1 - ssResidCond / Math.max(ssTot, 1e-10);

    // Normal CDF helper (already exists in most implementations, but inline for safety)
    function normalCDF(x) {
      var t = 1 / (1 + 0.2316419 * Math.abs(x));
      var d = 0.3989422804014327;
      var p = d * Math.exp(-x * x / 2) * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.8212560 + t * 1.3302744))));
      return x > 0 ? 1 - p : p;
    }

    // Fixed effects table
    var fixedHtml = '<table class="loadings-table"><tr><th>Effect</th><th>Estimate</th><th>SE</th><th>t</th><th>p</th></tr>';
    var fixedLabels = ['Intercept'].concat(predLabels);
    for (var a = 0; a < nCols; a++) {
      var pClass = fixedP[a] < 0.001 ? 'green' : fixedP[a] < 0.05 ? 'green' : fixedP[a] < 0.1 ? 'amber' : 'red';
      fixedHtml += '<tr><td>' + escHtml(fixedLabels[a]) + '</td><td>' + round4(betaFixed[a]) + '</td><td>' + round4(fixedSE[a]) + '</td>' +
        '<td>' + round4(fixedT[a]) + '</td><td class="' + pClass + '">' + round6(fixedP[a]) + (fixedP[a] < 0.05 ? ' *' : '') + '</td></tr>';
    }
    fixedHtml += '</table>';

    // Random intercepts table (sorted)
    var sortedGroups = [];
    for (var g = 0; g < nGroups; g++) sortedGroups.push(g);
    sortedGroups.sort(function(a, b) { return groupMeans[a] - groupMeans[b]; });

    var randomHtml = '<table class="loadings-table"><tr><th>Group</th><th>Intercept</th><th>n</th></tr>';
    for (var k = 0; k < nGroups; k++) {
      var g = sortedGroups[k];
      randomHtml += '<tr><td>' + escHtml(uniqueGroups[g]) + '</td><td>' + round4(groupMeans[g]) + '</td><td>' + groupCounts[g] + '</td></tr>';
    }
    randomHtml += '</table>';

    // Plain English
    var plainText = 'Mixed-effects model (random intercept) with ' + n + ' observations in ' + nGroups + ' groups. ';
    if (nPreds > 0) {
      plainText += 'Fixed effects: ';
      for (var p = 0; p < nPreds; p++) {
        plainText += predLabels[p] + ' (b = ' + round4(betaFixed[p + 1]) + ', p = ' + round6(fixedP[p + 1]) + (fixedP[p + 1] < 0.05 ? ', significant' : ', not significant') + ')';
        if (p < nPreds - 1) plainText += ', ';
      }
      plainText += '. ';
    }
    plainText += 'ICC = ' + round4(icc) + ' \u2014 ' + round2(icc * 100) + '% of variance is between groups. ';
    if (icc > 0.1) {
      plainText += 'This supports using a mixed model (substantial group-level variation). ';
    } else {
      plainText += 'Group-level variation is small; a standard regression may suffice. ';
    }
    plainText += 'R\u00b2 marginal (fixed only) = ' + round4(r2Marginal) + ', R\u00b2 conditional (fixed + random) = ' + round4(r2Conditional) + '. ';
    plainText += 'Note: this is a random-intercept model only \u2014 for random slopes or crossed effects, use lme4 or similar.';

    var chartId = 'meChart_' + Date.now();
    var chartHeight = Math.max(180, nGroups * 55 + 30);

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Fixed Effects</div>' + fixedHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Variance Components</div><div class="test-results-grid">' +
        testStat('\u03c3\u00b2_u (between groups)', round4(sigmaU2)) + testStat('\u03c3\u00b2_e (within groups)', round4(sigmaE2)) +
        testStat('ICC', round4(icc)) + testStat('Groups', nGroups) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Model Fit</div><div class="test-results-grid">' +
        testStat('R\u00b2 marginal', round4(r2Marginal)) + testStat('R\u00b2 conditional', round4(r2Conditional)) +
        testStat('n', n) +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Random Intercepts by Group</div>' + randomHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Random Intercepts</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + chartHeight + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    // Bar chart of random intercepts
    var bars = [];
    for (var k = 0; k < nGroups; k++) {
      var g = sortedGroups[k];
      bars.push({
        label: uniqueGroups[g],
        value: groupMeans[g],
        color: groupMeans[g] >= 0 ? CHART_COLORS[2] : CHART_COLORS[6]
      });
    }
    drawBarChart(chartId, bars);
    showNextSteps('regression', { n: n });
  }

  /* ==================================================================
     Matrix helpers for Conjoint / Discrete Choice
     ================================================================== */
  function transposeMatrix(M) {
    var rows = M.length, cols = M[0].length;
    var T = [];
    for (var j = 0; j < cols; j++) {
      var row = [];
      for (var i = 0; i < rows; i++) row.push(M[i][j]);
      T.push(row);
    }
    return T;
  }

  function multiplyMatrices(A, B) {
    var rA = A.length, cA = A[0].length, cB = B[0].length;
    var C = [];
    for (var i = 0; i < rA; i++) {
      var row = [];
      for (var j = 0; j < cB; j++) {
        var s = 0;
        for (var k = 0; k < cA; k++) s += A[i][k] * B[k][j];
        row.push(s);
      }
      C.push(row);
    }
    return C;
  }

  function invertMatrix(M) {
    var n = M.length;
    // Augmented matrix
    var aug = [];
    for (var i = 0; i < n; i++) {
      var row = [];
      for (var j = 0; j < n; j++) row.push(M[i][j]);
      for (var j = 0; j < n; j++) row.push(i === j ? 1 : 0);
      aug.push(row);
    }
    // Gauss-Jordan
    for (var col = 0; col < n; col++) {
      // Find pivot
      var maxRow = col;
      for (var r = col + 1; r < n; r++) {
        if (Math.abs(aug[r][col]) > Math.abs(aug[maxRow][col])) maxRow = r;
      }
      if (Math.abs(aug[maxRow][col]) < 1e-12) return null;
      var tmp = aug[col]; aug[col] = aug[maxRow]; aug[maxRow] = tmp;
      var pivot = aug[col][col];
      for (var j = 0; j < 2 * n; j++) aug[col][j] /= pivot;
      for (var r = 0; r < n; r++) {
        if (r === col) continue;
        var factor = aug[r][col];
        for (var j = 0; j < 2 * n; j++) aug[r][j] -= factor * aug[col][j];
      }
    }
    var inv = [];
    for (var i = 0; i < n; i++) {
      var row = [];
      for (var j = n; j < 2 * n; j++) row.push(aug[i][j]);
      inv.push(row);
    }
    return inv;
  }

  /* ==================================================================
     Validation Checklist (shown after every analysis)
     ================================================================== */
  function showValidationChecklist(methodType, result) {
    var universal = [
      'My sample is representative of the population I care about',
      'I\u2019ve checked for obvious data entry errors or outliers',
      'The effect size is practically meaningful, not just statistically significant',
      'I understand what this test assumes about my data'
    ];

    var typeChecks = {
      group_comparison: [
        'Groups are independent (different people in each group)',
        'Sample sizes per group are adequate (n \u2265 20 recommended)',
        'I\u2019ve considered whether non-parametric alternatives might be more appropriate'
      ],
      paired: [
        'Measurements are truly from the same subjects',
        'The pairing is meaningful (before/after, matched pairs)'
      ],
      correlation: [
        'I\u2019m not confusing correlation with causation',
        'I\u2019ve checked for non-linear relationships',
        'There are no extreme outliers driving the result'
      ],
      regression: [
        'I\u2019m not confusing correlation with causation',
        'I\u2019ve checked for non-linear relationships',
        'There are no extreme outliers driving the result',
        'Predictors are not too highly correlated with each other (multicollinearity)'
      ],
      clustering: [
        'The number of clusters makes business sense',
        'Segments are actionable \u2014 you can target them differently',
        'Results are stable (would you get similar segments with a different sample?)'
      ],
      scale: [
        'Items are conceptually related (not just statistically)',
        'Sample size is adequate for factor analysis (n \u2265 5\u00d7 number of items)'
      ],
      causal: [
        'The comparison groups are truly comparable',
        'No major confounding variables are missing',
        'The treatment/intervention was consistently applied'
      ],
      descriptive: [],
      text: [],
      preference: []
    };

    var checks = universal.concat(typeChecks[methodType] || []);

    // Auto-populated warnings
    var warnings = [];
    if (result) {
      // Check for small n
      var n = result.n || result.na || result.nA || result.totalN || null;
      if (n !== null && n < 30) {
        warnings.push('\u26A0 Small sample size (n = ' + n + '). Results may be unstable.');
      }
      // Check for marginally significant p
      var p = result.p || result.pValue || null;
      if (p !== null && p >= 0.01 && p < 0.05) {
        warnings.push('\u26A0 Marginally significant. Consider replication.');
      }
      // Check for small group sizes
      var groupNs = result.groupNs || null;
      if (groupNs) {
        var hasSmall = false;
        for (var gi = 0; gi < groupNs.length; gi++) {
          if (groupNs[gi] < 10) { hasSmall = true; break; }
        }
        if (hasSmall) {
          warnings.push('\u26A0 Some groups have very few observations.');
        }
      }
      if (result.nb !== undefined && result.nb < 10) {
        warnings.push('\u26A0 One group has very few observations (n = ' + result.nb + ').');
      }
      if (result.na !== undefined && result.na < 10) {
        warnings.push('\u26A0 One group has very few observations (n = ' + result.na + ').');
      }
      // Check low R²
      var r2 = result.r2 || result.rSquared || result.R2 || null;
      if (r2 !== null && r2 < 0.1 && (methodType === 'regression')) {
        warnings.push('\u26A0 Model explains very little variance (R\u00b2 = ' + round4(r2) + ').');
      }
    }

    var warningsHtml = '';
    if (warnings.length > 0) {
      warningsHtml = '<div class="auto-warnings">';
      warnings.forEach(function(w) {
        warningsHtml += '<div class="auto-warning">' + w + '</div>';
      });
      warningsHtml += '</div>';
    }

    var checklistHtml = '<div class="checklist">';
    checks.forEach(function(item) {
      checklistHtml += '<label class="check-item"><input type="checkbox"> ' + escHtml(item) + '</label>';
    });
    checklistHtml += '</div>';

    var html = '<div class="validation-card"><details>' +
      '<summary class="validation-title">\u2713 Validate your results</summary>' +
      '<div class="validation-content">' +
      warningsHtml +
      checklistHtml +
      '<p class="validation-note">Checking these helps ensure your analysis is trustworthy and your conclusions are sound.</p>' +
      '</div></details></div>';

    container.insertAdjacentHTML('beforeend', html);
  }

  /* ==================================================================
     Multi-Response / Checkbox Analysis
     ================================================================== */
  function parseMultiResponse(text) {
    var lines = text.split(/\n/).filter(function(l) { return l.trim() !== ''; });
    if (lines.length === 0) return { isMultiResponse: false, values: [] };

    // Check if any line has tabs
    var hasTabs = false;
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].indexOf('\t') > -1) { hasTabs = true; break; }
    }

    if (!hasTabs) {
      // Single column — filter Excel errors
      var vals = lines.map(function(l) { return l.trim(); }).filter(function(s) { return s !== '' && !isExcelError(s); });
      var excelErrors = lines.filter(function(l) { return isExcelError(l.trim()); }).length;
      return { isMultiResponse: false, values: vals, excelErrors: excelErrors };
    }

    // Multi-column: split by tabs, skip rows that are entirely Excel errors/empty
    var allRows = [];
    var maxCols = 0;
    var excelErrors = 0;
    lines.forEach(function(line) {
      var cells = line.split('\t').map(function(c) { return c.trim(); });
      var rowAllErrorsOrEmpty = cells.every(function(c) { return c === '' || isExcelError(c); });
      if (rowAllErrorsOrEmpty && cells.some(function(c) { return isExcelError(c); })) { excelErrors++; return; }
      if (cells.length > maxCols) maxCols = cells.length;
      allRows.push(cells);
    });

    // Detect header row: first row all non-numeric/non-empty, subsequent rows mostly numeric/empty
    var headerRow = null;
    if (allRows.length > 1) {
      var firstRow = allRows[0];
      var firstRowAllText = firstRow.every(function(c) {
        return c !== '' && (isNaN(parseFloat(c)) || !isFinite(parseFloat(c)));
      });
      if (firstRowAllText) {
        // Check that at least some data rows have numeric/empty values
        var sampleRow = allRows[Math.min(1, allRows.length - 1)];
        var dataRowHasNumericOrEmpty = sampleRow.some(function(c) {
          return c === '' || (!isNaN(parseFloat(c)) && isFinite(parseFloat(c)));
        });
        if (dataRowHasNumericOrEmpty) {
          headerRow = firstRow;
          allRows = allRows.slice(1);
        }
      }
    }

    // Parse Alchemer colon headers: if ALL headers contain ':', split into option label + question stem
    var colonHeaders = null;
    var questionStem = null;
    if (headerRow) {
      var allHaveColon = headerRow.every(function(h) { return h.indexOf(':') > 0; });
      if (allHaveColon) {
        colonHeaders = headerRow.map(function(h) {
          var idx = h.indexOf(':');
          return h.substring(0, idx).trim();
        });
        // Use the first header's right side as the shared question stem
        var firstIdx = headerRow[0].indexOf(':');
        questionStem = headerRow[0].substring(firstIdx + 1).trim();
      } else {
        // Use full headers, truncated for display
        colonHeaders = headerRow.map(function(h) {
          return h.length > 50 ? h.substring(0, 47) + '...' : h;
        });
      }
    }

    var matrix = allRows;

    // Build columns
    var columns = [];
    for (var c = 0; c < maxCols; c++) {
      var col = [];
      for (var r = 0; r < matrix.length; r++) {
        var v = matrix[r][c] !== undefined ? matrix[r][c] : '';
        col.push(isExcelError(v) ? '' : v);
      }
      columns.push(col);
    }

    return {
      isMultiResponse: true,
      columns: columns,
      nColumns: maxCols,
      nRows: matrix.length,
      excelErrors: excelErrors,
      headerRow: headerRow,
      columnLabels: colonHeaders,
      questionStem: questionStem
    };
  }

  function showMultiResponseInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    section.innerHTML =
      '<div class="single-col-grid" style="max-width:100%">' +
        '<div class="group-card multi-response-card">' +
          '<div class="group-card-label">Multi-Response Data</div>' +
          '<textarea id="mrData" placeholder="Paste one or more columns from your spreadsheet.\nIf pasting multiple columns (e.g., a checkbox question), they\u2019ll be detected automatically.\n\nExpected format: each column = one option.\nValues can be 1/0, Yes/No, True/False, text, or any number \u2014 non-empty and non-zero = selected.\nColumns separated by tabs (paste directly from a spreadsheet)."></textarea>' +
          '<div class="value-count" id="mrCount">No data detected</div>' +
          '<div id="mrColNames" class="col-name-inputs" style="display:none"></div>' +
          '<div class="desc-label" style="margin-top:0.75rem">What does this question represent?</div>' +
          '<input type="text" id="mrLabel" placeholder="e.g., Which features do you use? (select all that apply)">' +
        '</div>' +
      '</div>' +
      '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
    container.appendChild(section);
    scrollToBottom();

    var dataEl = section.querySelector('#mrData');
    var countEl = section.querySelector('#mrCount');
    var colNamesDiv = section.querySelector('#mrColNames');
    var runBtn = section.querySelector('#runBtn');
    var detectedCols = 0;

    dataEl.addEventListener('input', function() {
      var parsed = parseMultiResponse(dataEl.value);
      if (parsed.isMultiResponse) {
        var mrStatus = 'Multi-response detected: ' + parsed.nRows + ' responses \u00d7 ' + parsed.nColumns + ' options';
        if (parsed.excelErrors > 0) mrStatus += ' \u2014 ' + parsed.excelErrors + ' row' + (parsed.excelErrors !== 1 ? 's' : '') + ' with spreadsheet errors (#N/A, #REF!) removed';
        countEl.textContent = mrStatus;
        countEl.className = parsed.excelErrors > 0 ? 'value-count warning' : 'value-count valid';
        runBtn.disabled = parsed.nRows < 2 || parsed.nColumns < 2;
        // Show column name inputs (auto-populate from detected headers)
        if (parsed.nColumns !== detectedCols) {
          detectedCols = parsed.nColumns;
          colNamesDiv.style.display = 'flex';
          colNamesDiv.innerHTML = '';
          if (parsed.headerRow) {
            mrStatus += '. First row detected as column headers \u2014 using as option labels';
            countEl.textContent = mrStatus;
          }
          for (var i = 0; i < parsed.nColumns; i++) {
            var inp = document.createElement('input');
            inp.type = 'text';
            inp.className = 'mr-col-name';
            if (parsed.columnLabels && parsed.columnLabels[i]) {
              inp.value = parsed.columnLabels[i];
              inp.title = parsed.headerRow ? parsed.headerRow[i] : '';
            } else {
              inp.placeholder = 'Option ' + (i + 1);
            }
            colNamesDiv.appendChild(inp);
          }
          // Auto-populate question label from Alchemer colon pattern
          var labelEl = section.querySelector('#mrLabel');
          if (parsed.questionStem && labelEl && !labelEl.value) {
            labelEl.value = parsed.questionStem;
          }
        }
      } else if (parsed.values.length > 0) {
        countEl.textContent = parsed.values.length + ' values detected (single column)';
        countEl.className = 'value-count warning';
        colNamesDiv.style.display = 'none';
        detectedCols = 0;
        runBtn.disabled = true;
      } else {
        countEl.textContent = 'No data detected';
        countEl.className = 'value-count';
        colNamesDiv.style.display = 'none';
        detectedCols = 0;
        runBtn.disabled = true;
      }
    });

    runBtn.addEventListener('click', function() {
      var parsed = parseMultiResponse(dataEl.value);
      if (!parsed.isMultiResponse || parsed.nColumns < 2) return;
      // Collect column names
      var colNameInputs = colNamesDiv.querySelectorAll('.mr-col-name');
      var colNames = [];
      for (var i = 0; i < colNameInputs.length; i++) {
        colNames.push(colNameInputs[i].value.trim() || ('Option ' + (i + 1)));
      }
      var label = section.querySelector('#mrLabel').value.trim() || 'Multi-response question';
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      runMultiResponse(parsed, colNames, label);
    });
  }

  function runMultiResponse(data, columnNames, questionLabel) {
    var nRows = data.nRows;
    var nCols = data.nColumns;
    var columns = data.columns;

    // Convert to numeric (1/0) — accept multiple truthy formats
    var numCols = [];
    var falsySet = { '': 1, '0': 1, 'no': 1, 'false': 1, 'ne': 1, 'n': 1, 'nan': 1, 'null': 1, 'undefined': 1, 'n/a': 1, 'na': 1, '-': 1 };
    for (var c = 0; c < nCols; c++) {
      var col = [];
      for (var r = 0; r < nRows; r++) {
        var raw = (columns[c][r] || '').trim().toLowerCase();
        if (falsySet[raw]) {
          col.push(0);
        } else {
          var num = parseFloat(raw);
          col.push((!isNaN(num) && num === 0) ? 0 : 1);
        }
      }
      numCols.push(col);
    }

    // Per-option frequencies
    var freqs = [];
    for (var c = 0; c < nCols; c++) {
      var count = 0;
      for (var r = 0; r < nRows; r++) count += numCols[c][r];
      freqs.push({ name: columnNames[c], count: count, pct: round2(count / nRows * 100) });
    }
    freqs.sort(function(a, b) { return b.count - a.count; });

    // Selections per respondent
    var selPerResp = [];
    for (var r = 0; r < nRows; r++) {
      var total = 0;
      for (var c = 0; c < nCols; c++) total += numCols[c][r];
      selPerResp.push(total);
    }
    var avgSel = round2(selPerResp.reduce(function(a, b) { return a + b; }, 0) / nRows);
    var minSel = Math.min.apply(null, selPerResp);
    var maxSel = Math.max.apply(null, selPerResp);

    // Co-occurrence matrix
    var coMatrix = [];
    for (var i = 0; i < nCols; i++) {
      coMatrix[i] = [];
      for (var j = 0; j < nCols; j++) {
        if (i === j) {
          coMatrix[i][j] = freqs.find(function(f) { return f.name === columnNames[i]; }).count;
        } else {
          var coCount = 0;
          for (var r = 0; r < nRows; r++) {
            if (numCols[i][r] === 1 && numCols[j][r] === 1) coCount++;
          }
          coMatrix[i][j] = coCount;
        }
      }
    }

    // Find top co-occurring pairs
    var pairs = [];
    for (var i = 0; i < nCols; i++) {
      for (var j = i + 1; j < nCols; j++) {
        pairs.push({ a: columnNames[i], b: columnNames[j], count: coMatrix[i][j], pct: round2(coMatrix[i][j] / nRows * 100) });
      }
    }
    pairs.sort(function(a, b) { return b.count - a.count; });

    // Frequency table HTML
    var freqHtml = '<table class="freq-table"><tr><th>Option</th><th>Count</th><th>%</th><th></th></tr>';
    freqs.forEach(function(f) {
      freqHtml += '<tr><td>' + escHtml(f.name) + '</td><td>' + f.count + '</td><td>' + f.pct + '%</td>' +
        '<td class="pct-bar-cell"><div class="pct-bar" style="width:' + f.pct + '%"></div><span>' + f.pct + '%</span></td></tr>';
    });
    freqHtml += '</table>';

    // Co-occurrence table HTML (show if not too large)
    var coHtml = '';
    if (nCols <= 15) {
      var maxCo = 0;
      for (var i = 0; i < nCols; i++) {
        for (var j = 0; j < nCols; j++) {
          if (i !== j && coMatrix[i][j] > maxCo) maxCo = coMatrix[i][j];
        }
      }
      coHtml = '<table class="cooccurrence-table"><tr><th></th>';
      for (var j = 0; j < nCols; j++) coHtml += '<th>' + escHtml(columnNames[j]) + '</th>';
      coHtml += '</tr>';
      for (var i = 0; i < nCols; i++) {
        coHtml += '<tr><th>' + escHtml(columnNames[i]) + '</th>';
        for (var j = 0; j < nCols; j++) {
          if (i === j) {
            coHtml += '<td class="co-diag">\u2014</td>';
          } else {
            var cls = coMatrix[i][j] >= maxCo * 0.7 ? ' class="co-high"' : '';
            coHtml += '<td' + cls + '>' + coMatrix[i][j] + '</td>';
          }
        }
        coHtml += '</tr>';
      }
      coHtml += '</table>';
    }

    // Top co-occurring pairs
    var topPairsHtml = '';
    var showPairs = pairs.slice(0, 5);
    showPairs.forEach(function(p) {
      topPairsHtml += statRow(escHtml(p.a) + ' + ' + escHtml(p.b), p.count + ' (' + p.pct + '%)');
    });

    // Plain English
    var topOpt = freqs[0];
    var botOpt = freqs[freqs.length - 1];
    var plainText = 'For "' + questionLabel + '", ' + nRows + ' respondents answered across ' + nCols + ' options. ' +
      'The most selected option was "' + topOpt.name + '" (' + topOpt.pct + '%), and the least selected was "' + botOpt.name + '" (' + botOpt.pct + '%). ' +
      'On average, respondents selected ' + avgSel + ' options (range: ' + minSel + '\u2013' + maxSel + ').';
    if (pairs.length > 0) {
      plainText += ' The most common co-selection was "' + pairs[0].a + '" and "' + pairs[0].b + '" (' + pairs[0].pct + '% of respondents).';
    }

    var chartId = 'mrChart_' + Date.now();

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Selection Rates by Option</div>' + freqHtml + '</div>' +
      '<div class="result-card"><div class="result-card-title">Respondent Engagement</div>' +
        statRow('Average selections per respondent', avgSel) +
        statRow('Min selections', minSel) +
        statRow('Max selections', maxSel) +
        statRow('Total respondents', nRows) +
        statRow('Total options', nCols) +
      '</div>' +
      (pairs.length > 0 ? '<div class="result-card"><div class="result-card-title">Top Co-Occurring Pairs</div>' + topPairsHtml + '</div>' : '') +
      (coHtml ? '<div class="result-card"><div class="result-card-title">Co-Occurrence Matrix</div>' + coHtml + '</div>' : '') +
      '<div class="result-card"><div class="result-card-title">Selection Rates</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(180, nCols * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = freqs.map(function(f, i) {
      return { label: f.name, value: f.pct, color: CHART_COLORS[i % CHART_COLORS.length] };
    });
    drawBarChart(chartId, bars);

    // Detect open-text responses: columns where selected values are varied text (not just 1/yes/true)
    var binaryVals = { '1': 1, 'yes': 1, 'true': 1, 'selected': 1 };
    var openTexts = [];
    for (var c = 0; c < nCols; c++) {
      var textResponses = [];
      for (var r = 0; r < nRows; r++) {
        var raw = (columns[c][r] || '').trim();
        if (raw !== '' && !falsySet[raw.toLowerCase()] && !binaryVals[raw.toLowerCase()]) {
          textResponses.push(raw);
        }
      }
      // If this column has varied text (more than 3 unique values), it's an open-text column
      var uniqueTexts = {};
      textResponses.forEach(function(t) { uniqueTexts[t] = true; });
      if (Object.keys(uniqueTexts).length > 3 && textResponses.length > 0) {
        openTexts.push({ name: columnNames[c], responses: textResponses, count: textResponses.length });
      }
    }
    if (openTexts.length > 0) {
      var otHtml = '<div class="result-card"><div class="result-card-title">Open-Ended Responses</div>';
      openTexts.forEach(function(ot) {
        otHtml += '<div style="margin-bottom:0.75rem">' +
          '<strong>' + escHtml(ot.name) + '</strong>: ' + ot.count + ' respondent' + (ot.count !== 1 ? 's' : '') + ' (' + round2(ot.count / nRows * 100) + '%) wrote a response.' +
          '<details style="margin-top:0.5rem"><summary style="cursor:pointer;color:var(--rose)">View responses</summary>' +
          '<ul style="max-height:200px;overflow-y:auto;font-size:0.85rem;margin-top:0.5rem">';
        ot.responses.forEach(function(r) {
          otHtml += '<li>' + escHtml(r) + '</li>';
        });
        otHtml += '</ul></details></div>';
      });
      otHtml += '</div>';
      container.insertAdjacentHTML('beforeend', otHtml);
    }

    showNextSteps('descriptive', { n: nRows });
  }

  /* ==================================================================
     Next Steps Panel
     ================================================================== */
  // Contextual next steps based on what the user just ran
  var CONTEXTUAL_NEXT = {
