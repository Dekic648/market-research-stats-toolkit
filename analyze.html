  // --- Contingency Table ---
  function showContingencyTableInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    var nRows = 2, nCols = 2;
    var mode = 'raw'; // 'raw' or 'table'

    function buildRawInput() {
      return '<div class="group-card">' +
        '<div class="group-card-label">Paste Raw Data (recommended)</div>' +
        '<p style="font-size:0.85rem;color:var(--text-2);margin:0 0 0.5rem">Paste two columns side by side — Variable A and Variable B. The tool will count the combinations automatically.</p>' +
        '<div class="input-grid">' +
          '<div class="group-card" style="box-shadow:none">' +
            '<div class="group-card-label">Variable A</div>' +
            '<textarea id="ctRawA" placeholder="Paste values, one per line...\ne.g., Yes, No, Yes, Yes..."></textarea>' +
            '<div class="value-count" id="ctRawACount">No values detected</div>' +
          '</div>' +
          '<div class="group-card" style="box-shadow:none">' +
            '<div class="group-card-label">Variable B</div>' +
            '<textarea id="ctRawB" placeholder="Paste values, one per line...\ne.g., Male, Female, Male..."></textarea>' +
            '<div class="value-count" id="ctRawBCount">No values detected</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    function buildTableInput() {
      var html = '<div class="group-card">' +
        '<div class="group-card-label">Enter Counts Manually</div>' +
        '<div class="contingency-controls">' +
          '<label>Rows: <input type="number" id="ctRows" min="2" max="10" value="' + nRows + '"></label>' +
          '<label>Columns: <input type="number" id="ctCols" min="2" max="10" value="' + nCols + '"></label>' +
        '</div>' +
        '<table class="contingency-table" id="ctTable">';
      html += '<tr><th></th>';
      for (var c = 0; c < nCols; c++) html += '<th>Col ' + (c + 1) + '</th>';
      html += '</tr>';
      for (var r = 0; r < nRows; r++) {
        html += '<tr><th>Row ' + (r + 1) + '</th>';
        for (var c = 0; c < nCols; c++) {
          html += '<td><input type="number" class="ct-cell" data-r="' + r + '" data-c="' + c + '" min="0" value="0"></td>';
        }
        html += '</tr>';
      }
      html += '</table></div>';
      return html;
    }

    function build() {
      var html = '<div style="display:flex;gap:8px;margin-bottom:0.75rem">' +
        '<button class="ct-mode-btn' + (mode === 'raw' ? ' active' : '') + '" data-mode="raw">Paste raw data</button>' +
        '<button class="ct-mode-btn' + (mode === 'table' ? ' active' : '') + '" data-mode="table">Enter counts manually</button>' +
      '</div>';
      html += mode === 'raw' ? buildRawInput() : buildTableInput();
      html += '<button class="run-btn" id="runBtn" ' + (mode === 'raw' ? 'disabled' : '') + '>Run Analysis</button>';
      section.innerHTML = html;
    }

    build();
    container.appendChild(section);
    scrollToBottom();

    function bindEvents() {
      section.querySelectorAll('.ct-mode-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          mode = this.getAttribute('data-mode');
          build();
          bindEvents();
        });
      });

      if (mode === 'raw') {
        var rawA = section.querySelector('#ctRawA');
        var rawB = section.querySelector('#ctRawB');
        var countA = section.querySelector('#ctRawACount');
        var countB = section.querySelector('#ctRawBCount');
        var runBtn = section.querySelector('#runBtn');

        function updateRawCounts() {
          var a = parseCategorical(rawA.value);
          var b = parseCategorical(rawB.value);
          countA.textContent = a.length > 0 ? a.length + ' values, ' + new Set(a).size + ' categories' : 'No values detected';
          countA.className = a.length > 0 ? 'value-count valid' : 'value-count';
          countB.textContent = b.length > 0 ? b.length + ' values, ' + new Set(b).size + ' categories' : 'No values detected';
          countB.className = b.length > 0 ? 'value-count valid' : 'value-count';
          runBtn.disabled = !(a.length >= 3 && b.length >= 3 && a.length === b.length);
          if (a.length > 0 && b.length > 0 && a.length !== b.length) {
            countB.textContent += ' \u2014 columns must have equal length (' + a.length + ' vs ' + b.length + ')';
            countB.className = 'value-count warning';
          }
        }
        rawA.addEventListener('input', updateRawCounts);
        rawB.addEventListener('input', updateRawCounts);

        runBtn.addEventListener('click', function() {
          var a = parseCategorical(rawA.value);
          var b = parseCategorical(rawB.value);
          var len = Math.min(a.length, b.length);
          // Build contingency table from raw data
          var rowLabels = []; var colLabels = [];
          var rowSet = {}; var colSet = {};
          for (var i = 0; i < len; i++) {
            if (!rowSet[a[i]]) { rowSet[a[i]] = true; rowLabels.push(a[i]); }
            if (!colSet[b[i]]) { colSet[b[i]] = true; colLabels.push(b[i]); }
          }
          var observed = [];
          for (var r = 0; r < rowLabels.length; r++) {
            var row = [];
            for (var c = 0; c < colLabels.length; c++) {
              var count = 0;
              for (var i = 0; i < len; i++) {
                if (a[i] === rowLabels[r] && b[i] === colLabels[c]) count++;
              }
              row.push(count);
            }
            observed.push(row);
          }
          runBtn.disabled = true;
          runBtn.textContent = 'Running...';
          runChiSquare(observed);
        });
      } else {
        section.querySelector('#ctRows').addEventListener('change', function() {
          nRows = Math.max(2, Math.min(10, parseInt(this.value) || 2));
          build(); bindEvents();
        });
        section.querySelector('#ctCols').addEventListener('change', function() {
          nCols = Math.max(2, Math.min(10, parseInt(this.value) || 2));
          build(); bindEvents();
        });
        section.querySelector('#runBtn').addEventListener('click', function() {
          var observed = [];
          for (var r = 0; r < nRows; r++) {
            var row = [];
            for (var c = 0; c < nCols; c++) {
              var cell = section.querySelector('.ct-cell[data-r="' + r + '"][data-c="' + c + '"]');
              row.push(Math.max(0, parseInt(cell.value) || 0));
            }
            observed.push(row);
          }
          var btn = section.querySelector('#runBtn');
          btn.disabled = true;
          btn.textContent = 'Running...';
          runChiSquare(observed);
        });
      }
    }
    bindEvents();
  }

  /* ==================================================================
     Generic Results & Chart Helpers

  function makeCopyBtn(plainText) {
    var uid = 'copy_' + Math.random().toString(36).substr(2, 9);
    setTimeout(function() {
      var btn = document.getElementById(uid);
      if (btn) btn.addEventListener('click', function() {

          btn.textContent = 'Copied!';
          setTimeout(function() { btn.innerHTML = '&#128203; Copy to clipboard'; }, 2000);
        });
      });
    }, 100);
    return '<button class="copy-btn" id="' + uid + '">&#128203; Copy to clipboard</button>';
  }

  function pClass(p) { return p < 0.05 ? 'p-sig' : p < 0.10 ? 'p-marginal' : 'p-nonsig'; }

  function effectLabel(d) {
    d = Math.abs(d);
    return d < 0.2 ? 'negligible' : d < 0.5 ? 'small' : d < 0.8 ? 'medium' : 'large';
  }

  function statRow(label, value) {
    return '<div class="stat-row"><span class="stat-label">' + label + '</span><span class="stat-value">' + value + '</span></div>';
  }

  function testStat(label, value, extraClass) {
    return '<div class="test-stat' + (extraClass ? ' ' + extraClass : '') + '"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
  }

  // === Shared enrichment helpers for survey-style output ===
  function sigBadge(p) {
    var isSig = p < 0.05;
    return '<div style="text-align:center;margin-top:0.6rem">' +
      '<span style="display:inline-block;padding:0.25rem 0.7rem;border-radius:4px;font-size:0.82rem;font-weight:600;' +
      (isSig ? 'background:rgba(58,154,92,0.15);color:var(--green)' : 'background:rgba(153,153,153,0.15);color:var(--text-2)') + '">' +
      (isSig ? 'Statistically significant (p = ' + round4(p) + ')' : 'Not statistically significant (p = ' + round4(p) + ')') +
      '</span></div>';
  }

  function groupMeansCard(groups, labels, title) {
    var html = '<div class="result-card"><div class="result-card-title">' + (title || 'Group Comparison') + '</div>';
    html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">';
    for (var i = 0; i < groups.length; i++) {
      var vals = groups[i];
      var m = round2(StatsEngine._helpers.mean(vals));
      var med = round2(StatsEngine._helpers.median(vals));
      html += '<div style="flex:1;min-width:90px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
        '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase">' + escHtml(labels[i]) + '</div>' +
        '<div style="font-size:1.3rem;font-weight:700;margin:0.2rem 0">' + m + '</div>' +
        '<div style="font-size:0.72rem;color:var(--text-2)">median ' + med + ' &middot; n=' + vals.length + '</div>' +
      '</div>';
    }
    html += '</div>';
    return html;
  }

  function groupDistTable(groups, labels) {
    // Build % distribution table per group for discrete/Likert data
    var allVals = {};
    groups.forEach(function(g) { g.forEach(function(v) { allVals[v] = true; }); });
    var keys = Object.keys(allVals).map(Number).sort(function(a, b) { return a - b; });
    var allInteger = keys.every(function(k) { return k === Math.floor(k); });
    if (!allInteger || keys.length > 15 || keys.length < 2) return ''; // not discrete data

    var html = '<div class="result-card"><div class="result-card-title">Distribution by Group (%)</div><div style="overflow-x:auto"><table class="freq-table"><tr><th></th>';
    keys.forEach(function(k) { html += '<th>' + k + '</th>'; });
    html += '<th>n</th></tr>';
    for (var i = 0; i < groups.length; i++) {
      var counts = {};
      keys.forEach(function(k) { counts[k] = 0; });
      groups[i].forEach(function(v) { if (counts[v] !== undefined) counts[v]++; });
      html += '<tr><td><strong>' + escHtml(labels[i]) + '</strong></td>';
      keys.forEach(function(k) {
        html += '<td>' + (groups[i].length > 0 ? round2(counts[k] / groups[i].length * 100) : 0) + '%</td>';
      });
      html += '<td>' + groups[i].length + '</td></tr>';
    }
    html += '</table></div></div>';
    return html;
  }

  function initCanvas(canvasId, w, h) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return null;
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);
    return { ctx: ctx, w: w, h: h };
  }

    return html + '</div>';
