        '<button class="ct-mode-btn' + (feMode === 'table' ? ' active' : '') + '" data-mode="table">Enter counts manually</button>' +
      '</div>';

      if (feMode === 'raw') {
        html += '<div class="group-card"><div class="group-card-label">Paste Two Binary Columns</div>' +
          '<p style="font-size:0.85rem;color:var(--text-2);margin:0 0 0.5rem">Paste two columns with exactly 2 categories each (e.g., Yes/No). The tool will build the 2\u00d72 table automatically.</p>' +
          '<div class="input-grid">' +
            '<div class="group-card" style="box-shadow:none"><div class="group-card-label">Variable A</div>' +
              '<textarea id="feRawA" placeholder="Yes, No, Yes, No..."></textarea><div class="value-count" id="feRawACount">No values</div></div>' +
            '<div class="group-card" style="box-shadow:none"><div class="group-card-label">Variable B</div>' +
              '<textarea id="feRawB" placeholder="Pass, Fail, Pass..."></textarea><div class="value-count" id="feRawBCount">No values</div></div>' +
          '</div></div>';
      } else {
        html += '<div class="group-card"><div class="group-card-label">2\u00d72 Contingency Table</div>' +
          '<div class="grid-2x2">' +
            '<div></div><div class="grid-header">Outcome +</div><div class="grid-header">Outcome \u2212</div>' +
            '<div class="grid-row-label">Group 1</div><input type="number" id="fe_a" min="0" value="0"><input type="number" id="fe_b" min="0" value="0">' +
            '<div class="grid-row-label">Group 2</div><input type="number" id="fe_c" min="0" value="0"><input type="number" id="fe_d" min="0" value="0">' +
          '</div></div>';
      }
      html += '<button class="run-btn" id="runBtn" ' + (feMode === 'raw' ? 'disabled' : '') + '>Run Analysis</button>';
      section.innerHTML = html;
    }

    buildFE();
    container.appendChild(section);
    scrollToBottom();

    function bindFEEvents() {
      section.querySelectorAll('.ct-mode-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { feMode = this.getAttribute('data-mode'); buildFE(); bindFEEvents(); });
      });

      if (feMode === 'raw') {
        var rawA = section.querySelector('#feRawA'), rawB = section.querySelector('#feRawB');
        var cA = section.querySelector('#feRawACount'), cB = section.querySelector('#feRawBCount');
        var runBtn = section.querySelector('#runBtn');
        function updateFERaw() {
          var a = parseCategorical(rawA.value), b = parseCategorical(rawB.value);
          var uA = new Set(a).size, uB = new Set(b).size;
          cA.textContent = a.length > 0 ? a.length + ' values, ' + uA + ' categories' : 'No values';
          cA.className = a.length > 0 && uA === 2 ? 'value-count valid' : a.length > 0 ? 'value-count warning' : 'value-count';
          if (a.length > 0 && uA !== 2) cA.textContent += ' (need exactly 2 categories)';
          cB.textContent = b.length > 0 ? b.length + ' values, ' + uB + ' categories' : 'No values';
          cB.className = b.length > 0 && uB === 2 ? 'value-count valid' : b.length > 0 ? 'value-count warning' : 'value-count';
          if (b.length > 0 && uB !== 2) cB.textContent += ' (need exactly 2 categories)';
          runBtn.disabled = !(a.length >= 2 && b.length >= 2 && a.length === b.length && uA === 2 && uB === 2);
        }
        rawA.addEventListener('input', updateFERaw);
        rawB.addEventListener('input', updateFERaw);
        runBtn.addEventListener('click', function() {
          var a = parseCategorical(rawA.value), b = parseCategorical(rawB.value);
          var len = Math.min(a.length, b.length);
          var rL = Array.from(new Set(a)), cL = Array.from(new Set(b));
          var counts = [0, 0, 0, 0]; // a=r0c0, b=r0c1, c=r1c0, d=r1c1
          for (var i = 0; i < len; i++) {
            var ri = a[i] === rL[0] ? 0 : 1, ci = b[i] === cL[0] ? 0 : 1;
            counts[ri * 2 + ci]++;
          }
          runBtn.disabled = true; runBtn.textContent = 'Running...';
          runFisherExact(counts[0], counts[1], counts[2], counts[3]);
        });
      } else {
        section.querySelector('#runBtn').addEventListener('click', function() {
          var a = Math.max(0, parseInt(section.querySelector('#fe_a').value) || 0);
          var b = Math.max(0, parseInt(section.querySelector('#fe_b').value) || 0);
          var c = Math.max(0, parseInt(section.querySelector('#fe_c').value) || 0);
          var d = Math.max(0, parseInt(section.querySelector('#fe_d').value) || 0);
          if (a + b + c + d === 0) { showError('Please enter at least some counts.'); return; }
          var btn = section.querySelector('#runBtn'); btn.disabled = true; btn.textContent = 'Running...';
          runFisherExact(a, b, c, d);
        });
      }
    }
    bindFEEvents();
  }

  function runMcNemar(a, b, c, d) {
    var r = StatsEngine.mcnemar(a, b, c, d);
    var interp = StatsEngine.interpret.mcnemar(r);
    var pc = pClass(r.p);

    var total = a + b + c + d;
    var propBefore = total > 0 ? (a + b) / total : 0;
    var propAfter = total > 0 ? (a + c) / total : 0;

    var plainText = interp.summary + ' ' + interp.details +
      ' Proportion "positive" before: ' + round4(propBefore) + ', after: ' + round4(propAfter) + '.';

    var chartId = 'mcnemarChart_' + Date.now();

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +

      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('Chi-Square', round4(r.chiSquare)) + testStat('df', r.df) +
        testStat('p-value', round6(r.p), pc) +
        testStat('Discordant b', r.b) + testStat('Discordant c', r.c) +

      '<div class="result-card"><div class="result-card-title">Before vs After Proportions</div>' +
        '<canvas id="' + chartId + '" width="500" height="180" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: 'Before (positive)', value: propBefore, color: CHART_COLORS[0] },
      { label: 'After (positive)', value: propAfter, color: CHART_COLORS[1] }
    ]);
    showNextSteps('paired', r);
  }

  /* ==================================================================
     Shapiro-Wilk Test
     ================================================================== */
  function runShapiroWilk(vals, desc) {
    var r = StatsEngine.shapiroWilk(vals);
    var interp = StatsEngine.interpret.shapiroWilk(r);
    var pc = pClass(r.p);
    var chartId = 'swChart_' + Date.now();

    var normalityConclusion = r.p > 0.05
      ? 'Data appears normally distributed. Parametric tests are appropriate.'
      : 'Data is not normally distributed. Consider non-parametric tests.';

    var plainText = interp.summary + ' ' + interp.details;

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('W statistic', round4(r.W)) + testStat('p-value', round6(r.p), pc) +
        testStat('n', r.n) +
      '</div><div class="effect-interpretation">' + normalityConclusion + '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Distribution of ' + escHtml(desc) + '</div>' +
        '<canvas id="' + chartId + '" width="500" height="250" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawHistogram(chartId, vals);
    showNextSteps('descriptive', r);
  }

  /* ==================================================================
     Levene's Test
     ================================================================== */
  function runLevene(groups, labels) {
    var r = StatsEngine.levene(groups);
    var interp = StatsEngine.interpret.levene(r);
    var pc = pClass(r.p);
    var chartId = 'leveneChart_' + Date.now();

    var plainText = interp.summary;

    // Compute group SDs
    var sds = [];
    for (var i = 0; i < groups.length; i++) sds.push(StatsEngine._helpers.sd(groups[i], 1));

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('F statistic', round4(r.F)) + testStat('p-value', round6(r.p), pc) +
        testStat('df (between)', r.dfBetween) + testStat('df (within)', r.dfWithin) +
      '</div><div class="effect-interpretation">' +
        (r.p < 0.05 ? 'Variances are significantly unequal. Use Welch\'s correction or non-parametric tests.' : 'Equal-variance assumption holds.') +
      '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Group Standard Deviations</div>' +
        '<canvas id="' + chartId + '" width="500" height="' + Math.max(180, groups.length * 55 + 30) + '" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    var bars = [];
    for (var i = 0; i < groups.length; i++) {
      bars.push({ label: labels[i], value: sds[i], color: CHART_COLORS[i % CHART_COLORS.length] });
    }
    drawBarChart(chartId, bars);
    showNextSteps('descriptive', r);
  }

  /* ==================================================================
     Correlation Matrix
     ================================================================== */
  function runCorrMatrix(cols, labels) {
    // Trim to minimum length
    var minLen = Infinity;
    cols.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
    cols = cols.map(function(c) { return c.slice(0, minLen); });

    var r = StatsEngine.correlationMatrix(cols);
    var k = r.k;

    // Build matrix table
    var tableHtml = '<table class="corr-matrix-table"><tr><th></th>';
    for (var j = 0; j < k; j++) tableHtml += '<th>' + escHtml(labels[j]) + '</th>';
    tableHtml += '</tr>';

    var strongest = { r: 0, pair: '' };
    var weakest = { r: 1, pair: '' };

    for (var i = 0; i < k; i++) {
      tableHtml += '<tr><th>' + escHtml(labels[i]) + '</th>';
      for (var j = 0; j < k; j++) {
        var val = r.r[i][j];
        var pVal = r.p[i][j];
        var cls = 'corr-weak';
        if (i === j) {
          cls = 'corr-diag';
        } else {
          var absR = Math.abs(val);
          if (absR >= 0.5 && val > 0) cls = 'corr-strong-pos';
          else if (absR >= 0.3 && val > 0) cls = 'corr-mod-pos';
          else if (absR >= 0.5 && val < 0) cls = 'corr-strong-neg';
          else if (absR >= 0.3 && val < 0) cls = 'corr-mod-neg';

          if (i < j) {
            if (absR > strongest.r) { strongest.r = absR; strongest.pair = labels[i] + ' & ' + labels[j]; strongest.val = val; }
            if (absR < weakest.r) { weakest.r = absR; weakest.pair = labels[i] + ' & ' + labels[j]; weakest.val = val; }
          }
        }
        var display = i === j ? '1.000' : round4(val);
        var title = i === j ? '' : ' title="p = ' + round6(pVal) + '"';
        tableHtml += '<td class="' + cls + '"' + title + '>' + display + '</td>';
      }
      tableHtml += '</tr>';
    }
    tableHtml += '</table>';

    var interpText = 'Strongest correlation: ' + strongest.pair + ' (r = ' + round4(strongest.val) + '). ' +
      'Weakest correlation: ' + weakest.pair + ' (r = ' + round4(weakest.val) + ').';
    var plainText = 'Correlation matrix across ' + k + ' variables. ' + interpText;

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Correlation Matrix</div>' +
        '<div style="overflow-x:auto">' + tableHtml + '</div>' +
        '<div class="effect-interpretation">Hover over cells to see p-values. Colors: <span style="color:var(--green)">green = positive</span>, <span style="color:var(--red)">red = negative</span>, gray = weak.</div>' +
      '</div></div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    showNextSteps('correlation', { n: minLen });
  }

  /* ==================================================================
     PCA (Principal Component Analysis)
     ================================================================== */
  function runPCA(cols, labels) {
    // Trim to minimum length
    var minLen = Infinity;
    cols.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
    cols = cols.map(function(c) { return c.slice(0, minLen); });

    var r = StatsEngine.pca(cols);
    var interp = StatsEngine.interpret.pca(r);
    var chartId = 'pcaChart_' + Date.now();

    var plainText = interp.summary + ' ' + interp.details;

    // Loadings table
    var loadHtml = '<table class="loadings-table"><tr><th>Variable</th>';
    for (var c = 0; c < r.eigenvalues.length; c++) loadHtml += '<th>PC' + (c + 1) + '</th>';
    loadHtml += '</tr>';
    for (var i = 0; i < r.k; i++) {
      loadHtml += '<tr><td>' + escHtml(labels[i]) + '</td>';
      for (var c = 0; c < r.loadings.length; c++) {
        var loadVal = r.loadings[c][i];
        var cls = Math.abs(loadVal) >= 0.5 ? ' class="high-loading"' : '';
        loadHtml += '<td' + cls + '>' + round4(loadVal) + '</td>';
      }
      loadHtml += '</tr>';
    }
    loadHtml += '</table>';

    // How many components to keep (eigenvalue > 1 rule)
    var nKeep = r.eigenvalues.filter(function(e) { return e > 1; }).length;
    var totalVar = r.cumulativeVariance[Math.min(nKeep, r.cumulativeVariance.length) - 1] || 0;

    var html = '<div class="results-section">';

    // Key finding upfront
    html += RC('Components Found',
      '<div style="text-align:center">' +
        '<div style="font-size:2.8rem;font-weight:700;color:var(--rose);line-height:1">' + nKeep + '</div>' +
        '<div style="font-size:0.88rem;color:var(--text-2);margin-top:0.4rem;line-height:1.5">components with eigenvalue > 1, explaining <strong>' + (totalVar * 100).toFixed(1) + '%</strong> of total variance</div>' +
      '</div>'
    );

    // Variance bar chart
    html += renderChart(chartId, 'Variance Explained per Component', 500, Math.max(180, r.eigenvalues.length * 55 + 30));

    // Loadings table (collapsed for clean look)
    html += renderCollapsed('Component Loadings',
      loadHtml +
      '<div style="font-size:0.78rem;color:var(--text-2);margin-top:6px">Bold values (\u2265 0.5) = strong loading on that component.</div>'
    );

    // Plain English
    var plainText2 = r.k + ' variables reduced to ' + nKeep + ' components explaining ' + (totalVar * 100).toFixed(1) + '% of variance. ';
    for (var c = 0; c < Math.min(nKeep, 3); c++) {
      var topLoaders = [];
      for (var i = 0; i < r.k; i++) {
        if (Math.abs(r.loadings[c][i]) >= 0.5) topLoaders.push(labels[i]);
      }
      if (topLoaders.length > 0) plainText2 += 'PC' + (c + 1) + ' is driven by: ' + topLoaders.join(', ') + '. ';
    }
    html += renderPlainEnglish(plainText2);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var c = 0; c < r.explainedVariance.length; c++) {
      bars.push({ label: 'PC' + (c + 1) + ' (' + (r.explainedVariance[c] * 100).toFixed(1) + '%)', value: r.explainedVariance[c] * 100, color: CHART_COLORS[c % CHART_COLORS.length] });
    }
    drawBarChart(chartId, bars);
    showNextSteps('scale', r);
  }

  /* ==================================================================
     Factor Analysis (EFA) — Input
     ================================================================== */
  function showFactorAnalysisInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    var colCount = 3;
    var maxCols = 20;

    function buildGrid() {
      var gridHtml =
        '<div class="analysis-controls">' +
          '<label>Number of factors: <input type="number" id="nFactorsInput" min="1" max="10" value="2"></label>' +
          '<span style="font-size:0.78rem;color:var(--text-2)">Tip: leave at 2 or set based on theory</span>' +
        '</div>';
      gridHtml += '<div class="input-grid multi-col">';
      for (var i = 0; i < colCount; i++) {
        gridHtml +=
          '<div class="group-card" data-col="' + i + '">' +
            '<div class="group-card-label">Item ' + (i + 1) + '</div>' +
            '<textarea class="multi-data" data-idx="' + i + '" placeholder="Paste values, one per line..."></textarea>' +
            '<div class="desc-label">Label</div>' +
            '<input type="text" class="multi-desc" data-idx="' + i + '" placeholder="e.g., Item ' + (i + 1) + '">' +
            '<div class="value-count multi-count" data-idx="' + i + '">No values detected</div>' +
          '</div>';
      }
      gridHtml += '</div>';
      gridHtml += '<div style="display:flex;gap:8px;justify-content:center">';
      if (colCount < maxCols) gridHtml += '<button class="add-col-btn" id="addColBtn">+ Add another item</button>';
      if (colCount > 3) gridHtml += '<button class="remove-col-btn" id="removeColBtn">- Remove last item</button>';
      gridHtml += '</div>';
      gridHtml += '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
      section.innerHTML = gridHtml;
    }

    buildGrid();
    container.appendChild(section);
    scrollToBottom();

    function bindEvents() {
      var textareas = section.querySelectorAll('.multi-data');
      var runBtn = section.querySelector('#runBtn');
      textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
          var idx = ta.getAttribute('data-idx');
          var countEl = section.querySelector('.multi-count[data-idx="' + idx + '"]');
          updateCount(ta, countEl);
          checkReady();
        });
      });

      function checkReady() {
        var allGood = true;
        section.querySelectorAll('.multi-data').forEach(function(ta) {
          if (parseValues(ta.value).nums.length < 3) allGood = false;
        });
        runBtn.disabled = !allGood;
      }

      var addBtn = section.querySelector('#addColBtn');
      if (addBtn) addBtn.addEventListener('click', function() {
        colCount++;
        buildGrid();
        bindEvents();
        scrollToBottom();
      });
      var removeBtn = section.querySelector('#removeColBtn');
      if (removeBtn) removeBtn.addEventListener('click', function() {
        if (colCount > 3) { colCount--; buildGrid(); bindEvents(); scrollToBottom(); }
      });

      runBtn.addEventListener('click', function() {
        var columns = [];
        var labels = [];
        section.querySelectorAll('.multi-data').forEach(function(ta, i) {
          columns.push(parseValues(ta.value).nums);
          var descEl = section.querySelector('.multi-desc[data-idx="' + i + '"]');
          labels.push(descEl ? (descEl.value || 'Item ' + (i + 1)) : 'Item ' + (i + 1));
        });

        var nFactors = Math.max(1, Math.min(10, parseInt(section.querySelector('#nFactorsInput').value) || 2));

        // Trim to minimum length
        var minLen = Infinity;
        columns.forEach(function(c) { if (c.length < minLen) minLen = c.length; });
        columns = columns.map(function(c) { return c.slice(0, minLen); });

        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        runFactorAnalysis(columns, labels, nFactors);
      });
    }

    bindEvents();
  }

  function runFactorAnalysis(cols, labels, nFactors) {
    var r = StatsEngine.factorAnalysis(cols, { nFactors: nFactors });
    var interp = StatsEngine.interpret.factorAnalysis(r);
    var chartId = 'faChart_' + Date.now();

    var plainText = interp.summary + ' ' + interp.details;

    // Rotated loadings table (k x nFactors)
    var loadHtml = '<table class="loadings-table"><tr><th>Variable</th>';
    for (var f = 0; f < r.nFactors; f++) loadHtml += '<th>Factor ' + (f + 1) + '</th>';
    loadHtml += '<th>Communality</th></tr>';
    for (var i = 0; i < r.k; i++) {
      loadHtml += '<tr><td>' + escHtml(labels[i]) + '</td>';
      for (var f = 0; f < r.nFactors; f++) {
        var loadVal = r.loadings[i][f];
        var cls = Math.abs(loadVal) >= 0.4 ? ' class="high-loading"' : '';
        loadHtml += '<td' + cls + '>' + round4(loadVal) + '</td>';
      }
      loadHtml += '<td>' + round4(r.communalities[i]) + '</td></tr>';
    }
    loadHtml += '</table>';

    var html = '<div class="results-section">';

    // Key finding: how many factors, what they represent
    var factorContent = '<div style="font-size:0.9rem;color:var(--text-2);margin-bottom:0.75rem">' + r.k + ' variables, ' + r.n + ' respondents</div>';
    for (var f = 0; f < r.nFactors; f++) {
      var topItems = [];
      for (var i = 0; i < r.k; i++) {
        if (Math.abs(r.loadings[i][f]) >= 0.4) topItems.push(labels[i]);
      }
      factorContent += '<div style="padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.05)">' +
        '<strong style="color:' + CHART_COLORS[f % CHART_COLORS.length] + '">Factor ' + (f + 1) + '</strong> (' + (r.explainedVariance[f] * 100).toFixed(1) + '% variance): ' +
        (topItems.length > 0 ? topItems.join(', ') : 'no strong loadings') + '</div>';
    }
    html += RC('Factors Discovered: ' + r.nFactors, factorContent);

    // Communalities chart
    html += renderChart(chartId, 'How Well Each Variable Is Explained', 500, Math.max(180, r.k * 55 + 30),
      'Communality: proportion of each variable explained by the factors. Higher = better fit.');

    // Loading table (collapsed)
    html += renderCollapsed('Full Loading Table (Varimax Rotation)',
      loadHtml +
      '<div style="font-size:0.78rem;color:var(--text-2);margin-top:6px">Bold (\u2265 0.4) = meaningful loading.</div>'
    );

    // Plain English
    var plainText2 = r.nFactors + ' factors found. ';
    for (var f = 0; f < r.nFactors; f++) {
      var items = [];
      for (var i = 0; i < r.k; i++) { if (Math.abs(r.loadings[i][f]) >= 0.4) items.push(labels[i]); }
      plainText2 += 'Factor ' + (f + 1) + (items.length > 0 ? ' groups: ' + items.join(', ') : ' has no strong loadings') + '. ';
    }
    html += renderPlainEnglish(plainText2);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    var bars = [];
    for (var i = 0; i < r.k; i++) {
      bars.push({ label: labels[i], value: r.communalities[i], color: r.communalities[i] >= 0.4 ? CHART_COLORS[2] : CHART_COLORS[4] });
    }
    drawBarChart(chartId, bars);
    showNextSteps('scale', r);
  }

  /* ==================================================================
     Distribution Checker
     ================================================================== */
  function runDistribution(vals, desc) {
    var stats = StatsEngine.describe(vals);
    var sw = StatsEngine.shapiroWilk(vals);
    var chartId = 'distChart_' + Date.now();

    var normalityConclusion = sw.p > 0.05
      ? 'Data appears normally distributed (Shapiro-Wilk p = ' + round6(sw.p) + ').'
      : 'Data is NOT normally distributed (Shapiro-Wilk p = ' + round6(sw.p) + '). Consider non-parametric tests.';

    var skewInterp = Math.abs(stats.skewness) < 0.5 ? 'approximately symmetric' :
      stats.skewness > 0 ? 'positively skewed (right tail)' : 'negatively skewed (left tail)';
    var kurtInterp = Math.abs(stats.kurtosis) < 1 ? 'mesokurtic (normal-like tails)' :
      stats.kurtosis > 0 ? 'leptokurtic (heavy tails)' : 'platykurtic (light tails)';

    // Outlier detection (IQR * 1.5)
    var q1 = stats.p25, q3 = stats.p75;
    var iqr = q3 - q1;
    var lowerFence = q1 - 1.5 * iqr;
    var upperFence = q3 + 1.5 * iqr;
    var outliers = vals.filter(function(v) { return v < lowerFence || v > upperFence; });
    var outlierText = outliers.length > 0
      ? outliers.length + ' potential outlier(s) detected beyond IQR fences [' + round4(lowerFence) + ', ' + round4(upperFence) + '].'
      : 'No outliers detected (all values within IQR fences).';

    var plainText = desc + ': ' + normalityConclusion + ' Distribution is ' + skewInterp +
      ' (skewness = ' + round4(stats.skewness) + ') and ' + kurtInterp +
      ' (excess kurtosis = ' + round4(stats.kurtosis) + '). ' + outlierText;

    var swPc = pClass(sw.p);

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Distribution Analysis</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Normality Test (Shapiro-Wilk)</div><div class="test-results-grid">' +
        testStat('W statistic', round4(sw.W)) + testStat('p-value', round6(sw.p), swPc) +
        testStat('n', sw.n) +
      '</div><div class="effect-interpretation">' + normalityConclusion + '</div></div>' +
      '<div class="result-card"><div class="result-card-title">Shape & Outliers</div>' +
        statRow('Skewness', round4(stats.skewness) + ' (' + skewInterp + ')') +
        statRow('Excess Kurtosis', round4(stats.kurtosis) + ' (' + kurtInterp + ')') +
        statRow('IQR', round4(iqr)) +
        statRow('Lower Fence', round4(lowerFence)) +
        statRow('Upper Fence', round4(upperFence)) +
        statRow('Outliers', outliers.length + (outliers.length > 0 && outliers.length <= 10 ? ' (' + outliers.map(function(v) { return round4(v); }).join(', ') + ')' : '')) +
      '</div>' +
      '<div class="result-card"><div class="result-card-title">Key Descriptives</div>' +
        statRow('n', stats.n) + statRow('Mean', round4(stats.mean)) + statRow('Median', round4(stats.median)) +
        statRow('Std Dev', round4(stats.sd)) + statRow('Min', round4(stats.min)) + statRow('Max', round4(stats.max)) +
      '</div>' +
      '<div class="result-card"><div class="result-card-title">Histogram</div>' +
        '<canvas id="' + chartId + '" width="500" height="250" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawHistogram(chartId, vals);
    showNextSteps('descriptive', r);
  }

  /* ==================================================================
     Shared: Categorical Parser
     ================================================================== */
  function parseCategorical(text) {
    return text.split(/\n/).map(function(s) { return s.trim(); }).filter(function(s) { return s !== '' && !isExcelError(s); });
  }

  /* ==================================================================
     Shared: Text Input UI (for open-ended responses)
     ================================================================== */
  function showTextInput(label, callback) {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    section.innerHTML =
      '<div class="single-col-grid" style="max-width:100%">' +
        '<div class="group-card text-input-card">' +
          '<div class="group-card-label">' + escHtml(label) + '</div>' +
          '<textarea id="textData" placeholder="Paste text responses, one per line...\nEach line = one response"></textarea>' +
          '<div class="value-count" id="textCount">No responses detected</div>' +
        '</div>' +
      '</div>' +
      '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
    container.appendChild(section);
    scrollToBottom();

    var textEl = section.querySelector('#textData');
    var countEl = section.querySelector('#textCount');
    var runBtn = section.querySelector('#runBtn');

    textEl.addEventListener('input', function() {
      var lines = parseCategorical(textEl.value);
      if (lines.length === 0) {
        countEl.textContent = 'No responses detected';

      } else {
        countEl.textContent = lines.length + ' response' + (lines.length !== 1 ? 's' : '') + ' detected';
        countEl.className = 'value-count valid';
      }
      runBtn.disabled = lines.length < 1;
    });

    runBtn.addEventListener('click', function() {
      var lines = parseCategorical(textEl.value);
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      callback(lines);

     Shared: Categorical Input UI (single column)

      '<div class="single-col-grid">' +
        '<div class="group-card">' +

  /* ==================================================================
     1. Frequencies & Crosstabs
     ================================================================== */

  // --- Input UI ---
  function showFrequenciesCrosstabInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    section.innerHTML =
      '<div class="input-grid">' +
        '<div class="group-card">' +
          '<div class="group-card-label">Multi-Response Columns</div>' +
          '<textarea id="freqVals" placeholder="Paste from Excel \u2014 tab-separated columns.\nEach row = one respondent.\nNon-empty cells = selected options.\nEmpty cells = not selected.\n\ne.g. (3 respondents, chose from options 1\u20137):\n1\t5\t7\n2\t4\n1\t3\t5\t6"></textarea>' +
          '<div class="value-count" id="freqValsCount">No values detected</div>' +
        '</div>' +
        '<div class="group-card">' +
          '<div class="group-card-label">Grouping Variable (optional)</div>' +
          '<textarea id="freqGrp" placeholder="One value per line (same row count):\n18-24\n25-34\n35-44"></textarea>' +
          '<div class="value-count" id="freqGrpCount">Leave empty for simple frequency</div>' +
        '</div>' +
      '</div>' +
      '<button class="run-btn" id="freqRunBtn" disabled>Run Analysis</button>';
    container.appendChild(section);
    scrollToBottom();

    var valEl = section.querySelector('#freqVals');
    var grpEl = section.querySelector('#freqGrp');
    var valCountEl = section.querySelector('#freqValsCount');
    var grpCountEl = section.querySelector('#freqGrpCount');
    var runBtn = section.querySelector('#freqRunBtn');

    // Parse multi-response textarea: each line → array of non-empty values
    function parseMultiCols(text) {
      var lines = text.split(/\n/).filter(function(s) { return s.trim() !== ''; });
      var cleanLines = [];
      var excelErrors = 0;
      for (var i = 0; i < lines.length; i++) {
        var cells = lines[i].split('\t');
        var rowHasOnlyErrors = cells.every(function(c) { var t = c.trim(); return t === '' || isExcelError(t); });
        if (rowHasOnlyErrors && cells.some(function(c) { return isExcelError(c.trim()); })) { excelErrors++; continue; }
        cleanLines.push(lines[i]);
      }

      // Detect header row: first row all non-numeric text, rest has numeric/empty
      var headerRow = null;
      var columnLabels = null;
      var questionStem = null;
      if (cleanLines.length > 1) {
        var firstCells = cleanLines[0].split('\t').map(function(c) { return c.trim(); });
        var firstRowAllText = firstCells.every(function(c) {
          return c !== '' && (isNaN(parseFloat(c)) || !isFinite(parseFloat(c)));
        });
        if (firstRowAllText) {
          var sampleCells = cleanLines[1].split('\t').map(function(c) { return c.trim(); });
          var hasNumericOrEmpty = sampleCells.some(function(c) {
            return c === '' || (!isNaN(parseFloat(c)) && isFinite(parseFloat(c)));
          });
          if (hasNumericOrEmpty) {
            headerRow = firstCells;
            cleanLines = cleanLines.slice(1);
            // Alchemer colon parsing
            var allHaveColon = firstCells.every(function(h) { return h.indexOf(':') > 0; });
            if (allHaveColon) {
              columnLabels = firstCells.map(function(h) { return h.substring(0, h.indexOf(':')).trim(); });
              questionStem = firstCells[0].substring(firstCells[0].indexOf(':') + 1).trim();
            } else {
              columnLabels = firstCells.map(function(h) { return h.length > 50 ? h.substring(0, 47) + '...' : h; });
            }
          }
        }
      }

      var result = [];
      var allItems = {};
      for (var i = 0; i < cleanLines.length; i++) {
        var cells = cleanLines[i].split('\t');
        var selected = [];
        for (var j = 0; j < cells.length; j++) {
          var v = cells[j].trim();
          if (isExcelError(v)) { continue; }
          var vLower = v.toLowerCase();
          if (v !== '' && v !== '0' && vLower !== 'no' && vLower !== 'false' && vLower !== 'n/a' && vLower !== 'na') {
            // If we have column labels from headers, use them instead of raw values for binary data
            if (columnLabels && columnLabels[j] && (v === '1' || vLower === 'yes' || vLower === 'true' || vLower === 'selected')) {
              selected.push(columnLabels[j]);
              allItems[columnLabels[j]] = true;
            } else {
              selected.push(v);
              allItems[v] = true;
            }
          }
        }
        result.push(selected);
      }
      return { rows: result, uniqueItems: Object.keys(allItems), excelErrors: excelErrors, headerRow: headerRow, columnLabels: columnLabels, questionStem: questionStem };
    }

    valEl.addEventListener('input', function() {
      var parsed = parseMultiCols(valEl.value);
      if (parsed.rows.length === 0) {
        valCountEl.textContent = 'No values detected';
        valCountEl.className = 'value-count';
      } else {
        var statusText = parsed.rows.length + ' respondent' + (parsed.rows.length !== 1 ? 's' : '') +
          ', ' + parsed.uniqueItems.length + ' unique option' + (parsed.uniqueItems.length !== 1 ? 's' : '') + ' detected';
        // Detect if data looks like binary checkbox columns (all values are 1, yes, true, selected)
        var binaryVals = new Set(['1', 'yes', 'true', 'selected']);
        var allBinary = parsed.uniqueItems.length > 0 && parsed.uniqueItems.every(function(item) {
          return binaryVals.has(item.toLowerCase());
        });
        if (parsed.headerRow) {
          statusText += '. First row detected as column headers \u2014 using as option labels';
        } else if (allBinary && parsed.uniqueItems.length <= 2) {
          statusText += ' \u2014 \u26A0 This looks like binary (0/1) checkbox data. Column headers will be used as option labels.';
        }
        if (parsed.excelErrors > 0) {
          statusText += ' \u2014 ' + parsed.excelErrors + ' row' + (parsed.excelErrors !== 1 ? 's' : '') + ' with spreadsheet errors (#N/A, #REF!) removed';
        }
        valCountEl.textContent = statusText;
        valCountEl.className = parsed.excelErrors > 0 ? 'value-count warning' : 'value-count valid';
      }
      runBtn.disabled = parsed.rows.length < 3;
    });

    grpEl.addEventListener('input', function() {
      var grpLines = parseCategorical(grpEl.value);
      var parsed = parseMultiCols(valEl.value);
      if (grpLines.length === 0) {
        grpCountEl.textContent = 'Leave empty for simple frequency';
        grpCountEl.className = 'value-count';
      } else {
        var unique2 = {};
        grpLines.forEach(function(v) { unique2[v] = true; });
        grpCountEl.textContent = grpLines.length + ' value' + (grpLines.length !== 1 ? 's' : '') + ', ' + Object.keys(unique2).length + ' groups';
        grpCountEl.className = 'value-count valid';
        if (parsed.rows.length > 0 && grpLines.length !== parsed.rows.length) {
          grpCountEl.textContent += ' \u2014 \u26A0 mismatch (' + parsed.rows.length + ' respondents vs ' + grpLines.length + ' groups)';
          grpCountEl.className = 'value-count';
        }
      }
    });

    runBtn.addEventListener('click', function() {
      var parsed = parseMultiCols(valEl.value);
      var grpLines = parseCategorical(grpEl.value);
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      if (grpLines.length > 0 && grpLines.length === parsed.rows.length) {
        runCrosstab(parsed, grpLines);
      } else {
        runFrequencies(parsed);
      }
    });
  }

  // --- Simple frequency from multi-response data ---
  function runFrequencies(parsed) {
    var nRespondents = parsed.rows.length;
    var freqs = {};
    parsed.rows.forEach(function(selected) {
      selected.forEach(function(v) { freqs[v] = (freqs[v] || 0) + 1; });
    });

    var sorted = Object.keys(freqs).map(function(k) {
      return { value: k, count: freqs[k], pct: (freqs[k] / nRespondents * 100) };
    });

    if (sorted.length === 0) { showError('No values found in the data.'); return; }

    var totalMentions = 0;
    sorted.forEach(function(r) { totalMentions += r.count; });
    var isMulti = totalMentions > nRespondents;

    // Detect Likert/scale data
    var allNumeric = sorted.every(function(r) { var n = parseFloat(r.value); return !isNaN(n) && isFinite(n); });
    var isLikert = allNumeric && sorted.length >= 2 && sorted.length <= 11 && !isMulti;

    if (isLikert) {
      sorted.sort(function(a, b) { return parseFloat(a.value) - parseFloat(b.value); });
    } else {
      sorted.sort(function(a, b) { return b.count - a.count; });
    }

    var mode = isLikert ? sorted.reduce(function(a, b) { return a.count >= b.count ? a : b; }).value : sorted[0].value;
    var modeEntry = sorted.find(function(r) { return r.value === mode; });
    var chartId = 'freqChart_' + Date.now();

    // === COMPUTE STATS FOR LIKERT ===
    var mean = null, median = null, sd = null;
    var topPct = null, botPct = null, topLabel = '', botLabel = '';
    if (isLikert) {
      // Flatten all values to numbers for stats
      var allNums = [];
      parsed.rows.forEach(function(sel) { sel.forEach(function(v) { var n = parseFloat(v); if (!isNaN(n)) allNums.push(n); }); });
      if (allNums.length > 0) {
        mean = round2(allNums.reduce(function(a, b) { return a + b; }, 0) / allNums.length);
        var sortedNums = allNums.slice().sort(function(a, b) { return a - b; });
        var mid = Math.floor(sortedNums.length / 2);
        median = sortedNums.length % 2 === 0 ? round2((sortedNums[mid - 1] + sortedNums[mid]) / 2) : sortedNums[mid];
        var sqDiffs = allNums.map(function(v) { return (v - mean) * (v - mean); });
        sd = round2(Math.sqrt(sqDiffs.reduce(function(a, b) { return a + b; }, 0) / (allNums.length - 1)));
      }
      // Top-box / Bottom-box
      var vals = sorted.map(function(r) { return parseFloat(r.value); });
      var minVal = Math.min.apply(null, vals), maxVal = Math.max.apply(null, vals);
      if (maxVal - minVal >= 4) {
        var topTwo = sorted.filter(function(r) { return parseFloat(r.value) >= maxVal - 1; });
        var botTwo = sorted.filter(function(r) { return parseFloat(r.value) <= minVal + 1; });
        topPct = round2(topTwo.reduce(function(s, r) { return s + r.pct; }, 0));
        botPct = round2(botTwo.reduce(function(s, r) { return s + r.pct; }, 0));
        topLabel = (maxVal - 1) + '\u2013' + maxVal;
        botLabel = minVal + '\u2013' + (minVal + 1);
      }
    }

    // === BUILD HTML using component library ===
    var html = '<div class="results-section">';

    // Summary metrics
    var metrics = [{ label: 'Respondents', value: nRespondents }];
    if (isLikert && mean !== null) {
      metrics.push({ label: 'Mean', value: mean }, { label: 'Median', value: median }, { label: 'Std Dev', value: sd });
    } else {
      metrics.push({ label: 'Unique Options', value: sorted.length });
      metrics.push({ label: isMulti ? 'Total Mentions' : 'Most Common', value: isMulti ? totalMentions : mode });
    }
    html += RC('Summary', renderMetrics(metrics));

    // Top-box / Bottom-box
    if (isLikert && topPct !== null) {
      html += renderTopBottomBox(topPct, botPct, topLabel, botLabel);
    }

    // Distribution table
    html += renderDistTable(sorted, isLikert ? 'Response Distribution' : 'Frequency Table');

    // Chart
    var chartData = sorted.slice(0, 15);
    html += renderChart(chartId, isLikert ? 'Distribution Chart' : 'Top Categories', 500, Math.max(180, chartData.length * 55 + 30), 'Bars show % of respondents');

    // Plain English
    var plainText;
    if (isLikert) {
      plainText = nRespondents + ' respondents rated on a ' + sorted[0].value + '\u2013' + sorted[sorted.length - 1].value + ' scale. ' +
        'Average: ' + mean + ' (median: ' + median + '). Most common response: "' + mode + '" (' + modeEntry.pct.toFixed(1) + '%).';
      if (topPct !== null) plainText += ' Top-2 box (' + topLabel + '): ' + topPct + '%. Bottom-2 box (' + botLabel + '): ' + botPct + '%.';
    } else {
      plainText = 'Frequency analysis of ' + nRespondents + ' respondents across ' + sorted.length + ' options. ' +
        'Most selected: "' + mode + '" (' + modeEntry.count + ', ' + modeEntry.pct.toFixed(1) + '%).';
      if (isMulti) plainText += ' Multi-response: percentages based on respondents, may exceed 100%.';
    }
    html += renderPlainEnglish(plainText);

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, chartData.map(function(d, i) {
      return { label: d.value, value: parseFloat(d.pct.toFixed(2)), color: CHART_COLORS[i % CHART_COLORS.length] };
    }));
    showNextSteps('descriptive', { n: nRespondents });
  }

  // --- Crosstab: multi-response × grouping variable ---
  function runCrosstab(parsed, groupLines) {
    var n = parsed.rows.length;
    var optionLabels = parsed.uniqueItems.slice();

    // Sort numerically if all option labels are numbers (Likert/scale data)
    var allNumericOpts = optionLabels.every(function(v) { var n = parseFloat(v); return !isNaN(n) && isFinite(n); });
    if (allNumericOpts) {
      optionLabels.sort(function(a, b) { return parseFloat(a) - parseFloat(b); });
    } else {
      optionLabels.sort();
    }

    // Group labels and counts — also sort numerically if applicable
    var groupSet = {};
    groupLines.forEach(function(g) { groupSet[g] = true; });
    var groupLabels = Object.keys(groupSet);
    var allNumericGroups = groupLabels.every(function(v) { var n = parseFloat(v); return !isNaN(n) && isFinite(n); });
    if (allNumericGroups) {
      groupLabels.sort(function(a, b) { return parseFloat(a) - parseFloat(b); });
    } else {
      groupLabels.sort();
    }
    var groupN = {};
    groupLabels.forEach(function(g) { groupN[g] = 0; });
    groupLines.forEach(function(g) { groupN[g]++; });

    // Count: how many respondents in each group selected each option
    var countTable = {};
    groupLabels.forEach(function(g) {
      countTable[g] = {};
      optionLabels.forEach(function(opt) { countTable[g][opt] = 0; });
    });
    for (var i = 0; i < n; i++) {
      var grp = groupLines[i];
      parsed.rows[i].forEach(function(opt) {
        if (countTable[grp][opt] !== undefined) countTable[grp][opt]++;
      });
    }

    // Row %: pctData[groupIdx][optionIdx] = % of that group who selected that option
    var pctData = [];
    for (var g = 0; g < groupLabels.length; g++) {
      pctData.push([]);
      var gName = groupLabels[g];
      var gTotal = groupN[gName];
      for (var c = 0; c < optionLabels.length; c++) {
        pctData[g].push(gTotal > 0 ? (countTable[gName][optionLabels[c]] / gTotal * 100) : 0);
      }
    }

    // Column totals (total who selected each option)
    var optionTotals = [];
    for (var c = 0; c < optionLabels.length; c++) {
      var ct = 0;
      for (var g = 0; g < groupLabels.length; g++) ct += countTable[groupLabels[g]][optionLabels[c]];
      optionTotals.push(ct);
    }

    // === COMPUTE GROUP MEANS + SIGNIFICANCE (for numeric/Likert data) ===
    var isLikertCross = allNumericOpts && optionLabels.length >= 2 && optionLabels.length <= 11;
    var groupMeans = [];
    var groupArrays = []; // raw numeric arrays per group, for significance test
    if (isLikertCross) {
      for (var g = 0; g < groupLabels.length; g++) {
        var gName = groupLabels[g];
        var nums = [];
        for (var i = 0; i < n; i++) {
          if (groupLines[i] === gName) {
            parsed.rows[i].forEach(function(v) { var num = parseFloat(v); if (!isNaN(num)) nums.push(num); });
          }
        }
        var gMean = nums.length > 0 ? round2(nums.reduce(function(a, b) { return a + b; }, 0) / nums.length) : 0;
        groupMeans.push({ name: gName, mean: gMean, n: groupN[gName] });
        groupArrays.push(nums);
      }
    }

    // Significance test (Kruskal-Wallis for 3+ groups, Mann-Whitney for 2)
    var sigResult = null;
    if (isLikertCross && groupArrays.length >= 2 && groupArrays.every(function(a) { return a.length >= 2; })) {
      try {
        if (groupArrays.length === 2) {
          sigResult = StatsEngine.mannWhitney(groupArrays[0], groupArrays[1]);
        } else {
          sigResult = StatsEngine.kruskalWallis(groupArrays);
        }
      } catch(e) { /* ignore */ }
    }

    // Top-box / Bottom-box per group (Likert only)
    var topBotByGroup = null;
    if (isLikertCross) {
      var optNums = optionLabels.map(function(v) { return parseFloat(v); });
      var minOpt = Math.min.apply(null, optNums), maxOpt = Math.max.apply(null, optNums);
      if (maxOpt - minOpt >= 4) {
        topBotByGroup = [];
        for (var g = 0; g < groupLabels.length; g++) {
          var topPct = 0, botPct = 0;
          for (var c = 0; c < optionLabels.length; c++) {
            var ov = parseFloat(optionLabels[c]);
            if (ov >= maxOpt - 1) topPct += pctData[g][c];
            if (ov <= minOpt + 1) botPct += pctData[g][c];
          }
          topBotByGroup.push({ name: groupLabels[g], top: round2(topPct), bot: round2(botPct), mean: groupMeans[g].mean, n: groupN[groupLabels[g]] });
        }
      }
    }

    // === BUILD HTML ===
    var html = '<div class="results-section">';

    // Summary by Group card (Likert: mean per group + significance)
    if (isLikertCross && groupMeans.length > 0) {
      html += '<div class="result-card"><div class="result-card-title">Summary by Group</div>';
      html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">';
      groupMeans.forEach(function(gm) {
        html += '<div style="flex:1;min-width:90px;background:var(--bg-0,#1a1a1e);border:1px solid var(--border);border-radius:8px;padding:0.6rem;text-align:center">' +
          '<div style="font-size:0.72rem;color:var(--text-2);text-transform:uppercase">' + escHtml(gm.name) + '</div>' +
          '<div style="font-size:1.3rem;font-weight:700;margin:0.2rem 0">' + gm.mean + '</div>' +
          '<div style="font-size:0.72rem;color:var(--text-2)">n=' + gm.n + '</div>' +
        '</div>';
      });
      html += '</div>';
      if (sigResult) {
        var sigP = sigResult.p;
        var isSig = sigP < 0.05;
        html += '<div style="text-align:center;margin-top:0.6rem">' +
          '<span style="display:inline-block;padding:0.25rem 0.7rem;border-radius:4px;font-size:0.82rem;font-weight:600;' +
          (isSig ? 'background:rgba(58,154,92,0.15);color:var(--green)' : 'background:rgba(153,153,153,0.15);color:var(--text-2)') + '">' +
          (isSig ? 'Statistically significant difference (p = ' + round4(sigP) + ')' : 'No significant difference (p = ' + round4(sigP) + ')') +
          '</span></div>';
      }
      html += '</div>';
    } else {
      html += '<div class="result-card"><div class="result-card-title">Summary</div><div class="test-results-grid">' +
        testStat('Total N', n) + testStat('Groups', groupLabels.length) + testStat('Options', optionLabels.length) +
      '</div></div>';
    }

    // Top-box / Bottom-box per group table (Likert only)
    if (topBotByGroup) {
      var topLabel = (maxOpt - 1) + '\u2013' + maxOpt;
      var botLabel = minOpt + '\u2013' + (minOpt + 1);
      html += '<div class="result-card"><div class="result-card-title">Top-Box / Bottom-Box by Group</div>' +
        '<div style="overflow-x:auto"><table class="freq-table"><tr><th>Group</th><th style="color:var(--green)">Top-2 (' + topLabel + ')</th><th style="color:var(--rose)">Bottom-2 (' + botLabel + ')</th><th>Mean</th><th>n</th></tr>';
      topBotByGroup.forEach(function(row) {
        html += '<tr><td><strong>' + escHtml(row.name) + '</strong></td><td style="color:var(--green)">' + row.top + '%</td><td style="color:var(--rose)">' + row.bot + '%</td><td>' + row.mean + '</td><td>' + row.n + '</td></tr>';
      });
      html += '</table></div></div>';
    }

    // Crosstab HTML table
    var ctHtml = '<div style="overflow-x:auto"><table class="freq-table">';
    ctHtml += '<tr><th></th>';
    for (var c = 0; c < optionLabels.length; c++) ctHtml += '<th>' + escHtml(optionLabels[c]) + '</th>';
    ctHtml += '<th>N</th></tr>';
    for (var g = 0; g < groupLabels.length; g++) {
      ctHtml += '<tr><td><strong>' + escHtml(groupLabels[g]) + '</strong></td>';
      for (var c = 0; c < optionLabels.length; c++) {
        ctHtml += '<td>' + pctData[g][c].toFixed(1) + '%</td>';
      }
      ctHtml += '<td>' + groupN[groupLabels[g]] + '</td></tr>';
    }
    ctHtml += '<tr style="border-top:2px solid var(--border)"><td><strong>Base (N)</strong></td>';
    for (var c = 0; c < optionLabels.length; c++) ctHtml += '<td>' + optionTotals[c] + '</td>';
    ctHtml += '<td>' + n + '</td></tr>';
    ctHtml += '</table></div>';
    ctHtml += '<div style="margin-top:6px;font-size:0.82em;color:var(--text-2)">Total N = ' + n + ' &middot; Metric: Row %</div>';
    html += '<div class="result-card"><div class="result-card-title">Distribution by Group (Row %)</div>' + ctHtml + '</div>';

    // Grouped bar chart
    var chartId = 'crosstabChart_' + Date.now();
    var chartW = Math.max(600, groupLabels.length * optionLabels.length * 22 + 120);
    var chartH = 400;
    html += '<div class="result-card"><div class="result-card-title">Grouped Bar Chart (%)</div>' +
      '<canvas id="' + chartId + '" width="' + chartW + '" height="' + chartH + '" style="width:100%;max-width:' + chartW + 'px;display:block;margin:0 auto;"></canvas>' +
      '<div style="font-size:0.78rem;color:var(--text-2);margin-top:6px">Bars show % within each group</div></div>';

    // Plain English
    var plainText;
    if (isLikertCross && groupMeans.length > 0) {
      var best = groupMeans.reduce(function(a, b) { return a.mean >= b.mean ? a : b; });
      var worst = groupMeans.reduce(function(a, b) { return a.mean <= b.mean ? a : b; });
      plainText = n + ' respondents across ' + groupLabels.length + ' groups. ' +
        '"' + best.name + '" rates highest (mean ' + best.mean + '), "' + worst.name + '" rates lowest (mean ' + worst.mean + ').';
      if (sigResult) {
        plainText += sigResult.p < 0.05 ? ' The difference between groups is statistically significant (p = ' + round4(sigResult.p) + ').' : ' The difference is not statistically significant (p = ' + round4(sigResult.p) + ').';
      }
      if (topBotByGroup) {
        var bestTop = topBotByGroup.reduce(function(a, b) { return a.top >= b.top ? a : b; });
        plainText += ' Highest top-2 box: "' + bestTop.name + '" at ' + bestTop.top + '%.';
      }
    } else {
      var maxPct = 0, maxGroup = '', maxOpt = '';
      for (var g = 0; g < groupLabels.length; g++) {
        for (var c = 0; c < optionLabels.length; c++) {
          if (pctData[g][c] > maxPct) { maxPct = pctData[g][c]; maxGroup = groupLabels[g]; maxOpt = optionLabels[c]; }
        }
      }
      plainText = 'Cross-tabulation of ' + n + ' respondents across ' + groupLabels.length + ' groups and ' + optionLabels.length + ' options. ' +
        'Highest: ' + maxPct.toFixed(1) + '% for "' + maxOpt + '" in "' + maxGroup + '".';
    }
    html += '<div class="result-card plain-english"><div class="result-card-title">Plain English</div>' +
      '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>';

    html += '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();

    drawVerticalGroupedBarChart(chartId, chartW, chartH, groupLabels, optionLabels, pctData);
    showNextSteps('descriptive', { n: n });
  }

  // --- Vertical grouped bar chart for crosstabs (row % distribution) ---
  function drawVerticalGroupedBarChart(canvasId, canvasW, canvasH, groupLabels, seriesLabels, data) {
    var c = initCanvas(canvasId, canvasW, canvasH);
    if (!c) return;
    var ctx = c.ctx, w = c.w, h = c.h;
    var colors = getColors();

    var pad = { left: 50, right: 20, top: 40, bottom: 60 };
    var cw = w - pad.left - pad.right;
    var ch = h - pad.top - pad.bottom;

    var nGroups = groupLabels.length;
    var nSeries = seriesLabels.length;
    var groupW = cw / nGroups;
    var barW = Math.max(8, Math.min(28, (groupW - 12) / nSeries));
    var totalBarsW = nSeries * barW;

    // Find max value for y-axis
    var maxVal = 0;
    for (var r = 0; r < data.length; r++) {
      for (var cc = 0; cc < data[r].length; cc++) {
        if (data[r][cc] > maxVal) maxVal = data[r][cc];
      }
    }
    maxVal = Math.ceil(maxVal / 10) * 10;
    if (maxVal < 10) maxVal = 10;
    var yStep = maxVal <= 20 ? 5 : maxVal <= 50 ? 10 : 20;

    function yPos(val) { return pad.top + ch - (val / maxVal) * ch; }

    // Y-axis gridlines and labels
    ctx.font = '500 11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (var yy = 0; yy <= maxVal; yy += yStep) {
      var py = yPos(yy);
      ctx.strokeStyle = colors.border;
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.left, py);
      ctx.lineTo(pad.left + cw, py);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = colors.subtext;
      ctx.fillText(yy, pad.left - 8, py);
    }

    // Legend (top)
    ctx.font = '500 10px -apple-system, BlinkMacSystemFont, sans-serif';
    var legendX = pad.left;
    var legendY = 10;
    var maxLegendWidth = cw;
    var currentX = legendX;
    for (var s = 0; s < nSeries; s++) {
      var lbl = seriesLabels[s].length > 20 ? seriesLabels[s].substring(0, 18) + '...' : seriesLabels[s];
      var lblW = ctx.measureText(lbl).width + 20;
      if (currentX + lblW > legendX + maxLegendWidth && s > 0) {
        legendY += 14;
        currentX = legendX;
      }
      ctx.fillStyle = CHART_COLORS[s % CHART_COLORS.length];
      ctx.fillRect(currentX, legendY, 10, 10);
      ctx.fillStyle = colors.text;
      ctx.textAlign = 'left';
      ctx.fillText(lbl, currentX + 13, legendY + 8);
      currentX += lblW + 8;
    }

    // Bars
    for (var g = 0; g < nGroups; g++) {
      var gx = pad.left + g * groupW + (groupW - totalBarsW) / 2;
      for (var s = 0; s < nSeries; s++) {
        var val = data[g][s];
        var bx = gx + s * barW;
        var by = yPos(val);
        var bh = yPos(0) - by;

        ctx.fillStyle = CHART_COLORS[s % CHART_COLORS.length];
        ctx.globalAlpha = 0.85;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(bx, by, barW - 1, bh, [3, 3, 0, 0]);
        else ctx.rect(bx, by, barW - 1, bh);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Value label on top of bar
        if (val > 0 && barW >= 12) {
          ctx.fillStyle = colors.text;
          ctx.font = '600 ' + Math.max(8, Math.min(10, barW - 2)) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(val.toFixed(1), bx + (barW - 1) / 2, by - 2);
        }
      }

      // Group label (x-axis)
      ctx.fillStyle = colors.text;
      ctx.font = '500 11px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      var gLabel = groupLabels[g].length > 12 ? groupLabels[g].substring(0, 10) + '...' : groupLabels[g];
      ctx.fillText(gLabel, pad.left + g * groupW + groupW / 2, pad.top + ch + 6);
    }
  }

  /* ==================================================================
     2. Phi Coefficient — Input
     ================================================================== */
  function showPhiInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    section.innerHTML =
      '<div class="group-card">' +
        '<div class="group-card-label">2&times;2 Contingency Table (Binary Variables)</div>' +
        '<div class="grid-2x2">' +
          '<div></div><div class="grid-header">Var B = Yes</div><div class="grid-header">Var B = No</div>' +
          '<div class="grid-row-label">Var A = Yes</div><input type="number" id="phi_a" min="0" value="0"><input type="number" id="phi_b" min="0" value="0">' +
          '<div class="grid-row-label">Var A = No</div><input type="number" id="phi_c" min="0" value="0"><input type="number" id="phi_d" min="0" value="0">' +
        '</div>' +
      '</div>' +
      '<button class="run-btn" id="runBtn">Run Analysis</button>';
    container.appendChild(section);
    scrollToBottom();

    section.querySelector('#runBtn').addEventListener('click', function() {
      var a = Math.max(0, parseInt(section.querySelector('#phi_a').value) || 0);
      var b = Math.max(0, parseInt(section.querySelector('#phi_b').value) || 0);
      var c = Math.max(0, parseInt(section.querySelector('#phi_c').value) || 0);
      var d = Math.max(0, parseInt(section.querySelector('#phi_d').value) || 0);
      if (a + b + c + d === 0) { showError('Please enter at least some counts.'); return; }
      var btn = section.querySelector('#runBtn');
      btn.disabled = true;
      btn.textContent = 'Running...';
      runPhi(a, b, c, d);
    });
  }

  function runPhi(a, b, c, d) {
    var n = a + b + c + d;
    var phi = (a * d - b * c) / Math.sqrt((a + b) * (c + d) * (a + c) * (b + d));
    if (!isFinite(phi)) phi = 0;

    // Chi-square from the 2x2 table
    var chi2 = n * phi * phi;
    var df = 1;
    var p = 1 - jStat.chisquare.cdf(chi2, df);

    var strength = Math.abs(phi) < 0.1 ? 'negligible' : Math.abs(phi) < 0.3 ? 'weak' : Math.abs(phi) < 0.5 ? 'moderate' : 'strong';
    var dir = phi > 0 ? 'positive' : phi < 0 ? 'negative' : 'no';
    var pc = pClass(p);

    var plainText = 'The phi coefficient is ' + round4(phi) + ', indicating a ' + strength + ' ' + dir + ' association between the two binary variables. ' +
      (p < 0.05 ? 'This association is statistically significant (chi-square = ' + round4(chi2) + ', p = ' + round6(p) + ').' :
        'This association is not statistically significant (chi-square = ' + round4(chi2) + ', p = ' + round6(p) + ').');

    var chartId = 'phiChart_' + Date.now();

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('Phi Coefficient', round4(phi)) + testStat('Chi-Square', round4(chi2)) +
        testStat('p-value', round6(p), pc) + testStat('N', n) +
      '</div><div class="effect-interpretation">Strength: <strong>' + strength + '</strong> (|phi| < 0.1 = negligible, 0.1\u20130.3 = weak, 0.3\u20130.5 = moderate, > 0.5 = strong)</div></div>' +
      '<div class="result-card"><div class="result-card-title">Cell Counts</div>' +
        '<canvas id="' + chartId + '" width="500" height="240" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: 'A=Yes, B=Yes', value: a, color: CHART_COLORS[0] },
      { label: 'A=Yes, B=No', value: b, color: CHART_COLORS[1] },
      { label: 'A=No, B=Yes', value: c, color: CHART_COLORS[2] },
      { label: 'A=No, B=No', value: d, color: CHART_COLORS[3] }
    ]);
    showNextSteps('correlation', { n: n, p: p });
  }

  /* ==================================================================
     3. Kendall's Tau
     ================================================================== */
  function runKendall(x, y, descX, descY) {
    if (x.length !== y.length) {
      var minLen = Math.min(x.length, y.length);
      x = x.slice(0, minLen);
      y = y.slice(0, minLen);
    }
    var n = x.length;

    // Count concordant and discordant pairs
    var concordant = 0, discordant = 0, tiedX = 0, tiedY = 0;
    for (var i = 0; i < n - 1; i++) {
      for (var j = i + 1; j < n; j++) {
        var dx = x[i] - x[j];
        var dy = y[i] - y[j];
        if (dx * dy > 0) concordant++;
        else if (dx * dy < 0) discordant++;
        else {
          if (dx === 0) tiedX++;
          if (dy === 0) tiedY++;
        }
      }
    }

    // Tau-b (handles ties)
    var n0 = n * (n - 1) / 2;
    var tau = (concordant - discordant) / Math.sqrt((n0 - tiedX) * (n0 - tiedY));
    if (!isFinite(tau)) tau = 0;

    // Z-test approximation
    var v0 = n * (n - 1) * (2 * n + 5);
    var se = Math.sqrt(v0 / 18);
    var z = (concordant - discordant) / se;
    var p = 2 * (1 - jStat.normal.cdf(Math.abs(z), 0, 1));

    var strength = Math.abs(tau) < 0.1 ? 'negligible' : Math.abs(tau) < 0.3 ? 'weak' : Math.abs(tau) < 0.5 ? 'moderate' : 'strong';
    var dir = tau > 0 ? 'positive' : tau < 0 ? 'negative' : 'no';
    var pc = pClass(p);
    var chartId = 'kendallPlot_' + Date.now();

    var html = '<div class="results-section">';

    html += RC('Correlation Summary',
      renderMetrics([
        { label: 'Kendall\u2019s tau', value: round4(tau) },
        { label: 'Strength', value: strength },
        { label: 'Direction', value: dir },
        { label: 'n', value: n }
      ]) + renderSigBadge(p)
    );

    html += renderGroupCards([x, y], [descX, descY], 'Variable Summaries') + '</div>';

    html += renderChart(chartId, 'Scatter Plot', 500, 350);

    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'tau-b', value: round4(tau) },
        { label: 'z', value: round4(z) },
        { label: 'p', value: round6(p), cls: pc },
        { label: 'Concordant', value: concordant },
        { label: 'Discordant', value: discordant }
      ])
    );

    var plainText = 'There is a ' + strength + ' ' + dir + ' ordinal association between ' + descX + ' and ' + descY + ' (tau = ' + round4(tau) + '). ' +
      (p < 0.05 ? 'This is statistically significant.' : 'This is not statistically significant.');
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawScatterPlot(chartId, x, y, descX, descY);
    showNextSteps('correlation', { p: p, n: n });
  }

  /* ==================================================================
     4. Simple Linear Regression
     ================================================================== */
  function runSimpleRegression(x, y, descX, descY) {
    if (x.length !== y.length) {
      var minLen = Math.min(x.length, y.length);
      x = x.slice(0, minLen);
      y = y.slice(0, minLen);
    }
    var n = x.length;

    // Compute regression
    var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
    for (var i = 0; i < n; i++) {
      sumX += x[i]; sumY += y[i]; sumXY += x[i] * y[i]; sumX2 += x[i] * x[i]; sumY2 += y[i] * y[i];
    }
    var meanX = sumX / n, meanY = sumY / n;
    var slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    var intercept = meanY - slope * meanX;

    // R-squared
    var ssTot = 0, ssRes = 0;
    for (var i = 0; i < n; i++) {
      var predicted = slope * x[i] + intercept;
      ssTot += (y[i] - meanY) * (y[i] - meanY);
      ssRes += (y[i] - predicted) * (y[i] - predicted);
    }
    var r2 = ssTot > 0 ? 1 - ssRes / ssTot : 0;
    var r = Math.sqrt(r2) * (slope >= 0 ? 1 : -1);

    // Standard error of slope
    var msRes = ssRes / (n - 2);
    var ssXX = sumX2 - sumX * sumX / n;
    var seSlope = Math.sqrt(msRes / ssXX);
    var seIntercept = Math.sqrt(msRes * (1 / n + meanX * meanX / ssXX));
    var tSlope = slope / seSlope;
    var pSlope = 2 * (1 - jStat.studentt.cdf(Math.abs(tSlope), n - 2));

    // F-test
    var ssReg = ssTot - ssRes;
    var F = ssReg / msRes;
    var pF = 1 - jStat.centralF.cdf(F, 1, n - 2);

    var equation = 'Y = ' + round4(slope) + ' \u00d7 X + ' + round4(intercept);
    var pc = pClass(pSlope);
    var chartId = 'simpleRegPlot_' + Date.now();

    var html = '<div class="results-section">';

    // Key metrics
    html += RC('Model Summary',
      renderMetrics([
        { label: 'R\u00b2', value: round4(r2 * 100) + '%' },
        { label: 'Slope', value: round4(slope) },
        { label: 'Direction', value: slope > 0 ? 'Positive \u2191' : slope < 0 ? 'Negative \u2193' : 'None' },
        { label: 'n', value: n }
      ]) + renderSigBadge(pSlope) +
      '<div style="text-align:center;margin-top:0.5rem;font-size:0.9rem;color:var(--text-0)"><strong>' + equation + '</strong></div>'
    );

    // What this means
    var changeDir = slope > 0 ? 'increases' : 'decreases';
    var perUnit = 'For every 1-unit increase in ' + descX + ', ' + descY + ' ' + changeDir + ' by ' + round4(Math.abs(slope)) + ' on average.';

    html += RC('What This Means',
      '<div style="font-size:0.9rem;line-height:1.5;color:var(--text-0)">' + perUnit + '<br>' +
      descX + ' explains <strong>' + round4(r2 * 100) + '%</strong> of the variation in ' + descY + '.' +
      (r2 < 0.1 ? ' That\u2019s very little \u2014 other factors matter more.' : r2 < 0.3 ? ' That\u2019s a modest amount.' : ' That\u2019s substantial.') +
      '</div>'
    );

    // Scatter plot
    html += renderChart(chartId, 'Scatter Plot with Trend Line', 500, 350);

    // Statistical details (collapsed)
    html += renderCollapsed('Statistical Details',
      renderMetrics([
        { label: 'Slope', value: round4(slope) },
        { label: 'SE (slope)', value: round4(seSlope) },
        { label: 'Intercept', value: round4(intercept) },
        { label: 'SE (intercept)', value: round4(seIntercept) },
        { label: 'R\u00b2', value: round4(r2) },
        { label: 'r', value: round4(r) },
        { label: 't (slope)', value: round4(tSlope) },
        { label: 'p (slope)', value: round6(pSlope), cls: pc },
        { label: 'F', value: round4(F) },
        { label: 'p (F)', value: round6(pF) }
      ])
    );

    // Plain English
    var plainText = descX + (pSlope < 0.05 ? ' significantly predicts ' : ' does not significantly predict ') + descY + '. ' + perUnit + ' ' +
      round4(r2 * 100) + '% of the variation is explained.';
    html += renderPlainEnglish(plainText);

    html += '</div>';
    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawScatterPlot(chartId, x, y, descX, descY);
    showNextSteps('regression', { n: n, r2: r2 });
  }

  /* ==================================================================
     5. Cohen's Kappa / Inter-Rater Reliability — Input
     ================================================================== */
  function showIRRInput() {
    var section = document.createElement('div');
    section.className = 'data-input-section';
    section.innerHTML =
      '<div class="input-grid">' +
        '<div class="group-card">' +
          '<div class="group-card-label">Rater 1 Judgments</div>' +
          '<textarea id="irrA" placeholder="Paste categorical judgments, one per line...\ne.g.:\nYes\nNo\nYes\nMaybe"></textarea>' +
          '<div class="value-count" id="irrCountA">No values detected</div>' +
        '</div>' +
        '<div class="group-card">' +
          '<div class="group-card-label">Rater 2 Judgments</div>' +
          '<textarea id="irrB" placeholder="Paste categorical judgments, one per line...\ne.g.:\nYes\nNo\nNo\nMaybe"></textarea>' +
          '<div class="value-count" id="irrCountB">No values detected</div>' +
        '</div>' +
      '</div>' +
      '<button class="run-btn" id="runBtn" disabled>Run Analysis</button>';
    container.appendChild(section);
    scrollToBottom();

    var dataA = section.querySelector('#irrA');
    var dataB = section.querySelector('#irrB');
    var countA = section.querySelector('#irrCountA');
    var countB = section.querySelector('#irrCountB');
    var runBtn = section.querySelector('#runBtn');

    function updateCatCount(el, countEl) {
      var lines = parseCategorical(el.value);
      if (lines.length === 0) {
        countEl.textContent = 'No values detected';
        countEl.className = 'value-count';
      } else {
        countEl.textContent = lines.length + ' judgment' + (lines.length !== 1 ? 's' : '') + ' detected';
        countEl.className = 'value-count valid';
      }
    }

    function checkReady() {
      var a = parseCategorical(dataA.value);
      var b = parseCategorical(dataB.value);
      runBtn.disabled = !(a.length >= 3 && b.length >= 3);
    }

    dataA.addEventListener('input', function() { updateCatCount(dataA, countA); checkReady(); });
    dataB.addEventListener('input', function() { updateCatCount(dataB, countB); checkReady(); });

    runBtn.addEventListener('click', function() {
      var a = parseCategorical(dataA.value);
      var b = parseCategorical(dataB.value);
      if (a.length !== b.length) {
        showError('Both raters must have the same number of judgments. Rater 1 has ' + a.length + ', Rater 2 has ' + b.length + '.');
        return;
      }
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      runIRR(a, b);
    });
  }

  function runIRR(rater1, rater2) {
    var n = rater1.length;

    // Get all unique categories
    var catSet = {};
    rater1.forEach(function(v) { catSet[v] = true; });
    rater2.forEach(function(v) { catSet[v] = true; });
    var categories = Object.keys(catSet).sort();
    var k = categories.length;

    // Build confusion matrix
    var matrix = {};
    categories.forEach(function(a) {
      matrix[a] = {};
      categories.forEach(function(b) { matrix[a][b] = 0; });
    });
    for (var i = 0; i < n; i++) {
      matrix[rater1[i]][rater2[i]]++;
    }

    // Observed agreement
    var agree = 0;
    categories.forEach(function(c) { agree += matrix[c][c]; });
    var po = agree / n;

    // Expected agreement
    var pe = 0;
    categories.forEach(function(c) {
      var r1Count = 0, r2Count = 0;
      categories.forEach(function(c2) { r1Count += matrix[c][c2]; r2Count += matrix[c2][c]; });
      pe += (r1Count / n) * (r2Count / n);
    });

    // Kappa
    var kappa = pe < 1 ? (po - pe) / (1 - pe) : 1;

    // Standard error (Fleiss formula)
    var seKappa = Math.sqrt(po * (1 - po) / (n * (1 - pe) * (1 - pe)));
    var ci95Low = kappa - 1.96 * seKappa;
    var ci95High = kappa + 1.96 * seKappa;

    // Interpretation
    var level = kappa < 0 ? 'poor (less than chance)' : kappa < 0.2 ? 'slight' : kappa < 0.4 ? 'fair' : kappa < 0.6 ? 'moderate' : kappa < 0.8 ? 'substantial' : 'almost perfect';

    var plainText = 'Cohen\u2019s Kappa = ' + round4(kappa) + ', indicating ' + level + ' agreement between the two raters. ' +
      'Observed agreement = ' + (po * 100).toFixed(1) + '%, expected by chance = ' + (pe * 100).toFixed(1) + '%. ' +
      '95% CI: [' + round4(ci95Low) + ', ' + round4(ci95High) + '].';

    var chartId = 'irrChart_' + Date.now();

    var html =
      '<div class="results-section">' +
      '<div class="result-card plain-english"><div class="result-card-title">Plain English Interpretation</div>' +
        '<div class="plain-english-text">' + plainText + '</div>' + makeCopyBtn(plainText) + '</div>' +
      '<div class="result-card"><div class="result-card-title">Test Results</div><div class="test-results-grid">' +
        testStat('Cohen\u2019s Kappa', round4(kappa)) +
        testStat('Observed Agreement', (po * 100).toFixed(1) + '%') +
        testStat('Expected Agreement', (pe * 100).toFixed(1) + '%') +
        testStat('95% CI', '[' + round4(ci95Low) + ', ' + round4(ci95High) + ']') +
        testStat('n (items rated)', n) + testStat('Categories', k) +
      '</div><div class="effect-interpretation">Interpretation: <strong>' + level + '</strong> (< 0.2 = slight, 0.2\u20130.4 = fair, 0.4\u20130.6 = moderate, 0.6\u20130.8 = substantial, > 0.8 = almost perfect)</div></div>' +
      '<div class="result-card"><div class="result-card-title">Observed vs Expected Agreement</div>' +
        '<canvas id="' + chartId + '" width="500" height="180" style="width:100%;max-width:500px;display:block;margin:0 auto;"></canvas></div>' +
      '</div>';

    container.insertAdjacentHTML('beforeend', html);
    scrollToBottom();
    drawBarChart(chartId, [
      { label: 'Observed Agreement', value: po * 100, color: CHART_COLORS[0] },
      { label: 'Expected (Chance)', value: pe * 100, color: CHART_COLORS[1] }
    ]);
    showNextSteps('correlation', { n: n });
  }

  /* ==================================================================
