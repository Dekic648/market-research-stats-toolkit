      color: var(--text-2);

      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;

      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      padding-top: 1px;

    .test-status.pass { color: var(--green); }
    .test-status.fail { color: var(--red); }

    .test-name {
      font-weight: 600;
      color: var(--text-0);
      min-width: 220px;
      flex-shrink: 0;
    }

    .test-detail {
      color: var(--text-2);
      font-size: 0.8rem;
      word-break: break-word;
    }

    .test-detail.fail-detail { color: var(--red); }

      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;

  function test(category, name, fn) {
    var detail = "";
    var stack = "";
    var status = "pass";
    try {
      fn();
    } catch (e) {
      status = "fail";
      detail = e.message || String(e);
      stack = e.stack || "";
    }
    if (status === "pass") passed++;
    else failed++;
    results.push({ category: category, name: name, status: status, detail: detail, stack: stack });
  }

  function assert(condition, msg) {
    if (!condition) throw new Error(msg || "Assertion failed");

  /* ========================================================
   *  Failure tracking for Fix Plan
   * ======================================================== */

  var fixPlanData = {
    missingSelectMethod: [],
    missingLaunchIntro: [],
    missingLaunchInputFn: [],
    missingEngineMethod: [],
    crashOnValidData: [],
    nullResult: [],
    missingInterpret: [],
    crashOnInterpret: [],
    crashOnEdgeCase: []
  };

  /* ========================================================
   *  CATEGORY 1: Wiring Consistency Tests
   * ======================================================== */

  var CAT1 = "1. Wiring Consistency";

  METHOD_REGISTRY.forEach(function(cat) {
    cat.methods.forEach(function(method) {
      if (!method.implemented) return;

      // Check selectMethod methodMap has entry
      test(CAT1, method.id + " in selectMethod map", function() {
        var has = METHOD_MAP.hasOwnProperty(method.id);
        if (!has) fixPlanData.missingSelectMethod.push(method.id);
        assert(has, "Missing from selectMethod methodMap");
      });

      // Check launchMethod intros has entry for the resolved ID
      test(CAT1, method.id + " has launchMethod intro", function() {
        var resolvedId = METHOD_MAP[method.id] || method.id;
        var has = LAUNCH_INTROS.indexOf(resolvedId) !== -1;
        if (!has) fixPlanData.missingLaunchIntro.push(method.id + " (resolved: " + resolvedId + ")");
        assert(has, "No intro for resolved ID '" + resolvedId + "'");
      });

      // Check launchMethod inputFns has entry for the resolved ID
      test(CAT1, method.id + " has launchMethod inputFn", function() {
        var resolvedId = METHOD_MAP[method.id] || method.id;
        var has = LAUNCH_INPUT_FNS.indexOf(resolvedId) !== -1;
        if (!has) fixPlanData.missingLaunchInputFn.push(method.id + " (resolved: " + resolvedId + ")");
        assert(has, "No inputFn for resolved ID '" + resolvedId + "'");
      });
    });
  });

  /* ========================================================
   *  CATEGORY 2: StatsEngine Method Coverage
   * ======================================================== */

  var CAT2 = "2. StatsEngine Method Coverage";
  var sampleResults = {}; // store for interpret tests

  METHOD_REGISTRY.forEach(function(cat) {
    cat.methods.forEach(function(method) {
      if (!method.implemented) return;

      var engineMethodName = ENGINE_METHOD_MAP[method.id];

      // Skip methods with no direct engine mapping
      if (engineMethodName === null || engineMethodName === undefined) return;

      // Check function exists
      test(CAT2, engineMethodName + " exists on StatsEngine", function() {
        var exists = typeof StatsEngine[engineMethodName] === "function";
        if (!exists) fixPlanData.missingEngineMethod.push(engineMethodName);
        assert(exists, "StatsEngine." + engineMethodName + " is not a function");
      });

      // Check calling with valid data doesn't throw and returns non-null
      if (SAMPLE_DATA[engineMethodName]) {
        test(CAT2, engineMethodName + " runs with valid data", function() {
          var result;
          try {
            result = SAMPLE_DATA[engineMethodName]();
          } catch (e) {
            fixPlanData.crashOnValidData.push(engineMethodName);
            throw e;
          }
          if (result === null || result === undefined) {
            fixPlanData.nullResult.push(engineMethodName);
          }
          assert(result !== null && result !== undefined, "Result is null/undefined");
          assert(typeof result === "object", "Result is not an object, got " + typeof result);
          sampleResults[engineMethodName] = result;
        });
      }
    });
  });

  /* ========================================================
   *  CATEGORY 3: Error Handling Tests
   * ======================================================== */

  var CAT3 = "3. Error Handling (Edge Cases)";

  Object.keys(EDGE_CASES).forEach(function(methodName) {
    var cases = EDGE_CASES[methodName];
    cases.forEach(function(ec) {
      test(CAT3, methodName + " / " + ec.label, function() {
        try {
          ec.fn();
        } catch (e) {
          fixPlanData.crashOnEdgeCase.push(methodName + " (" + ec.label + "): " + e.message);
          throw e;
        }
        // If it returns without crashing, that's a pass (may return error object, that's fine)
      });
    });
  });

  /* ========================================================
   *  CATEGORY 4: Interpret Coverage
   * ======================================================== */

  var CAT4 = "4. Interpret Coverage";

  // Build list of interpret method names from SAMPLE_DATA keys that produced results
  Object.keys(SAMPLE_DATA).forEach(function(engineMethodName) {
    // Check interpret function exists
    test(CAT4, engineMethodName + " interpret exists", function() {
      var fn = StatsEngine.interpret[engineMethodName];
      if (typeof fn !== "function") {
        fixPlanData.missingInterpret.push(engineMethodName);
      }
      assert(typeof fn === "function", "StatsEngine.interpret." + engineMethodName + " is not a function");
    });

    // If we have a sample result, verify interpret output shape
    if (sampleResults[engineMethodName]) {
      test(CAT4, engineMethodName + " interpret returns valid output", function() {
        var fn = StatsEngine.interpret[engineMethodName];
        if (typeof fn !== "function") {
          assert(false, "interpret function missing (skipped)");
          return;
        }
        var out;
        try {
          out = fn(sampleResults[engineMethodName]);
        } catch (e) {
          fixPlanData.crashOnInterpret.push(engineMethodName + ": " + e.message);
          throw e;
        }
        assert(out && typeof out === "object", "interpret result is not an object");
        assert(typeof out.significant === "boolean", "significant is not boolean, got: " + typeof out.significant);
        assert(typeof out.summary === "string" && out.summary.length > 0, "summary is empty or not a string");
        assert(typeof out.details === "string", "details is not a string, got: " + typeof out.details);
      });
    }
  });

  /* ========================================================

  function render() {
    var bar = document.getElementById("summaryBar");
    var total = passed + failed;
    bar.textContent = passed + " of " + total + " tests passed" + (failed > 0 ? " (" + failed + " failed)" : "");
    bar.className = "summary-bar " + (failed === 0 ? "all-pass" : "has-fail");

    // Group by category
    var cats = [];
    var catMap = {};
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      if (!catMap[r.category]) {
        catMap[r.category] = [];
        cats.push(r.category);
      }
      catMap[r.category].push(r);
    }

    var html = "";
    for (var c = 0; c < cats.length; c++) {
      var catName = cats[c];
      var items = catMap[catName];
      var catFails = items.filter(function(x) { return x.status === "fail"; }).length;
      var catLabel = catName + " (" + (items.length - catFails) + "/" + items.length + " passed)";

      html += '<div class="category">';
      html += '<h2>' + catLabel + '</h2>';

      for (var j = 0; j < items.length; j++) {
        var t = items[j];
        html += '<div class="test-row">';
        html += '<div class="test-status ' + t.status + '">' + t.status + '</div>';
        html += '<div class="test-name">' + escHtml(t.name) + '</div>';

        if (t.status === "fail") {
          html += '<div class="test-detail fail-detail">' + escHtml(t.detail);
          if (t.stack) {
            html += '<div class="stack-trace">' + escHtml(t.stack) + '</div>';
          }
          html += '</div>';
        } else {
          html += '<div class="test-detail">OK</div>';
        }

        html += '</div>';
      }

      html += '</div>';
    }

    document.getElementById("results").innerHTML = html;

    // Build Fix Plan
    renderFixPlan();
  }

  function renderFixPlan() {
    var plan = document.getElementById("fixPlan");
    var hasIssues = false;
    var html = '<div class="fix-plan"><h2>Fix Plan</h2>';

    var sections = [
      { key: "missingSelectMethod", title: "Methods missing from selectMethod map" },
      { key: "missingLaunchIntro", title: "Methods missing launchMethod intro" },
      { key: "missingLaunchInputFn", title: "Methods missing launchMethod inputFn" },
      { key: "missingEngineMethod", title: "Methods missing from StatsEngine" },
      { key: "crashOnValidData", title: "Methods that crash on valid data" },
      { key: "nullResult", title: "Methods returning null/undefined on valid data" },
      { key: "missingInterpret", title: "Methods missing interpret functions" },
      { key: "crashOnInterpret", title: "Methods whose interpret crashes" },
      { key: "crashOnEdgeCase", title: "Methods that crash on edge-case input" }
    ];

    for (var i = 0; i < sections.length; i++) {
      var s = sections[i];
      var items = fixPlanData[s.key];
      if (items.length > 0) {
        hasIssues = true;
        html += '<h3>' + s.title + ' (' + items.length + ')</h3><ul>';
        for (var j = 0; j < items.length; j++) {
          html += '<li>' + escHtml(items[j]) + '</li>';
        }
        html += '</ul>';
      }
    }

    if (!hasIssues) {
      html += '<p class="all-good">All checks passed. No fixes needed.</p>';
    }

    html += '</div>';
    plan.innerHTML = html;
  }

  function escHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  /* ========================================================
   *  Auto-run on load
   * ======================================================== */

  render();

})();
</script>

</body>
</html>
